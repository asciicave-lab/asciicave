<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap');
  :root{
    --bg:#171008; --panel:#241a10; --panel-edge:#4a3520;
    --wood:#5a3f26; --wood-dim:#332413; --sand:#6b5638; --sand-dim:#3a2f1e;

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--parchment); font-family:'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; }
  .wrap { max-width:560px; margin:0 auto; padding:14px 12px 22px; }

  .bar-fill { height:100%; transition:width 0.25s ease; }
  .fill-hp { background:linear-gradient(90deg,#5c9950,#7fbf6d); }
  .fill-hp.low { background:linear-gradient(90deg,#c94f3d,#8a2e22); }
  .stat-num { font-size:9.5px; color:var(--dim); width:40px; text-align:right; }

  .stage { position:relative; background:#0e0a06; border:1px solid var(--panel-edge); border-radius:8px; padding:10px; box-shadow:inset 0 0 40px rgba(232,184,77,0.05); overflow:hidden; }
  .stage::after { content:""; position:absolute; inset:0; pointer-events:none; z-index:3; background:repeating-linear-gradient(0deg, rgba(255,255,255,0.014) 0px, rgba(255,255,255,0.014) 1px, transparent 1px, transparent 3px); }
  #grid { position:relative; z-index:2; display:grid; line-height:1; font-size:16px; white-space:pre; text-align:center; }
  #fx { position:absolute; top:10px; left:10px; overflow:visible; pointer-events:none; z-index:4; }

  .dust { position:absolute; width:2px; height:2px; border-radius:50%; background:rgba(201,168,118,0.45); pointer-events:none; z-index:1; opacity:0; animation:dustDrift 3.8s ease-in-out forwards; }
  @keyframes dustDrift { 0%{opacity:0;} 15%{opacity:0.45;} 100%{opacity:0; transform:translate(var(--ex), var(--ey));} }

  .float-text { position:absolute; transform:translate(-50%,0); font-weight:800; font-size:12px; white-space:nowrap; animation:floatUp 1s ease-out forwards; }
  @keyframes floatUp { 0%{opacity:1; transform:translate(-50%,0);} 100%{opacity:0; transform:translate(-50%,-24px);} }
  .float-text.info { color:var(--dinero); }

  .cell { width:1ch; height:1.15em; display:flex; align-items:center; justify-content:center; }
  .c-wall{color:var(--wood);} .c-wall-dim{color:var(--wood-dim);}
  .c-floor{color:var(--sand);} .c-floor-dim{color:var(--sand-dim);}

  .c-outlaw{color:var(--outlaw); font-weight:700;} .c-boss{color:var(--boss); font-weight:800; text-shadow:0 0 8px rgba(201,79,61,0.6);}
  .c-loot{color:var(--dinero); text-shadow:0 0 6px rgba(201,164,65,0.5);}
  .c-saloon{color:#c793e8; font-weight:800; animation:pulseSaloon 1.6s ease-in-out infinite;}

  .c-exit-dim{color:var(--exit-dim); font-weight:800;}
  .c-hidden{color:transparent;}
  @keyframes pulseExit { 0%,100%{text-shadow:0 0 6px rgba(95,224,199,0.5);} 50%{text-shadow:0 0 15px rgba(95,224,199,0.95);} }
  @keyframes pulseSaloon { 0%,100%{text-shadow:0 0 6px rgba(199,147,232,0.5);} 50%{text-shadow:0 0 15px rgba(199,147,232,0.95);} }

  .log { margin-top:10px; background:var(--panel); border:1px solid var(--panel-edge); border-radius:6px; padding:8px 10px; font-size:11.5px; color:var(--dim); min-height:62px; }
  .log div { margin:2px 0; } .log div:last-child { color:var(--parchment); }

  .controls { margin-top:14px; display:flex; justify-content:center; align-items:center; gap:10px; }
  .dpad { display:grid; grid-template-columns:42px 42px 42px; grid-template-rows:42px 42px 42px; gap:4px; }
  .dpad button.up{grid-row:1;grid-column:2;} .dpad button.left{grid-row:2;grid-column:1;}
  .dpad button.right{grid-row:2;grid-column:3;} .dpad button.down{grid-row:3;grid-column:2;}
  button { font-family:inherit; background:#2a1f12; color:var(--parchment); border:1px solid var(--panel-edge); border-radius:8px; cursor:pointer; font-size:14px; transition:background 0.15s ease, transform 0.05s ease; }
  button:active { transform:scale(0.93); background:#3a2c1a; }
  .hint { text-align:center; color:var(--dim); font-size:10.5px; margin-top:10px; letter-spacing:0.5px; }

  .overlay { position:fixed; inset:0; background:rgba(12,8,4,0.95); display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:10; text-align:center; padding:16px; }
  .overlay.show { display:flex; }
  .overlay h2 { color:var(--danger); letter-spacing:2px; font-size:19px; margin:0; }
  .overlay h2.win { color:var(--accent); }
  .overlay p { color:var(--dim); max-width:340px; font-size:13px; }
  .overlay button { padding:10px 22px; font-size:13px; color:var(--accent); }

  .shop-panel { background:var(--panel); border:1px solid var(--panel-edge); border-radius:10px; padding:16px; width:100%; max-width:340px; text-align:left; }
  .shop-panel h3 { margin:0 0 10px; font-size:13px; letter-spacing:1px; color:var(--dinero); }
  .shop-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--panel-edge); font-size:11.5px; }
  .shop-row:last-child { border-bottom:none; }
  .shop-row button { font-size:10.5px; padding:6px 12px; color:var(--parchment); }
  .shop-row button:disabled { opacity:0.35; cursor:default; }
  .shop-close { margin-top:12px; width:100%; color:var(--dim); }

  /* Duel screen — the signature moment */
  .duel-panel { background:#0e0a06; border:2px solid var(--wood); border-radius:12px; padding:28px 20px; width:100%; max-width:360px; text-align:center; position:relative; overflow:hidden; }
  .duel-vs { font-size:11px; color:var(--dim); letter-spacing:2px; margin-bottom:16px; }
  .duel-cue { font-size:26px; font-weight:800; letter-spacing:3px; min-height:40px; color:var(--dim); transition:color 0.1s ease; }
  .duel-cue.ready { color:var(--danger); text-shadow:0 0 18px rgba(201,79,61,0.7); animation:cuePulse 0.4s ease infinite; }
  @keyframes cuePulse { 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.08);} }
  .duel-btn { margin-top:22px; width:100%; padding:16px; font-size:15px; font-weight:800; letter-spacing:1px; color:var(--parchment); background:#2a1f12; border:2px solid var(--panel-edge); }
  .duel-btn.hot { border-color:var(--danger); color:var(--danger); }
  .duel-result { margin-top:14px; font-size:11.5px; color:var(--dim); min-height:20px; }
  .duel-hp-row { display:flex; justify-content:space-between; font-size:10.5px; color:var(--dim); margin-top:16px; }
</style>

<div class="wrap">
  <a class="back" href="index.html">← ASCIICAVE</a>
  <div class="title">
    <h1>PUEBLO FANTASMA</h1>
    <div class="title-right">
      <span class="record" id="recordLabel">Récord: Pueblo 1</span>
      <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>
  </div>
  <div class="subbar">
    <span class="zone" id="zoneLabel">PUEBLO 1</span>
    <span class="dinero" id="dineroLabel">💰 0</span>
    <span id="balasLabel">🔫 6 balas</span>
  </div>

  <div class="stats">
    <div class="stat-row"><span class="ic">❤</span><div class="bar"><div class="bar-fill fill-hp" id="hpFill"></div></div><span class="stat-num" id="hpText">20/20</span></div>
  </div>

  <div class="stage" id="stage">
    <div id="grid"></div>
    <div id="fx"></div>
  </div>

  <div class="log" id="log"></div>

  <div class="controls">
    <div class="dpad">
      <button class="up" onclick="handleMove(0,-1)">▲</button>
      <button class="left" onclick="handleMove(-1,0)">◀</button>
      <button class="right" onclick="handleMove(1,0)">▶</button>
      <button class="down" onclick="handleMove(0,1)">▼</button>
    </div>
  </div>
  <div class="hint">Flechas/WASD mueven · pisa un forajido (O) para un duelo · S es el saloon</div>
</div>

  <h2 id="overlayTitle">HAS CAÍDO</h2>

</div>

<div class="overlay" id="shopOverlay">

    <h3>🥃 SALOON</h3>
    <div id="shopList"></div>
    <button class="shop-close" onclick="closeShop()">Salir</button>
  </div>
</div>

<div class="overlay" id="duelOverlay">
  <div class="duel-panel">
    <div class="duel-vs" id="duelVs">TÚ vs FORAJIDO</div>
    <div class="duel-cue" id="duelCue">Prepárense...</div>
    <button class="duel-btn" id="duelBtn" onclick="handleDuelClick()">✊ ESPERA</button>
    <div class="duel-result" id="duelResult"></div>
    <div class="duel-hp-row">
      <span id="duelPlayerHp">Tú: 20 HP</span>
      <span id="duelEnemyHp">Forajido: 12 HP</span>
    </div>
  </div>
</div>

<script>
const VIEWPORT_W = 23, VIEWPORT_H = 15;
const VIEW_RADIUS = 5.5;

const OUTLAW_TYPES = [
  { char: 'o', name: 'pistolero', hp: 10, atk: 3, weight: 55, cls: 'c-outlaw' },
  { char: 'O', name: 'forajido curtido', hp: 16, atk: 5, weight: 30, cls: 'c-outlaw' },
];
const BOSS_TYPE = { char: 'B', name: 'forajido legendario', hp: 32, atk: 7, cls: 'c-boss' };

let state = {};
let bestZone = 1;
let audioCtx = null;

function zoneDimensions(zone) {
  const w = Math.min(38, 22 + (zone - 1) * 3);
  const h = Math.min(24, 15 + (zone - 1) * 2);
  return { w, h };
}

function freshPlayer() {
  return {
    x: 0, y: 0, hp: 20, maxHp: 20,
    dinero: 0, balas: 6,
    reflexLevel: 0, // upgraded at the saloon: lowers effective reaction thresholds
  };
}

function freshState() {
  return {
    zone: 1, world: { w: 0, h: 0 },
    player: freshPlayer(),
    grid: [], explored: [],
    outlaws: [], loot: [], saloon: null,
    exit: { x: 0, y: 0 },
    messages: [], over: false, muted: false, shopOpen: false, duel: null,
  };
}

function inBounds(x, y) { return x >= 0 && x < state.world.w && y >= 0 && y < state.world.h; }

function generateTown(w, h) {
  let grid = [];
  for (let y = 0; y < h; y++) { let row = []; for (let x = 0; x < w; x++) { const border=(x===0||y===0||x===w-1||y===h-1); row.push(border?'#':(Math.random()<0.4?'#':'.')); } grid.push(row); }
  for (let iter=0; iter<4; iter++) {
    let next = grid.map(r=>r.slice());
    for (let y=1;y<h-1;y++) for (let x=1;x<w-1;x++) {
      let wc=0; for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){ if(dx===0&&dy===0) continue; if(grid[y+dy][x+dx]==='#') wc++; }
      next[y][x] = wc>=5 ? '#' : '.';
    }
    grid = next;
  }
  const cx=Math.floor(w/2), cy=Math.floor(h/2);
  let start=null; const bc=(x,y)=>x>=0&&x<w&&y>=0&&y<h;
  for (let r=0;r<Math.max(w,h)&&!start;r++) for (let dy=-r;dy<=r&&!start;dy++) for (let dx=-r;dx<=r&&!start;dx++) { const x=cx+dx,y=cy+dy; if(bc(x,y)&&grid[y][x]==='.') start={x,y}; }
  const visited=Array.from({length:h},()=>new Array(w).fill(false));
  const queue=[start]; visited[start.y][start.x]=true;
  const dist=Array.from({length:h},()=>new Array(w).fill(-1)); dist[start.y][start.x]=0;
  let farthest=start;
  const distOrder=[];
  while(queue.length){ const cur=queue.shift(); distOrder.push(cur); for(const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]){ const nx=cur.x+dx,ny=cur.y+dy; if(bc(nx,ny)&&!visited[ny][nx]&&grid[ny][nx]==='.'){ visited[ny][nx]=true; dist[ny][nx]=dist[cur.y][cur.x]+1; if(dist[ny][nx]>dist[farthest.y][farthest.x]) farthest={x:nx,y:ny}; queue.push({x:nx,y:ny}); } } }
  for (let y=0;y<h;y++) for (let x=0;x<w;x++) { if(grid[y][x]==='.'&&!visited[y][x]) grid[y][x]='#'; }
  const floorTiles=[]; for (let y=0;y<h;y++) for (let x=0;x<w;x++) { if(visited[y][x]) floorTiles.push({x,y}); }

  const midCandidates = distOrder.filter(t => dist[t.y][t.x] > 3 && dist[t.y][t.x] < dist[farthest.y][farthest.x] * 0.8);
  const saloon = midCandidates.length ? midCandidates[Math.floor(midCandidates.length / 2)] : null;

  return { grid, start, exit: farthest, saloon, floorTiles };
}

function manhattan(a,b){ return Math.abs(a.x-b.x)+Math.abs(a.y-b.y); }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function weightedPick(list){ const total=list.reduce((s,w)=>s+w.weight,0); let r=Math.random()*total; for(const w of list){ if(r<w.weight) return w; r-=w.weight; } return list[0]; }
function randRange(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }

function rollLoot() {
  const r = Math.random();
  if (r < 0.45) return { type: 'dinero', amount: randRange(5, 14) };
  if (r < 0.75) return { type: 'balas', amount: 2 };
  if (r < 0.92) return { type: 'whiskey', amount: 6 };
  return { type: 'nada' };
}

function newTown() {
  const { w, h } = zoneDimensions(state.zone);
  state.world = { w, h };
  const { grid, start, exit, saloon, floorTiles } = generateTown(w, h);
  state.grid = grid; state.exit = exit; state.saloon = saloon;
  state.explored = Array.from({ length: h }, () => new Array(w).fill(false));
  state.player.x = start.x; state.player.y = start.y;
  state.outlaws = []; state.loot = [];

  const candidates = shuffle(floorTiles.filter(t => manhattan(t, start) > 3 && (t.x !== exit.x || t.y !== exit.y) && (!saloon || t.x !== saloon.x || t.y !== saloon.y)));
  const area = floorTiles.length;
  const outlawCount = Math.min(12, 2 + state.zone + Math.floor(area / 80));
  const typeCap = Math.min(OUTLAW_TYPES.length - 1, Math.floor((state.zone - 1) / 2));
  const pool = OUTLAW_TYPES.slice(0, typeCap + 1);

  for (let i = 0; i < outlawCount && candidates.length; i++) {
    const spot = candidates.pop();
    const t = weightedPick(pool);
    state.outlaws.push(makeOutlaw(t, spot.x, spot.y));
  }
  if (state.zone % 5 === 0 && candidates.length) {
    const spot = candidates.pop();
    state.outlaws.push(makeOutlaw(BOSS_TYPE, spot.x, spot.y, true));
    log('Un forajido legendario ronda este pueblo...');
  }
  const lootCount = Math.min(8, 2 + Math.floor(state.zone / 2) + Math.floor(area / 70));
  for (let i = 0; i < lootCount && candidates.length; i++) { const spot = candidates.pop(); state.loot.push({ x: spot.x, y: spot.y }); }

  log(`Pueblo ${state.zone}: entras en un pueblo silencioso (${w}x${h}).`);
}

function makeOutlaw(t, x, y, isBoss) {
  const scale = isBoss ? 1 : (1 + (state.zone - 1) * 0.12);
  return { x, y, char: t.char, cls: t.cls, name: t.name, isBoss: !!isBoss, hp: Math.round(t.hp * scale), maxHp: Math.round(t.hp * scale), atk: Math.round(t.atk * (isBoss?1:(1+(state.zone-1)*0.08))), alive: true };
}

function log(msg) { state.messages.push(msg); state.messages = state.messages.slice(-4); }
function outlawAt(x, y) { return state.outlaws.find(o => o.alive && o.x === x && o.y === y); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function getCamera() {
  const { w, h } = state.world;
  const camX = Math.max(0, Math.min(Math.max(0, w - VIEWPORT_W), state.player.x - Math.floor(VIEWPORT_W / 2)));
  const camY = Math.max(0, Math.min(Math.max(0, h - VIEWPORT_H), state.player.y - Math.floor(VIEWPORT_H / 2)));
  return { camX, camY };
}

// --- Audio ---
function ensureAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
function beep(freq,duration,type,vol,glide){
  if(state.muted) return;
  try{
    ensureAudio();
    const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain();
    osc.type=type||'square'; osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
    if(glide) osc.frequency.exponentialRampToValueAtTime(Math.max(20,freq+glide),audioCtx.currentTime+duration);
    gain.gain.setValueAtTime(vol||0.05,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration);
    osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+duration);
  }catch(e){}
}
function sfx(name){
  switch(name){
    case 'shot': beep(200,0.1,'square',0.08,-140); break;
    case 'hit': beep(120,0.12,'sawtooth',0.06,-60); break;
    case 'falsestart': beep(140,0.3,'sawtooth',0.07,-120); break;
    case 'cue': beep(600,0.08,'square',0.05,120); break;
    case 'gold': beep(700,0.1,'sine',0.04,140); break;
    case 'heal': beep(500,0.18,'sine',0.05,220); break;
    case 'win': [520,660,780,880].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'square',0.05),i*100)); break;
    case 'death': beep(140,0.35,'triangle',0.05,-110); break;
    case 'shop': beep(440,0.12,'sine',0.05,100); break;
  }
}
function toggleMute(){ state.muted=!state.muted; document.getElementById('muteBtn').textContent=state.muted?'🔇':'🔊'; }

function spawnFloatText(wx,wy,text,cls){
  const {camX,camY}=getCamera(); const vx=wx-camX, vy=wy-camY;
  if (vx<0||vx>=VIEWPORT_W||vy<0||vy>=VIEWPORT_H) return;
  const fx=document.getElementById('fx'); const gridEl=document.getElementById('grid');
  const cw=gridEl.offsetWidth/VIEWPORT_W||10, ch=gridEl.offsetHeight/VIEWPORT_H||16;
  const el=document.createElement('div'); el.className='float-text '+cls; el.textContent=text;
  el.style.left=(vx*cw+cw/2)+'px'; el.style.top=(vy*ch)+'px';
  fx.appendChild(el); setTimeout(()=>el.remove(),1000);
}
function spawnDust(){
  const s=document.getElementById('stage'); if(!s) return;
  const el=document.createElement('div'); el.className='dust';
  el.style.left=(Math.random()*s.clientWidth)+'px'; el.style.top=(Math.random()*s.clientHeight)+'px';
  el.style.setProperty('--ex',(Math.random()*30-15)+'px'); el.style.setProperty('--ey',(Math.random()*20-10)+'px');
  s.appendChild(el); setTimeout(()=>el.remove(),3900);
}
setInterval(spawnDust, 700);

async function loadRecord(){
  try{ if(window.storage){ const res=await window.storage.get('pueblo-fantasma-best', false); if(res&&res.value) bestZone=JSON.parse(res.value).bestZone||1; } }catch(e){}
  updateRecordLabel();
}
async function saveRecordIfBetter(){
  if(state.zone>bestZone){ bestZone=state.zone; updateRecordLabel(); try{ if(window.storage) await window.storage.set('pueblo-fantasma-best', JSON.stringify({bestZone}), false); }catch(e){} }
}
function updateRecordLabel(){ const el=document.getElementById('recordLabel'); if(el) el.textContent=`Récord: Pueblo ${bestZone}`; }

// --- Movement ---
function handleMove(dx, dy) {
  if (state.over || state.shopOpen || state.duel) return;
  const p = state.player;
  const nx = p.x + dx, ny = p.y + dy;

  const target = outlawAt(nx, ny);
  if (target) { startDuel(target); return; }

  if (inBounds(nx, ny) && state.grid[ny][nx] !== '#') {
    p.x = nx; p.y = ny;
    const item = state.loot.find(it => it.x === nx && it.y === ny);
    if (item) { state.loot = state.loot.filter(it => it !== item); collectLoot(); }

    if (state.saloon && nx === state.saloon.x && ny === state.saloon.y) { openShop(); return; }

    if (nx === state.exit.x && ny === state.exit.y) {
      state.zone++;
      log('Sales de este pueblo hacia el siguiente, más peligroso...');
      saveRecordIfBetter();
      newTown();
      render();
      return;
    }
  }
  render();
}

function collectLoot() {
  const p = state.player;
  const roll = rollLoot();
  if (roll.type === 'nada') { log('Solo polvo y tumbleweeds.'); return; }
  if (roll.type === 'dinero') { p.dinero += roll.amount; log(`Encuentras ${roll.amount} de dinero.`); spawnFloatText(p.x, p.y, '+' + roll.amount, 'info'); }
  else if (roll.type === 'balas') { p.balas += roll.amount; log(`Encuentras ${roll.amount} balas.`); spawnFloatText(p.x, p.y, '+' + roll.amount, 'info'); }
  else if (roll.type === 'whiskey') { p.hp = Math.min(p.maxHp, p.hp + roll.amount); log(`Bebes whiskey. (+${roll.amount} HP)`); spawnFloatText(p.x, p.y, '+' + roll.amount, 'info'); }
  sfx('gold');
}

// --- Saloon shop ---
const SALOON_OFFERS = [
  { id: 'whiskey', label: 'Whiskey (+12 HP)', cost: 8 },
  { id: 'balas', label: '+6 balas', cost: 8 },
  { id: 'reflex', label: 'Guantelete rápido (mejora reflejos)', cost: 30 },
];
function openShop() { state.shopOpen = true; renderShop(); document.getElementById('shopOverlay').classList.add('show'); }
function closeShop() { state.shopOpen = false; document.getElementById('shopOverlay').classList.remove('show'); render(); }
function shopBuy(id) {
  const p = state.player;
  const offer = SALOON_OFFERS.find(o => o.id === id);
  if (p.dinero < offer.cost) { renderShop(); return; }
  p.dinero -= offer.cost;
  if (id === 'whiskey') { p.hp = Math.min(p.maxHp, p.hp + 12); log('Bebes un whiskey en el saloon.'); }
  else if (id === 'balas') { p.balas += 6; log('Compras munición.'); }
  else if (id === 'reflex') { p.reflexLevel++; log('Tus reflejos mejoran. Serás más rápido al desenfundar.'); }
  sfx('shop');
  renderShop();
}
function renderShop() {
  document.getElementById('shopList').innerHTML = SALOON_OFFERS.map(o => `
    <div class="shop-row"><span>${o.label}</span><button onclick="shopBuy('${o.id}')" ${state.player.dinero >= o.cost ? '' : 'disabled'}>${o.cost} 💰</button></div>
  `).join('');
}

// --- Duel: the signature reaction-time mechanic ---
function reflexThresholds() {
  const reduction = state.player.reflexLevel * 30;
  return {
    perfect: Math.max(150, 260 - reduction),
    good: Math.max(300, 460 - reduction),
    slow: Math.max(450, 700 - reduction),
  };
}

function startDuel(outlaw) {
  state.duel = { outlaw, phase: 'waiting', cueTime: 0, resolved: false };
  document.getElementById('duelVs').textContent = `TÚ vs ${outlaw.name.toUpperCase()}`;
  document.getElementById('duelCue').textContent = 'Prepárense...';
  document.getElementById('duelCue').className = 'duel-cue';
  document.getElementById('duelBtn').className = 'duel-btn';
  document.getElementById('duelBtn').textContent = '✊ ESPERA';
  document.getElementById('duelResult').textContent = '';
  updateDuelHp();
  document.getElementById('duelOverlay').classList.add('show');

  const delay = 700 + Math.random() * 1800;
  state.duel.timerId = setTimeout(() => {
    if (!state.duel) return;
    state.duel.phase = 'ready';
    state.duel.cueTime = Date.now();
    document.getElementById('duelCue').textContent = '¡AHORA!';
    document.getElementById('duelCue').classList.add('ready');
    document.getElementById('duelBtn').className = 'duel-btn hot';
    document.getElementById('duelBtn').textContent = '🔫 ¡DISPARAR!';
    sfx('cue');
  }, delay);
}

function updateDuelHp() {
  const d = state.duel;
  if (!d) return;
  document.getElementById('duelPlayerHp').textContent = `Tú: ${Math.max(0, Math.round(state.player.hp))} HP`;
  document.getElementById('duelEnemyHp').textContent = `${capitalize(d.outlaw.name)}: ${Math.max(0, d.outlaw.hp)} HP`;
}

function handleDuelClick() {
  const d = state.duel;
  if (!d || d.resolved) return;

  if (d.phase === 'waiting') {
    // false start
    clearTimeout(d.timerId);
    resolveDuelRound(-1, true);
    return;
  }

  const reactionMs = Date.now() - d.cueTime;
  resolveDuelRound(reactionMs, false);
}

// Pure-ish resolver so this is unit-testable independent of real timers
function resolveDuelRound(reactionMs, falseStart) {
  const d = state.duel;
  const p = state.player;
  const th = reflexThresholds();
  d.resolved = true;

  if (falseStart) {
    sfx('falsestart');
    document.getElementById('duelResult').textContent = '¡Has desenfundado demasiado pronto!';
    const dmg = Math.max(1, d.outlaw.atk + 2);
    p.hp -= dmg;
    spawnFloatText(p.x, p.y, '-' + dmg, 'info');
    log(`Desenfundas antes de tiempo. ${capitalize(d.outlaw.name)} te dispara (-${dmg}).`);
  } else if (p.balas <= 0) {
    document.getElementById('duelResult').textContent = 'Sin balas... solo puedes esquivar.';
    const dmg = Math.max(1, d.outlaw.atk);
    p.hp -= dmg;
    log(`No tienes balas. ${capitalize(d.outlaw.name)} dispara (-${dmg}).`);
  } else {
    p.balas--;
    let dmg, label, enemyReturns;
    if (reactionMs <= th.perfect) { dmg = 14; label = `¡Disparo perfecto! (${reactionMs}ms)`; enemyReturns = false; }
    else if (reactionMs <= th.good) { dmg = 9; label = `Buen disparo. (${reactionMs}ms)`; enemyReturns = true; }
    else if (reactionMs <= th.slow) { dmg = 4; label = `Disparo lento, rozas al forajido. (${reactionMs}ms)`; enemyReturns = true; }
    else { dmg = 0; label = `Demasiado lento, fallas. (${reactionMs}ms)`; enemyReturns = true; }

    sfx('shot');
    d.outlaw.hp -= dmg;
    if (dmg > 0) spawnFloatText(d.outlaw.x, d.outlaw.y, '-' + dmg, 'info');
    document.getElementById('duelResult').textContent = label;
    log(label);

    if (enemyReturns && d.outlaw.hp > 0) {
      const edmg = Math.max(1, d.outlaw.atk + Math.floor(Math.random()*3) - 1);
      p.hp -= edmg;
      spawnFloatText(p.x, p.y, '-' + edmg, 'info');
      sfx('hit');
      log(`${capitalize(d.outlaw.name)} te dispara de vuelta (-${edmg}).`);
    }
  }

  updateDuelHp();

  setTimeout(() => {
    if (!state.duel) return;
    if (state.player.hp <= 0) {
      endDuelDeath();
    } else if (d.outlaw.hp <= 0) {
      endDuelVictory();
    } else {
      d.resolved = false;
      d.phase = 'waiting';
      document.getElementById('duelCue').textContent = 'Prepárense...';
      document.getElementById('duelCue').className = 'duel-cue';
      document.getElementById('duelBtn').className = 'duel-btn';
      document.getElementById('duelBtn').textContent = '✊ ESPERA';
      document.getElementById('duelResult').textContent = '';
      const delay = 700 + Math.random() * 1800;
      d.timerId = setTimeout(() => {
        if (!state.duel) return;
        d.phase = 'ready';
        d.cueTime = Date.now();
        document.getElementById('duelCue').textContent = '¡AHORA!';
        document.getElementById('duelCue').classList.add('ready');
        document.getElementById('duelBtn').className = 'duel-btn hot';
        document.getElementById('duelBtn').textContent = '🔫 ¡DISPARAR!';
        sfx('cue');
      }, delay);
    }
  }, 900);
}

function endDuelVictory() {
  const d = state.duel;
  d.outlaw.alive = false;
  const bonus = d.outlaw.isBoss ? randRange(40, 70) : randRange(10, 22);
  state.player.dinero += bonus;
  log(`¡Derrotas a ${d.outlaw.name}! Saqueas ${bonus} de dinero.`);
  sfx(d.outlaw.isBoss ? 'win' : 'hit');
  document.getElementById('duelOverlay').classList.remove('show');
  state.duel = null;
  state.outlaws = state.outlaws.filter(o => o.alive);
  render();
}
function endDuelDeath() {
  state.over = true; state.deathCause = 'duel';
  sfx('death');
  log('Caes en el polvo del pueblo...');
  document.getElementById('duelOverlay').classList.remove('show');
  state.duel = null;
  render();
  showOverlay();
}

// --- Render ---
function showOverlay() {
  document.getElementById('overlayTitle').textContent = 'HAS CAÍDO';
  document.getElementById('overlayText').textContent = `Caíste en el pueblo ${state.zone}, con ${state.player.dinero} de dinero acumulado.`;
  document.getElementById('overlay').classList.add('show');
}
function restart() {
  document.getElementById('overlay').classList.remove('show');
  const muted = state.muted;
  state = freshState();
  state.muted = muted;
  newTown();
  render();
}

function render() {
  const p = state.player;
  document.getElementById('zoneLabel').textContent = `PUEBLO ${state.zone} (${state.world.w}x${state.world.h})`;
  document.getElementById('dineroLabel').textContent = `💰 ${p.dinero}`;
  document.getElementById('balasLabel').textContent = `🔫 ${p.balas} balas`;

  const hpPct = Math.max(0, Math.round((p.hp / p.maxHp) * 100));
  const hpFill = document.getElementById('hpFill');
  hpFill.style.width = hpPct + '%';
  hpFill.className = 'bar-fill fill-hp' + (hpPct <= 30 ? ' low' : '');
  document.getElementById('hpText').textContent = `${Math.max(0, Math.round(p.hp))}/${p.maxHp}`;

  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${VIEWPORT_W}, 1ch)`;
  gridEl.innerHTML = '';

  const { camX, camY } = getCamera();
  const px = p.x, py = p.y;

  for (let vy = 0; vy < VIEWPORT_H; vy++) {
    for (let vx = 0; vx < VIEWPORT_W; vx++) {
      const wx = camX + vx, wy = camY + vy;
      const span = document.createElement('span'); span.className = 'cell';
      if (!inBounds(wx, wy)) { span.textContent = ' '; span.classList.add('c-hidden'); gridEl.appendChild(span); continue; }

      const d = Math.hypot(wx - px, wy - py);
      const visibleNow = d <= VIEW_RADIUS;
      if (visibleNow) state.explored[wy][wx] = true;
      const explored = state.explored[wy][wx];
      if (!visibleNow && !explored) { span.textContent = ' '; span.classList.add('c-hidden'); gridEl.appendChild(span); continue; }

      let ch = state.grid[wy][wx] === '#' ? '#' : '.';
      let cls = state.grid[wy][wx] === '#' ? (visibleNow ? 'c-wall' : 'c-wall-dim') : (visibleNow ? 'c-floor' : 'c-floor-dim');

      if (wx === state.exit.x && wy === state.exit.y) { ch = '>'; cls = visibleNow ? 'c-exit' : 'c-exit-dim'; }
      if (state.saloon && wx === state.saloon.x && wy === state.saloon.y) { ch = 'S'; cls = visibleNow ? 'c-saloon' : 'c-saloon-dim'; }

      if (visibleNow) {
        const item = state.loot.find(it => it.x === wx && it.y === wy);
        if (item) { ch = '$'; cls = 'c-loot'; }
        const o = outlawAt(wx, wy);
        if (o) { ch = o.char; cls = o.cls; }
      }

      if (wx === px && wy === py) { ch = '@'; cls = 'c-player'; }
      span.textContent = ch; span.classList.add(cls); gridEl.appendChild(span);
    }
  }

  const fxEl = document.getElementById('fx');
  fxEl.style.width = gridEl.offsetWidth + 'px'; fxEl.style.height = gridEl.offsetHeight + 'px';
  document.getElementById('log').innerHTML = state.messages.map(m => `<div>${m}</div>`).join('');
}

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (state.duel) {
    if (key === ' ' || key === 'f') handleDuelClick();
    return;
  }
  if (key === 'arrowup' || key === 'w') handleMove(0, -1);
  else if (key === 'arrowdown' || key === 's') handleMove(0, 1);
  else if (key === 'arrowleft' || key === 'a') handleMove(-1, 0);
  else if (key === 'arrowright' || key === 'd') handleMove(1, 0);
});

state = freshState();
newTown();
loadRecord();
render();
</script>
</body>
</html>
