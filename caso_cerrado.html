<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap');
  :root{
    --bg:#0f0b08; --panel:#1a140f; --panel-edge:#3a2e20;
    --wall:#5a4530; --wall-dim:#332818; --floor:#3a2f22; --floor-dim:#221b13;
    --suspect:#c9986a; --clue:#e8c15a; --player:#d9a441;

    --parchment:#ecdfc4; --dim:#8a7860; --danger:#c9503a; --accent:#d9a441;

  .title { display:flex; align-items:center; justify-content:space-between; margin:8px 0 4px; }
  .title h1 { font-size:14px; letter-spacing:2.5px; font-weight:800; margin:0; color:var(--accent); text-shadow:0 0 10px rgba(217,164,65,0.4); }
  .title-right { display:flex; align-items:center; gap:8px; }
  .record { font-size:10px; color:var(--dim); }
  .icon-btn { width:26px; height:26px; padding:0; font-size:13px; display:flex; align-items:center; justify-content:center; }
  .subbar { display:flex; gap:10px; font-size:10.5px; color:var(--dim); letter-spacing:1px; margin-bottom:8px; flex-wrap:wrap; }
  .subbar .case { color:var(--exit); }
  .subbar .turns.warn { color:var(--turns); animation:blinkWarn 1s step-end infinite; }
  @keyframes blinkWarn { 50% { opacity:0.35; } }

  .stats { background:var(--panel); border:1px solid var(--panel-edge); border-radius:6px; padding:8px 10px; margin-bottom:6px; font-size:11.5px; display:flex; justify-content:space-between; }

  .stage { position:relative; background:#0a0705; border:1px solid var(--panel-edge); border-radius:8px; padding:10px; box-shadow:inset 0 0 40px rgba(217,164,65,0.05); overflow:hidden; }
  .stage::after { content:""; position:absolute; inset:0; pointer-events:none; z-index:3; background:repeating-linear-gradient(0deg, rgba(255,255,255,0.014) 0px, rgba(255,255,255,0.014) 1px, transparent 1px, transparent 3px); }

  #grid { position:relative; z-index:2; display:grid; line-height:1; font-size:16px; white-space:pre; text-align:center; }
  #fx { position:absolute; top:10px; left:10px; overflow:visible; pointer-events:none; z-index:4; }

  .dust { position:absolute; width:2px; height:2px; border-radius:50%; background:rgba(232,193,90,0.4); pointer-events:none; z-index:1; opacity:0; animation:dustDrift 3.6s ease-in-out forwards; }
  @keyframes dustDrift { 0%{opacity:0;} 15%{opacity:0.4;} 100%{opacity:0; transform:translate(var(--ex), var(--ey));} }

  .float-text { position:absolute; transform:translate(-50%,0); font-weight:800; font-size:12px; white-space:nowrap; animation:floatUp 1s ease-out forwards; }
  @keyframes floatUp { 0%{opacity:1; transform:translate(-50%,0);} 100%{opacity:0; transform:translate(-50%,-24px);} }
  .float-text.info { color:var(--clue); }

  .cell { width:1ch; height:1.15em; display:flex; align-items:center; justify-content:center; }
  .c-wall{color:var(--wall);} .c-wall-dim{color:var(--wall-dim);}
  .c-floor{color:var(--floor);} .c-floor-dim{color:var(--floor-dim);}
  .c-player{color:var(--player); text-shadow:0 0 8px rgba(217,164,65,0.7); font-weight:800;}
  .c-suspect{color:var(--suspect); font-weight:800;}
  .c-clue{color:var(--clue); text-shadow:0 0 6px rgba(232,193,90,0.55);}
  .c-exit{color:var(--exit); font-weight:800; animation:pulseExit 1.6s ease-in-out infinite;}
  .c-exit-dim{color:var(--exit-dim); font-weight:800;}

  @keyframes pulseExit { 0%,100%{text-shadow:0 0 6px rgba(95,224,199,0.5);} 50%{text-shadow:0 0 15px rgba(95,224,199,0.95);} }

  .log { margin-top:10px; background:var(--panel); border:1px solid var(--panel-edge); border-radius:6px; padding:8px 10px; font-size:11.5px; color:var(--dim); min-height:62px; }
  .log div { margin:2px 0; } .log div:last-child { color:var(--parchment); }

  .controls { margin-top:14px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .dpad { display:grid; grid-template-columns:42px 42px 42px; grid-template-rows:42px 42px 42px; gap:4px; }
  .dpad button.up{grid-row:1;grid-column:2;} .dpad button.left{grid-row:2;grid-column:1;}
  .dpad button.right{grid-row:2;grid-column:3;} .dpad button.down{grid-row:3;grid-column:2;}
  button { font-family:inherit; background:#1f180f; color:var(--parchment); border:1px solid var(--panel-edge); border-radius:8px; cursor:pointer; font-size:14px; transition:background 0.15s ease, transform 0.05s ease; }
  button:active { transform:scale(0.93); background:#2a2015; }
  .actions { display:flex; flex-direction:column; gap:5px; }
  .btn-notebook, .btn-accuse { width:120px; height:33px; font-weight:700; font-size:11px; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-notebook { color:var(--clue); border-color:rgba(232,193,90,0.4); }
  .btn-accuse { color:var(--danger); border-color:rgba(201,80,58,0.4); }
  .hint { text-align:center; color:var(--dim); font-size:10.5px; margin-top:10px; letter-spacing:0.5px; }

  .overlay { position:fixed; inset:0; background:rgba(8,6,4,0.94); display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:10; text-align:center; padding:20px; }
  .overlay.show { display:flex; }
  .overlay h2 { color:var(--danger); letter-spacing:2px; font-size:19px; margin:0; }
  .overlay h2.win { color:var(--clue); }
  .overlay p { color:var(--dim); max-width:340px; font-size:13px; line-height:1.5; }
  .overlay button { padding:10px 22px; font-size:13px; color:var(--accent); }

  .inv-panel { background:var(--panel); border:1px solid var(--panel-edge); border-radius:10px; padding:16px; width:100%; max-width:360px; text-align:left; max-height:80vh; overflow-y:auto; }
  .inv-panel h3 { margin:0 0 10px; font-size:13px; letter-spacing:1px; color:var(--clue); }
  .inv-row { padding:8px 0; border-bottom:1px solid var(--panel-edge); font-size:11.5px; color:var(--parchment); line-height:1.4; }
  .inv-row:last-child { border-bottom:none; }
  .inv-close { margin-top:12px; width:100%; color:var(--dim); }

  .accuse-row { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--panel-edge); font-size:12px; }
  .accuse-row:last-child { border-bottom:none; }
  .accuse-row button { font-size:11px; padding:7px 14px; color:var(--danger); }

  .dialog-panel { background:var(--panel); border:1px solid var(--suspect); border-radius:10px; padding:18px; width:100%; max-width:340px; text-align:left; }
  .dialog-panel h3 { margin:0 0 10px; font-size:13px; color:var(--suspect); letter-spacing:1px; }
  .dialog-line { font-size:12px; color:var(--parchment); margin-bottom:14px; line-height:1.5; font-style:italic; }
  .dialog-panel button { width:100%; margin-bottom:8px; padding:9px; font-size:11.5px; color:var(--parchment); }
</style>

<body>
<div class="wrap">
  <a class="back" href="index.html">← ASCIICAVE</a>
  <div class="title">
    <h1>CASO CERRADO</h1>
    <div class="title-right">
      <span class="record" id="recordLabel">Récord: 0 casos</span>
      <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>
  </div>
  <div class="subbar">
    <span class="case" id="caseLabel">CASO 1</span>
    <span id="turnsLabel">Turnos: 45</span>
  </div>

  <div class="stats">
    <span id="cluesCountLabel">📓 0 pistas recogidas</span>
    <span id="suspectsCountLabel">🕵 0/4 interrogados</span>
  </div>

  <div class="stage" id="stage">
    <div id="grid"></div>
    <div id="fx"></div>
  </div>

  <div class="log" id="log"></div>

  <div class="controls">
    <div class="dpad">
      <button class="up" onclick="handleMove(0,-1)">▲</button>
      <button class="left" onclick="handleMove(-1,0)">◀</button>
      <button class="right" onclick="handleMove(1,0)">▶</button>
      <button class="down" onclick="handleMove(0,1)">▼</button>
    </div>
    <div class="actions">
      <button class="btn-notebook" onclick="openNotebook()">📓 Libreta</button>
      <button class="btn-accuse" onclick="openAccuse()">⚖ Acusar</button>
    </div>
  </div>

  <div class="hint">Flechas/WASD mueven · pisa una pista (¡) o un sospechoso para investigar</div>
</div>

<div class="overlay" id="overlay">
  <h2 id="overlayTitle">CASO SIN RESOLVER</h2>
  <p id="overlayText"></p>
  <button onclick="restart()">Nuevo caso</button>
</div>

<div class="overlay" id="notebookOverlay">
  <div class="inv-panel">
    <h3>📓 LIBRETA DE PISTAS</h3>
    <div id="notebookList"></div>
    <button class="inv-close" onclick="closeNotebook()">Cerrar</button>
  </div>
</div>

<div class="overlay" id="accuseOverlay">
  <div class="inv-panel">
    <h3>⚖ ¿A QUIÉN ACUSAS?</h3>
    <div id="accuseList"></div>
    <button class="inv-close" onclick="closeAccuse()">Cancelar</button>
  </div>
</div>

<div class="overlay" id="dialogOverlay">
  <div class="dialog-panel">
    <h3 id="dialogName">Sospechoso</h3>
    <div class="dialog-line" id="dialogLine"></div>
    <button onclick="closeDialog()">Continuar investigando</button>
  </div>
</div>

<script>
const VIEWPORT_W = 23, VIEWPORT_H = 15;
const VIEW_RADIUS = 5.5;

const ALL_SUSPECTS = ['el Mayordomo', 'la Condesa', 'el Coronel', 'la Doctora', 'el Jardinero', 'la Actriz', 'el Anticuario'];
const ALL_WEAPONS = ['el candelabro', 'el veneno', 'la daga', 'la cuerda', 'la pistola'];
const ALL_ROOMS = ['la Biblioteca', 'el Salón', 'la Cocina', 'el Invernadero', 'el Desván', 'la Bodega'];

let state = {};
let bestCases = 0;
let audioCtx = null;

function zoneDimensions(caseNum) {
  const w = Math.min(40, 24 + (caseNum - 1) * 3);
  const h = Math.min(26, 16 + (caseNum - 1) * 2);
  return { w, h };
}

function shuffle(arr) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function pick(arr, n) { return shuffle(arr).slice(0, n); }

function freshState() {
  return {
    caseNum: 1,
    turnsLeft: 45,
    world: { w: 0, h: 0 },
    player: { x: 0, y: 0 },
    grid: [], explored: [],
    suspects: [], clues: [],
    exit: { x: 0, y: 0 },
    notebook: [],
    interrogated: new Set(),
    solution: null,
    messages: [], over: false, muted: false, notebookOpen: false, accuseOpen: false, dialogOpen: false,
  };
}

function inBounds(x, y) { return x >= 0 && x < state.world.w && y >= 0 && y < state.world.h; }

function generateMansion(w, h) {
  let grid = [];
  for (let y = 0; y < h; y++) {
    let row = [];
    for (let x = 0; x < w; x++) {
      const border = (x === 0 || y === 0 || x === w - 1 || y === h - 1);
      row.push(border ? '#' : (Math.random() < 0.4 ? '#' : '.'));
    }
    grid.push(row);
  }
  for (let iter = 0; iter < 4; iter++) {
    let next = grid.map(r => r.slice());
    for (let y = 1; y < h - 1; y++) for (let x = 1; x < w - 1; x++) {
      let wallCount = 0;
      for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        if (grid[y + dy][x + dx] === '#') wallCount++;
      }
      next[y][x] = wallCount >= 5 ? '#' : '.';
    }
    grid = next;
  }
  const cx = Math.floor(w / 2), cy = Math.floor(h / 2);
  let start = null;
  const bc = (x, y) => x >= 0 && x < w && y >= 0 && y < h;
  for (let r = 0; r < Math.max(w, h) && !start; r++) {
    for (let dy = -r; dy <= r && !start; dy++) for (let dx = -r; dx <= r && !start; dx++) {
      const x = cx + dx, y = cy + dy;
      if (bc(x, y) && grid[y][x] === '.') start = { x, y };
    }
  }
  const visited = Array.from({ length: h }, () => new Array(w).fill(false));
  const queue = [start]; visited[start.y][start.x] = true;
  const dist = Array.from({ length: h }, () => new Array(w).fill(-1)); dist[start.y][start.x] = 0;
  let farthest = start;
  while (queue.length) {
    const cur = queue.shift();
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = cur.x + dx, ny = cur.y + dy;
      if (bc(nx, ny) && !visited[ny][nx] && grid[ny][nx] === '.') {
        visited[ny][nx] = true; dist[ny][nx] = dist[cur.y][cur.x] + 1;
        if (dist[ny][nx] > dist[farthest.y][farthest.x]) farthest = { x: nx, y: ny };
        queue.push({ x: nx, y: ny });
      }
    }
  }
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) { if (grid[y][x] === '.' && !visited[y][x]) grid[y][x] = '#'; }
  const floorTiles = [];
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) { if (visited[y][x]) floorTiles.push({ x, y }); }
  return { grid, start, exit: farthest, floorTiles };
}

function manhattan(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }

function buildCase() {
  const suspectNames = pick(ALL_SUSPECTS, 4);
  const culprit = suspectNames[Math.floor(Math.random() * suspectNames.length)];
  const weapon = ALL_WEAPONS[Math.floor(Math.random() * ALL_WEAPONS.length)];
  const room = ALL_ROOMS[Math.floor(Math.random() * ALL_ROOMS.length)];
  const wrongWeapons = shuffle(ALL_WEAPONS.filter(w => w !== weapon));
  const innocents = suspectNames.filter(s => s !== culprit);

  const clueTexts = [];
  for (const innocent of innocents) {
    clueTexts.push(`${innocent} tiene una coartada confirmada por el servicio: no pudo cometer el crimen.`);
  }
  for (let i = 0; i < Math.min(2, wrongWeapons.length); i++) {
    clueTexts.push(`Los peritos descartan ${wrongWeapons[i]} como arma del crimen.`);
  }
  clueTexts.push(`Se hallaron marcas recientes en ${room}, cerca del lugar de los hechos.`);
  clueTexts.push(`Un testigo asegura haber oído ruidos extraños en ${room} esa misma noche.`);

  return { suspectNames, culprit, weapon, room, clueTexts: shuffle(clueTexts) };
}

function dialogLineFor(name, solution) {
  if (name === solution.culprit) {
    const evasive = [
      `"No... no recuerdo bien dónde estaba esa noche." Aparta la mirada, incómodo.`,
      `"¿Por qué me pregunta a mí? Pregunte a los demás." Suena a la defensiva.`,
      `Duda antes de responder, y cambia de tema rápidamente.`,
    ];
    return evasive[Math.floor(Math.random() * evasive.length)];
  }
  const truthful = [
    `"Yo estaba con el servicio toda la noche, se lo pueden confirmar." Habla con calma.`,
    `"No vi nada extraño, pero oí pasos en ${solution.room} en algún momento." Parece sincero.`,
    `"Espero que atrapen a quien fue. Esto ha sido horrible." Se le nota afectado de verdad.`,
  ];
  return truthful[Math.floor(Math.random() * truthful.length)];
}

function newCase() {
  const { w, h } = zoneDimensions(state.caseNum);
  state.world = { w, h };
  const { grid, start, exit, floorTiles } = generateMansion(w, h);
  state.grid = grid;
  state.exit = exit;
  state.explored = Array.from({ length: h }, () => new Array(w).fill(false));
  state.player.x = start.x;
  state.player.y = start.y;
  state.notebook = [];
  state.interrogated = new Set();

  const solution = buildCase();
  state.solution = solution;

  const candidates = shuffle(floorTiles.filter(t => manhattan(t, start) > 3 && (t.x !== exit.x || t.y !== exit.y)));

  state.suspects = solution.suspectNames.map(name => {
    const spot = candidates.pop();
    return { name, x: spot.x, y: spot.y };
  });

  state.clues = solution.clueTexts.map(text => {
    const spot = candidates.pop();
    return spot ? { text, x: spot.x, y: spot.y, taken: false } : null;
  }).filter(Boolean);

  state.turnsLeft = Math.max(30, 45 - (state.caseNum - 1) * 2);
  log(`Caso ${state.caseNum}: un nuevo crimen requiere tu atención. Explora la mansión (${w}x${h}).`);
}

function log(msg) { state.messages.push(msg); state.messages = state.messages.slice(-4); }

function getCamera() {
  const { w, h } = state.world;
  const camX = Math.max(0, Math.min(Math.max(0, w - VIEWPORT_W), state.player.x - Math.floor(VIEWPORT_W / 2)));
  const camY = Math.max(0, Math.min(Math.max(0, h - VIEWPORT_H), state.player.y - Math.floor(VIEWPORT_H / 2)));
  return { camX, camY };
}

// --- Audio ---
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function beep(freq, duration, type, vol, glide) {
  if (state.muted) return;
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = type || 'square'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (glide) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + glide), audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}
function sfx(name) {
  switch (name) {
    case 'clue': beep(600, 0.12, 'sine', 0.05, 160); break;
    case 'talk': beep(340, 0.1, 'triangle', 0.05, 40); break;
    case 'win': [520,660,780,880].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'square',0.05),i*100)); break;
    case 'lose': beep(180, 0.4, 'sawtooth', 0.06, -100); break;
  }
}
function toggleMute() { state.muted = !state.muted; document.getElementById('muteBtn').textContent = state.muted ? '🔇' : '🔊'; }

function spawnFloatText(wx, wy, text, cls) {
  const { camX, camY } = getCamera();
  const vx = wx - camX, vy = wy - camY;
  if (vx < 0 || vx >= VIEWPORT_W || vy < 0 || vy >= VIEWPORT_H) return;
  const fx = document.getElementById('fx'); const gridEl = document.getElementById('grid');
  const cw = gridEl.offsetWidth / VIEWPORT_W || 10, ch = gridEl.offsetHeight / VIEWPORT_H || 16;
  const el = document.createElement('div'); el.className = 'float-text ' + cls; el.textContent = text;
  el.style.left = (vx * cw + cw / 2) + 'px'; el.style.top = (vy * ch) + 'px';
  fx.appendChild(el); setTimeout(() => el.remove(), 1000);
}
function spawnDust() {
  const s = document.getElementById('stage'); if (!s) return;
  const el = document.createElement('div'); el.className = 'dust';
  el.style.left = (Math.random() * s.clientWidth) + 'px'; el.style.top = (Math.random() * s.clientHeight) + 'px';
  el.style.setProperty('--ex', (Math.random() * 26 - 13) + 'px'); el.style.setProperty('--ey', (Math.random() * 26 - 13) + 'px');
  s.appendChild(el); setTimeout(() => el.remove(), 3700);
}
setInterval(spawnDust, 900);

async function loadRecord() {
  try { if (window.storage) { const res = await window.storage.get('caso-cerrado-best', false); if (res && res.value) bestCases = JSON.parse(res.value).bestCases || 0; } }
  catch (e) {}
  updateRecordLabel();
}
async function saveRecordIfBetter(solvedCount) {
  if (solvedCount > bestCases) {
    bestCases = solvedCount; updateRecordLabel();
    try { if (window.storage) await window.storage.set('caso-cerrado-best', JSON.stringify({ bestCases }), false); } catch (e) {}
  }
}
function updateRecordLabel() { const el = document.getElementById('recordLabel'); if (el) el.textContent = `Récord: ${bestCases} casos`; }

// --- Core actions ---
function handleMove(dx, dy) {
  if (state.over || state.notebookOpen || state.accuseOpen || state.dialogOpen) return;
  const p = state.player;
  const nx = p.x + dx, ny = p.y + dy;

  const suspect = state.suspects.find(s => s.x === nx && s.y === ny);
  if (suspect) { talkTo(suspect); return; }

  if (inBounds(nx, ny) && state.grid[ny][nx] !== '#') {
    p.x = nx; p.y = ny;
    const clue = state.clues.find(c => c.x === nx && c.y === ny && !c.taken);
    if (clue) {
      clue.taken = true;
      state.notebook.push(clue.text);
      log('Encuentras una pista y la anotas en tu libreta.');
      spawnFloatText(nx, ny, '¡pista!', 'info');
      sfx('clue');
    }

    if (nx === state.exit.x && ny === state.exit.y) {
      log('Llegas a la salida, pero el caso sigue abierto. Sigue investigando o acusa cuando estés listo.');
    }
  }
  tickTurn();
}

function talkTo(suspect) {
  state.dialogOpen = true;
  state.interrogated.add(suspect.name);
  const line = dialogLineFor(suspect.name, state.solution);
  document.getElementById('dialogName').textContent = suspect.name;
  document.getElementById('dialogLine').textContent = line;
  document.getElementById('dialogOverlay').classList.add('show');
  sfx('talk');
  render();
}
function closeDialog() { state.dialogOpen = false; document.getElementById('dialogOverlay').classList.remove('show'); tickTurn(); }

function tickTurn() {
  if (state.over) { render(); return; }
  state.turnsLeft--;
  if (state.turnsLeft <= 0) {
    state.over = true;
    state.result = 'timeout';
    sfx('lose');
    log('Se acaba el tiempo. El caso queda sin resolver...');
    render();
    showOverlay();
    return;
  }
  render();
}

// --- Notebook ---
function openNotebook() { if (state.over) return; state.notebookOpen = true; renderNotebook(); document.getElementById('notebookOverlay').classList.add('show'); }
function closeNotebook() { state.notebookOpen = false; document.getElementById('notebookOverlay').classList.remove('show'); }
function renderNotebook() {
  const el = document.getElementById('notebookList');
  el.innerHTML = state.notebook.length
    ? state.notebook.map(t => `<div class="inv-row">${t}</div>`).join('')
    : '<div class="inv-row">Aún no tienes pistas. Explora la mansión.</div>';
}

// --- Accusation ---
function openAccuse() { if (state.over) return; state.accuseOpen = true; renderAccuse(); document.getElementById('accuseOverlay').classList.add('show'); }
function closeAccuse() { state.accuseOpen = false; document.getElementById('accuseOverlay').classList.remove('show'); }
function renderAccuse() {
  const el = document.getElementById('accuseList');
  el.innerHTML = state.solution.suspectNames.map(name =>
    `<div class="accuse-row"><span>${name}</span><button onclick="accuse('${name}')">Acusar</button></div>`
  ).join('');
}
function accuse(name) {
  closeAccuse();
  state.over = true;
  if (name === state.solution.culprit) {
    state.result = 'win';
    sfx('win');
    log(`¡Correcto! ${name} era el culpable.`);
  } else {
    state.result = 'lose';
    sfx('lose');
    log(`Te equivocas. El verdadero culpable era ${state.solution.culprit}.`);
  }
  render();
  showOverlay();
}

// --- Render ---
function showOverlay() {
  const s = state.solution;
  const title = document.getElementById('overlayTitle');
  const text = document.getElementById('overlayText');
  if (state.result === 'win') {
    title.textContent = 'CASO RESUELTO';
    title.className = 'win';
    text.textContent = `Acertaste: ${s.culprit} cometió el crimen con ${s.weapon} en ${s.room}.`;
  } else if (state.result === 'timeout') {
    title.textContent = 'SE ACABÓ EL TIEMPO';
    title.className = '';
    text.textContent = `La solución era: ${s.culprit}, con ${s.weapon}, en ${s.room}.`;
  } else {
    title.textContent = 'ACUSACIÓN INCORRECTA';
    title.className = '';
    text.textContent = `La solución real era: ${s.culprit}, con ${s.weapon}, en ${s.room}.`;
  }
  document.getElementById('overlay').classList.add('show');
}

function restart() {
  document.getElementById('overlay').classList.remove('show');
  const wasWin = state.result === 'win';
  const muted = state.muted;
  const nextCaseNum = wasWin ? state.caseNum + 1 : 1;
  if (wasWin) saveRecordIfBetter(state.caseNum);
  state = freshState();
  state.muted = muted;
  state.caseNum = nextCaseNum;
  newCase();
  render();
}

function render() {
  document.getElementById('caseLabel').textContent = `CASO ${state.caseNum} (${state.world.w}x${state.world.h})`;
  const turnsEl = document.getElementById('turnsLabel');
  turnsEl.textContent = `Turnos: ${state.turnsLeft}`;
  turnsEl.className = state.turnsLeft <= 10 ? 'turns warn' : 'turns';

  document.getElementById('cluesCountLabel').textContent = `📓 ${state.notebook.length} pistas recogidas`;
  document.getElementById('suspectsCountLabel').textContent = `🕵 ${state.interrogated.size}/${state.suspects.length} interrogados`;

  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${VIEWPORT_W}, 1ch)`;
  gridEl.innerHTML = '';

  const { camX, camY } = getCamera();
  const px = state.player.x, py = state.player.y;

  for (let vy = 0; vy < VIEWPORT_H; vy++) {
    for (let vx = 0; vx < VIEWPORT_W; vx++) {
      const wx = camX + vx, wy = camY + vy;
      const span = document.createElement('span'); span.className = 'cell';
      if (!inBounds(wx, wy)) { span.textContent = ' '; span.classList.add('c-hidden'); gridEl.appendChild(span); continue; }

      const d = Math.hypot(wx - px, wy - py);
      const visibleNow = d <= VIEW_RADIUS;
      if (visibleNow) state.explored[wy][wx] = true;
      const explored = state.explored[wy][wx];
      if (!visibleNow && !explored) { span.textContent = ' '; span.classList.add('c-hidden'); gridEl.appendChild(span); continue; }

      let ch = state.grid[wy][wx] === '#' ? '#' : '.';
      let cls = state.grid[wy][wx] === '#' ? (visibleNow ? 'c-wall' : 'c-wall-dim') : (visibleNow ? 'c-floor' : 'c-floor-dim');

      if (wx === state.exit.x && wy === state.exit.y) { ch = '>'; cls = visibleNow ? 'c-exit' : 'c-exit-dim'; }

      if (visibleNow) {
        const clue = state.clues.find(c => c.x === wx && c.y === wy && !c.taken);
        if (clue) { ch = '¡'; cls = 'c-clue'; }
        const suspect = state.suspects.find(s => s.x === wx && s.y === wy);
        if (suspect) { ch = suspect.name.charAt(suspect.name.indexOf(' ') + 1) || 'S'; cls = 'c-suspect'; }
      }

      if (wx === px && wy === py) { ch = '@'; cls = 'c-player'; }
      span.textContent = ch; span.classList.add(cls); gridEl.appendChild(span);
    }
  }

  const fxEl = document.getElementById('fx');
  fxEl.style.width = gridEl.offsetWidth + 'px'; fxEl.style.height = gridEl.offsetHeight + 'px';
  document.getElementById('log').innerHTML = state.messages.map(m => `<div>${m}</div>`).join('');
}

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'arrowup' || key === 'w') handleMove(0, -1);
  else if (key === 'arrowdown' || key === 's') handleMove(0, 1);
  else if (key === 'arrowleft' || key === 'a') handleMove(-1, 0);
  else if (key === 'arrowright' || key === 'd') handleMove(1, 0);
  else if (key === 'n') openNotebook();
  else if (key === 'escape') { closeNotebook(); closeAccuse(); }
});

state = freshState();
newCase();
loadRecord();
render();
</script>
</body>
</html>
