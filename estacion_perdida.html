<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap');
  :root{
    --bg:#050608; --panel:#0c1013; --panel-edge:#1c2830;
    --hull:#3a4148; --hull-dim:#20262b; --floor:#2c3a40; --floor-dim:#181f22;
    --crawler:#7fd9a0; --stalker:#d9a83a; --brute:#d9503a; --swarm:#c793e8;

  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--parchment); font-family:'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; }
  .wrap { max-width:560px; margin:0 auto; padding:14px 12px 22px; }
  a.back { color:var(--dim); font-size:10.5px; text-decoration:none; letter-spacing:0.5px; }
  a.back:hover { color:var(--accent); }
  .title { display:flex; align-items:center; justify-content:space-between; margin:8px 0 4px; }
  .title h1 { font-size:14px; letter-spacing:2.5px; font-weight:800; margin:0; color:var(--accent); text-shadow:0 0 10px rgba(95,208,224,0.5); }
  .title-right { display:flex; align-items:center; gap:8px; }
  .record { font-size:10px; color:var(--dim); }
  .icon-btn { width:26px; height:26px; padding:0; font-size:13px; display:flex; align-items:center; justify-content:center; }
  .subbar { display:flex; gap:10px; font-size:10.5px; color:var(--dim); letter-spacing:1px; margin-bottom:8px; flex-wrap:wrap; }
  .subbar .zone { color:var(--exit); }
  .subbar .critical { color:var(--danger); animation:blinkWarn 1s step-end infinite; }
  @keyframes blinkWarn { 50% { opacity:0.3; } }

  .stats { background:var(--panel); border:1px solid var(--panel-edge); border-radius:6px; padding:8px 10px; margin-bottom:6px; font-size:11px; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px 12px; }
  .stat-row { display:flex; align-items:center; gap:6px; }
  .stat-row .ic { width:14px; text-align:center; }
  .bar { flex:1; height:9px; background:#0a0e10; border-radius:4px; overflow:hidden; border:1px solid var(--panel-edge); }
  .bar-fill { height:100%; transition:width 0.25s ease; }
  .fill-hp { background:linear-gradient(90deg,#5c9950,#7fbf6d); }
  .fill-hp.low { background:linear-gradient(90deg,#e2584f,#b93a3a); }
  .fill-energy { background:linear-gradient(90deg,#8a6d1c,var(--energy)); }
  .fill-energy.low { background:linear-gradient(90deg,#e2584f,#b93a3a); }
  .stat-num { font-size:9.5px; color:var(--dim); width:40px; text-align:right; }

  .stage { position:relative; background:#020304; border:1px solid var(--panel-edge); border-radius:8px; padding:10px; box-shadow:inset 0 0 40px rgba(95,208,224,0.05); overflow:hidden; }

  @keyframes floatUp { 0%{opacity:1; transform:translate(-50%,0);} 100%{opacity:0; transform:translate(-50%,-24px);} }

  .c-crawler{color:var(--crawler); font-weight:700;} .c-stalker{color:var(--stalker); font-weight:700;}

  .dpad button.right{grid-row:2;grid-column:3;} .dpad button.down{grid-row:3;grid-column:2;}
  button { font-family:inherit; background:#0e1518; color:var(--parchment); border:1px solid var(--panel-edge); border-radius:8px; cursor:pointer; font-size:14px; transition:background 0.15s ease, transform 0.05s ease; }
  button:active { transform:scale(0.93); background:#152025; }
  .actions { display:flex; flex-direction:column; gap:5px; }

  .btn-attack { color:var(--danger); border-color:rgba(226,88,79,0.4); }
  .btn-hack { color:var(--terminal); border-color:rgba(127,217,160,0.4); }
  .hint { text-align:center; color:var(--dim); font-size:10.5px; margin-top:10px; letter-spacing:0.5px; }

  .overlay { position:fixed; inset:0; background:rgba(2,3,4,0.95); display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:10; text-align:center; padding:20px; }
  .overlay.show { display:flex; }
  .overlay h2 { color:var(--danger); letter-spacing:2px; font-size:19px; margin:0; }
  .overlay p { color:var(--dim); max-width:320px; font-size:13px; }
  .overlay button { padding:10px 22px; font-size:13px; color:var(--accent); }

  .inv-panel { background:var(--panel); border:1px solid var(--panel-edge); border-radius:10px; padding:16px; width:100%; max-width:340px; text-align:left; }
  .inv-panel h3 { margin:0 0 10px; font-size:13px; letter-spacing:1px; color:var(--terminal); }
  .inv-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--panel-edge); font-size:11.5px; }
  .inv-row:last-child { border-bottom:none; }
  .inv-row .name { color:var(--parchment); }
  .inv-row .qty { color:var(--dim); margin-left:6px; }
  .inv-row button { font-size:10.5px; padding:6px 10px; color:var(--parchment); }
  .inv-row button:disabled { opacity:0.35; cursor:default; }
  .inv-close { margin-top:12px; width:100%; color:var(--dim); }

  .hack-panel { background:var(--panel); border:1px solid var(--terminal); border-radius:10px; padding:18px; width:100%; max-width:320px; text-align:center; }
  .hack-panel h3 { margin:0 0 6px; font-size:13px; letter-spacing:1px; color:var(--terminal); }

  .hack-btn { height:44px; font-size:15px; font-weight:800; color:var(--terminal); }
  .hack-btn.wrong { color:var(--danger); border-color:var(--danger); }
</style>

      <div class="stat-row"><span class="ic">❤</span><div class="bar"><div class="bar-fill fill-hp" id="hpFill"></div></div><span class="stat-num" id="hpText">20/20</span></div>
      <div class="stat-row"><span class="ic">🔋</span><div class="bar"><div class="bar-fill fill-energy" id="energyFill"></div></div><span class="stat-num" id="energyText">100</span></div>

<script>
const VIEWPORT_W = 23, VIEWPORT_H = 15;

const ENEMY_TYPES = [
  { char: 'c', name: 'rastreador', hp: 5,  atk: 2, xp: 0, weight: 45, cls: 'c-crawler', p: 'p-crawler' },
  { char: 's', name: 'acechador',  hp: 8,  atk: 3, xp: 0, weight: 28, cls: 'c-stalker',  p: 'p-stalker' },
  { char: 'b', name: 'bestia',     hp: 15, atk: 5, xp: 0, weight: 17, cls: 'c-brute',     p: 'p-brute' },
  { char: 'w', name: 'enjambre',   hp: 3,  atk: 1, xp: 0, weight: 10, cls: 'c-swarm',     p: 'p-swarm' },
];

let state = {};
let bestZone = 1;
let audioCtx = null;

function zoneDimensions(zone) {
  const w = Math.min(44, 26 + (zone - 1) * 3);
  const h = Math.min(28, 17 + (zone - 1) * 2);
  return { w, h };
}

function freshPlayer() {
  return {
    x: 0, y: 0,
    hp: 20, maxHp: 20,
    energy: 100, maxEnergy: 100,
    atk: 4,
    inventory: { celula: 2 },
  };
}

function freshState() {
  return {
    zone: 1,
    world: { w: 0, h: 0 },
    player: freshPlayer(),
    grid: [], explored: [],
    monsters: [], loot: [], terminals: [],
    exit: { x: 0, y: 0 },
    messages: [], over: false, muted: false, invOpen: false, hackOpen: false,
  };
}

function inBounds(x, y) { return x >= 0 && x < state.world.w && y >= 0 && y < state.world.h; }

// --- Procedural connected station layout ---
function generateStation(w, h) {
  let grid = [];
  for (let y = 0; y < h; y++) {
    let row = [];
    for (let x = 0; x < w; x++) {
      const border = (x === 0 || y === 0 || x === w - 1 || y === h - 1);
      row.push(border ? '#' : (Math.random() < 0.42 ? '#' : '.'));
    }
    grid.push(row);
  }
  for (let iter = 0; iter < 4; iter++) {
    let next = grid.map(r => r.slice());
    for (let y = 1; y < h - 1; y++) for (let x = 1; x < w - 1; x++) {
      let wallCount = 0;
      for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        if (grid[y + dy][x + dx] === '#') wallCount++;
      }
      next[y][x] = wallCount >= 5 ? '#' : '.';
    }
    grid = next;
  }
  const cx = Math.floor(w / 2), cy = Math.floor(h / 2);
  let start = null;
  const bc = (x, y) => x >= 0 && x < w && y >= 0 && y < h;
  for (let r = 0; r < Math.max(w, h) && !start; r++) {
    for (let dy = -r; dy <= r && !start; dy++) for (let dx = -r; dx <= r && !start; dx++) {
      const x = cx + dx, y = cy + dy;
      if (bc(x, y) && grid[y][x] === '.') start = { x, y };
    }
  }
  const visited = Array.from({ length: h }, () => new Array(w).fill(false));
  const queue = [start]; visited[start.y][start.x] = true;
  const dist = Array.from({ length: h }, () => new Array(w).fill(-1)); dist[start.y][start.x] = 0;
  let farthest = start;
  while (queue.length) {
    const cur = queue.shift();
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = cur.x + dx, ny = cur.y + dy;
      if (bc(nx, ny) && !visited[ny][nx] && grid[ny][nx] === '.') {
        visited[ny][nx] = true; dist[ny][nx] = dist[cur.y][cur.x] + 1;
        if (dist[ny][nx] > dist[farthest.y][farthest.x]) farthest = { x: nx, y: ny };
        queue.push({ x: nx, y: ny });
      }
    }
  }
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) { if (grid[y][x] === '.' && !visited[y][x]) grid[y][x] = '#'; }
  const floorTiles = [];
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) { if (visited[y][x]) floorTiles.push({ x, y }); }
  return { grid, start, exit: farthest, floorTiles };
}

function manhattan(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
function weightedPick(list) {
  const total = list.reduce((s, w) => s + w.weight, 0);
  let r = Math.random() * total;
  for (const w of list) { if (r < w.weight) return w; r -= w.weight; }
  return list[0];
}

function rollLoot() {
  const r = Math.random();
  if (r < 0.55) return { type: 'celula' };
  if (r < 0.85) return { type: 'botiquin' };
  return { type: 'nada' };
}

function newSector() {
  const { w, h } = zoneDimensions(state.zone);
  state.world = { w, h };
  const { grid, start, exit, floorTiles } = generateStation(w, h);
  state.grid = grid;
  state.exit = exit;
  state.explored = Array.from({ length: h }, () => new Array(w).fill(false));
  state.player.x = start.x;
  state.player.y = start.y;
  state.monsters = [];
  state.loot = [];
  state.terminals = [];

  const candidates = floorTiles.filter(t => manhattan(t, start) > 3 && (t.x !== exit.x || t.y !== exit.y));
  shuffle(candidates);

  const area = floorTiles.length;
  const monsterCount = Math.min(16, 2 + state.zone + Math.floor(area / 75));
  const typeCap = Math.min(ENEMY_TYPES.length - 1, Math.floor((state.zone - 1) / 2));
  const pool = ENEMY_TYPES.slice(0, typeCap + 1);

  for (let i = 0; i < monsterCount && candidates.length; i++) {
    const spot = candidates.pop();
    const t = weightedPick(pool);
    state.monsters.push({
      x: spot.x, y: spot.y, char: t.char, cls: t.cls, pcls: t.p, name: t.name,
      hp: Math.round(t.hp * (1 + (state.zone - 1) * 0.12)), maxHp: Math.round(t.hp * (1 + (state.zone - 1) * 0.12)),
      atk: Math.round(t.atk * (1 + (state.zone - 1) * 0.08)), alive: true,
    });
  }

  const lootCount = Math.min(8, 2 + Math.floor(state.zone / 2) + Math.floor(area / 65));
  for (let i = 0; i < lootCount && candidates.length; i++) {
    const spot = candidates.pop();
    state.loot.push({ x: spot.x, y: spot.y });
  }

  const terminalCount = Math.min(3, 1 + Math.floor(state.zone / 3));
  for (let i = 0; i < terminalCount && candidates.length; i++) {
    const spot = candidates.pop();
    state.terminals.push({ x: spot.x, y: spot.y, hacked: false });
  }

  log(`Sector ${state.zone}: entras en una sección a oscuras de la estación (${w}x${h}).`);
}

function log(msg) { state.messages.push(msg); state.messages = state.messages.slice(-4); }
function monsterAt(x, y) { return state.monsters.find(m => m.alive && m.x === x && m.y === y); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function lightRadius() {
  const e = state.player.energy;
  if (e > 60) return 5.5;
  if (e > 30) return 4;
  if (e > 10) return 2.5;
  return 1.4;
}

function getCamera() {
  const { w, h } = state.world;
  const camX = Math.max(0, Math.min(Math.max(0, w - VIEWPORT_W), state.player.x - Math.floor(VIEWPORT_W / 2)));
  const camY = Math.max(0, Math.min(Math.max(0, h - VIEWPORT_H), state.player.y - Math.floor(VIEWPORT_H / 2)));
  return { camX, camY };
}

// --- Audio ---
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function beep(freq, duration, type, vol, glide) {
  if (state.muted) return;
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = type || 'square'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (glide) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + glide), audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}
function sfx(name) {
  switch (name) {
    case 'attack': beep(220, 0.08, 'square', 0.05, -80); break;
    case 'hit': beep(120, 0.12, 'sawtooth', 0.06, -60); break;
    case 'heal': beep(500, 0.18, 'sine', 0.05, 220); break;
    case 'item': beep(700, 0.1, 'sine', 0.04, 140); break;
    case 'death': beep(140, 0.35, 'triangle', 0.05, -110); break;
    case 'hackok': [520,660,780].forEach((f,i)=>setTimeout(()=>beep(f,0.12,'square',0.05),i*80)); break;
    case 'hackfail': beep(140, 0.3, 'sawtooth', 0.07, -120); break;
    case 'lowpower': beep(200, 0.2, 'triangle', 0.05, -60); break;
  }
}
function toggleMute() { state.muted = !state.muted; document.getElementById('muteBtn').textContent = state.muted ? '🔇' : '🔊'; }

// --- FX ---
function spawnFloatText(wx, wy, text, cls) {
  const { camX, camY } = getCamera();
  const vx = wx - camX, vy = wy - camY;
  if (vx < 0 || vx >= VIEWPORT_W || vy < 0 || vy >= VIEWPORT_H) return;
  const fx = document.getElementById('fx'); const gridEl = document.getElementById('grid');
  const cw = gridEl.offsetWidth / VIEWPORT_W || 10, ch = gridEl.offsetHeight / VIEWPORT_H || 16;
  const el = document.createElement('div'); el.className = 'float-text ' + cls; el.textContent = text;
  el.style.left = (vx * cw + cw / 2) + 'px'; el.style.top = (vy * ch) + 'px';
  fx.appendChild(el); setTimeout(() => el.remove(), 900);
}
function spawnParticles(wx, wy, pcls) {
  const { camX, camY } = getCamera();
  const vx = wx - camX, vy = wy - camY;
  if (vx < 0 || vx >= VIEWPORT_W || vy < 0 || vy >= VIEWPORT_H) return;
  const fx = document.getElementById('fx'); const gridEl = document.getElementById('grid');
  const cw = gridEl.offsetWidth / VIEWPORT_W || 10, ch = gridEl.offsetHeight / VIEWPORT_H || 16;
  const originX = vx * cw + cw / 2, originY = vy * ch + ch / 2;
  for (let i = 0; i < 7; i++) {
    const p = document.createElement('div'); p.className = 'particle ' + pcls;
    const angle = Math.random() * Math.PI * 2, dist = 14 + Math.random() * 14;
    p.style.left = originX + 'px'; p.style.top = originY + 'px';
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px'); p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    fx.appendChild(p); setTimeout(() => p.remove(), 650);
  }
}
function shakeScreen() { const s = document.getElementById('stage'); s.classList.remove('shake'); void s.offsetWidth; s.classList.add('shake'); }
function showLevelUpBanner(text) {
  const el = document.getElementById('levelupBanner'); el.textContent = text; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 1900);
}
function spawnSpark() {
  const s = document.getElementById('stage'); if (!s) return;
  const el = document.createElement('div'); el.className = 'spark';
  el.style.left = (Math.random() * s.clientWidth) + 'px'; el.style.top = (Math.random() * s.clientHeight) + 'px';
  s.appendChild(el); setTimeout(() => el.remove(), 2700);
}
setInterval(spawnSpark, 900);

// --- Record ---
async function loadRecord() {
  try { if (window.storage) { const res = await window.storage.get('estacion-perdida-best', false); if (res && res.value) bestZone = JSON.parse(res.value).bestZone || 1; } }
  catch (e) {}
  updateRecordLabel();
}
async function saveRecordIfBetter() {
  if (state.zone > bestZone) {
    bestZone = state.zone; updateRecordLabel();
    try { if (window.storage) await window.storage.set('estacion-perdida-best', JSON.stringify({ bestZone }), false); } catch (e) {}
  }
}
function updateRecordLabel() { const el = document.getElementById('recordLabel'); if (el) el.textContent = `Récord: Sector ${bestZone}`; }

// --- Core actions ---
function handleMove(dx, dy) {
  if (state.over || state.invOpen || state.hackOpen) return;
  const p = state.player;
  const nx = p.x + dx, ny = p.y + dy;

  const target = monsterAt(nx, ny);
  if (target) { doPlayerAttack(target); advanceTurn(); return; }

  if (inBounds(nx, ny) && state.grid[ny][nx] !== '#') {
    p.x = nx; p.y = ny;
    const item = state.loot.find(it => it.x === nx && it.y === ny);
    if (item) { state.loot = state.loot.filter(it => it !== item); collectLoot(); }

    const term = state.terminals.find(t => t.x === nx && t.y === ny && !t.hacked);
    if (term) { startHack(term); return; }

    if (nx === state.exit.x && ny === state.exit.y) {
      state.zone++;
      log('Avanzas a un sector más profundo de la estación...');
      saveRecordIfBetter();
      newSector();
      render();
      return;
    }
  }
  advanceTurn();
}

function collectLoot() {
  const p = state.player;
  const roll = rollLoot();
  if (roll.type === 'nada') { log('Contenedor vacío, ya saqueado.'); return; }
  if (roll.type === 'celula') { p.inventory.celula++; log('Encuentras una célula de energía. (+1)'); spawnFloatText(p.x, p.y, '+1🔋', 'info'); }
  else if (roll.type === 'botiquin') { const heal = 8; p.hp = Math.min(p.maxHp, p.hp + heal); log(`Encuentras un botiquín. (+${heal} HP)`); spawnFloatText(p.x, p.y, '+' + heal, 'heal'); }
  sfx('item');
}

function handleAttack() {
  if (state.over || state.invOpen || state.hackOpen) return;
  const p = state.player;
  for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
    const target = monsterAt(p.x + dx, p.y + dy);
    if (target) { doPlayerAttack(target); advanceTurn(); return; }
  }
  log('No hay nada cerca a lo que golpear.');
  render();
}

function doPlayerAttack(defender) {
  const p = state.player;
  const hitChance = 0.78;
  if (Math.random() < hitChance) {
    const dmg = Math.max(1, p.atk + Math.floor(Math.random() * 3) - 1);
    defender.hp -= dmg;
    spawnFloatText(defender.x, defender.y, '-' + dmg, 'dmg');
    sfx('attack');
    log(`Golpeas a${defender.name === 'enjambre' ? 'l' : ' el/la'} ${defender.name} con tu llave inglesa (-${dmg}).`);
    if (defender.hp <= 0) {
      defender.alive = false;
      spawnParticles(defender.x, defender.y, defender.pcls);
      log(`¡${capitalize(defender.name)} queda inerte!`);
    }
  } else {
    spawnFloatText(defender.x, defender.y, 'fallo', 'info');
    log('Fallas el golpe en la oscuridad.');
  }
}

function monstersTurn() {
  const p = state.player;
  const radius = lightRadius();
  for (const m of state.monsters) {
    if (!m.alive) continue;
    const dist = Math.max(Math.abs(m.x - p.x), Math.abs(m.y - p.y));
    // in the dark, monsters are far more aggressive and perceptive
    const perceptionRadius = dist <= radius ? 99 : 3;
    if (dist > perceptionRadius) continue;

    if (dist === 1) {
      const dmg = Math.max(1, m.atk + Math.floor(Math.random() * 3) - 1);
      p.hp -= dmg;
      spawnFloatText(p.x, p.y, '-' + dmg, 'dmg');
      shakeScreen(); sfx('hit');
      log(`${capitalize(m.name)} te ataca en la oscuridad (-${dmg}).`);
      continue;
    }
    const ddx = Math.sign(p.x - m.x), ddy = Math.sign(p.y - m.y);
    let nx = m.x, ny = m.y;
    if (Math.random() < 0.5 && ddx !== 0) nx = m.x + ddx; else ny = m.y + ddy;
    if (inBounds(nx, ny) && state.grid[ny][nx] !== '#' && !monsterAt(nx, ny) && !(nx === p.x && ny === p.y)) { m.x = nx; m.y = ny; }
  }
  state.monsters = state.monsters.filter(m => m.alive);
}

function tickEnergy() {
  const p = state.player;
  p.energy = Math.max(0, p.energy - 0.5);
  if (p.energy <= 15 && Math.random() < 0.3) sfx('lowpower');
  if (p.energy <= 0) {
    p.hp -= 2;
    if (Math.random() < 0.4) log('⚠ Sin energía. Algo se mueve muy cerca en la oscuridad total.');
  }
}

function advanceTurn() {
  if (state.over) { render(); showOverlay(); return; }
  monstersTurn();
  tickEnergy();
  if (state.player.hp <= 0) { state.over = true; state.deathCause = 'hp'; sfx('death'); log('La oscuridad te consume...'); }
  if (state.over) { render(); showOverlay(); return; }
  render();
}

// --- Inventory (energy cells) ---
function openInventory() { if (state.over) return; state.invOpen = true; renderInventory(); document.getElementById('invOverlay').classList.add('show'); }
function closeInventory() { state.invOpen = false; document.getElementById('invOverlay').classList.remove('show'); }
function useItem(type) {
  const p = state.player;
  if (p.inventory[type] <= 0) return;
  if (type === 'celula') {
    p.inventory.celula--;
    const gain = 35;
    p.energy = Math.min(p.maxEnergy, p.energy + gain);
    log(`Insertas una célula de energía. (+${gain} energía)`);
    sfx('heal');
  }
  renderInventory();
  advanceTurn();
}
function renderInventory() {
  const p = state.player;
  document.getElementById('invList').innerHTML = `
    <div class="inv-row"><span class="name">🔋 Célula de energía<span class="qty">x${p.inventory.celula}</span></span>
    <button onclick="useItem('celula')" ${p.inventory.celula <= 0 ? 'disabled' : ''}>Usar</button></div>`;
}

// --- Terminal hacking minigame ---
const HACK_SYMBOLS = ['◆','●','▲','■','◇','○'];
function startHack(term) {
  state.hackOpen = true;
  state.activeTerminal = term;
  const correctIdx = Math.floor(Math.random() * 6);
  state.hackCorrect = correctIdx;
  state.hackTimeLeft = 3;
  const gridEl = document.getElementById('hackGrid');
  gridEl.innerHTML = HACK_SYMBOLS.map((s, i) => `<button class="hack-btn" onclick="hackAttempt(${i})">${s}</button>`).join('');
  document.getElementById('hackDesc').textContent = `Pulsa el símbolo: ${HACK_SYMBOLS[correctIdx]}`;
  document.getElementById('hackTimer').textContent = `Intentos restantes: ${state.hackTimeLeft}`;
  document.getElementById('hackOverlay').classList.add('show');
}
function hackAttempt(idx) {
  const term = state.activeTerminal;
  if (idx === state.hackCorrect) {
    term.hacked = true;
    log('Terminal hackeada. Se abre un compartimento cercano.');
    sfx('hackok');
    state.player.inventory.celula += 2;
    spawnFloatText(term.x, term.y, '+2🔋', 'info');
    closeHack();
    advanceTurn();
  } else {
    state.hackTimeLeft--;
    sfx('hackfail');
    if (state.hackTimeLeft <= 0) {
      log('La terminal se bloquea. Pierdes tiempo y energía.');
      state.player.energy = Math.max(0, state.player.energy - 10);
      closeHack();
      advanceTurn();
    } else {
      document.getElementById('hackTimer').textContent = `Intentos restantes: ${state.hackTimeLeft}`;
    }
  }
}
function closeHack() { state.hackOpen = false; document.getElementById('hackOverlay').classList.remove('show'); }

// --- Render ---
function showOverlay() {
  document.getElementById('overlayTitle').textContent = 'SISTEMAS CAÍDOS';
  document.getElementById('overlayText').textContent = `Llegaste al sector ${state.zone} antes de que la oscuridad te alcanzara.`;
  document.getElementById('overlay').classList.add('show');
}
function restart() {
  document.getElementById('overlay').classList.remove('show');
  const muted = state.muted;
  state = freshState();
  state.muted = muted;
  newSector();
  render();
}

function render() {
  const p = state.player;
  document.getElementById('zoneLabel').textContent = `SECTOR ${state.zone} (${state.world.w}x${state.world.h})`;
  document.getElementById('energyStatus').textContent = p.energy <= 15 ? '⚠ ENERGÍA CRÍTICA' : '';
  document.getElementById('energyStatus').className = p.energy <= 15 ? 'critical' : '';

  const hpPct = Math.max(0, Math.round((p.hp / p.maxHp) * 100));
  const hpFill = document.getElementById('hpFill');
  hpFill.style.width = hpPct + '%';
  hpFill.className = 'bar-fill fill-hp' + (hpPct <= 30 ? ' low' : '');
  document.getElementById('hpText').textContent = `${Math.max(0, Math.round(p.hp))}/${p.maxHp}`;

  const enPct = Math.max(0, Math.round((p.energy / p.maxEnergy) * 100));
  const enFill = document.getElementById('energyFill');
  enFill.style.width = enPct + '%';
  enFill.className = 'bar-fill fill-energy' + (enPct <= 20 ? ' low' : '');
  document.getElementById('energyText').textContent = Math.round(p.energy);

  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${VIEWPORT_W}, 1ch)`;
  gridEl.innerHTML = '';

  const { camX, camY } = getCamera();
  const px = p.x, py = p.y;
  const radius = lightRadius();

  for (let vy = 0; vy < VIEWPORT_H; vy++) {
    for (let vx = 0; vx < VIEWPORT_W; vx++) {
      const wx = camX + vx, wy = camY + vy;
      const span = document.createElement('span'); span.className = 'cell';
      if (!inBounds(wx, wy)) { span.textContent = ' '; span.classList.add('c-hidden'); gridEl.appendChild(span); continue; }

      const d = Math.hypot(wx - px, wy - py);
      const visibleNow = d <= radius;
      if (visibleNow) state.explored[wy][wx] = true;
      const explored = state.explored[wy][wx];
      if (!visibleNow && !explored) { span.textContent = ' '; span.classList.add('c-hidden'); gridEl.appendChild(span); continue; }

      let ch = state.grid[wy][wx] === '#' ? '#' : '.';
      let cls = state.grid[wy][wx] === '#' ? (visibleNow ? 'c-wall' : 'c-wall-dim') : (visibleNow ? 'c-floor' : 'c-floor-dim');

      if (wx === state.exit.x && wy === state.exit.y) { ch = '>'; cls = visibleNow ? 'c-exit' : 'c-exit-dim'; }
      const term = state.terminals.find(t => t.x === wx && t.y === wy && !t.hacked);
      if (term) { ch = 'T'; cls = visibleNow ? 'c-terminal' : 'c-terminal-dim'; }

      if (visibleNow) {
        const item = state.loot.find(it => it.x === wx && it.y === wy);
        if (item) { ch = '$'; cls = 'c-loot'; }
        const m = monsterAt(wx, wy);
        if (m) { ch = m.char; cls = m.cls; }
      }

      if (wx === px && wy === py) { ch = '@'; cls = 'c-player'; }
      span.textContent = ch; span.classList.add(cls); gridEl.appendChild(span);
    }
  }

  const fxEl = document.getElementById('fx');
  fxEl.style.width = gridEl.offsetWidth + 'px'; fxEl.style.height = gridEl.offsetHeight + 'px';
  document.getElementById('log').innerHTML = state.messages.map(m => `<div>${m}</div>`).join('');
}

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'arrowup' || key === 'w') handleMove(0, -1);
  else if (key === 'arrowdown' || key === 's') handleMove(0, 1);
  else if (key === 'arrowleft' || key === 'a') handleMove(-1, 0);
  else if (key === 'arrowright' || key === 'd') handleMove(1, 0);
  else if (key === 'g' || key === ' ') handleAttack();
  else if (key === 'i') openInventory();
  else if (key === 'escape') { closeInventory(); }
});

state = freshState();
newSector();
loadRecord();
render();
</script>
</body>
</html>
