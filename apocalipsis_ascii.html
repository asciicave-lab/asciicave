<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap');

  :root{
    --bg: #0d0d0b;
    --panel: #17140f;
    --panel-edge: #3a3227;
    --rubble: #6b5d4f;
    --rubble-dim: #3a3329;
    --floor-dim: #35322c;
    --floor-dim2: #24221d;
    --loot: #d9a441;
    --zwalker: #7f9e5c;
    --zrunner: #d97a3a;
    --zbrute: #a23b3b;
    --zhowler: #c793e8;
    --player: #f2c14e;
    --exit: #5fe0c7;
    --exit-dim: #2f5f56;
    --parchment: #e7e2d1;
    --dim: #8a8378;
    --danger: #e2584f;
    --accent: #c94f3d;
    --hunger: #c9a227;
    --thirst: #5fa8d9;
    --fatigue: #9a958c;
    --infection: #9acd32;
    --night: #4a5fa8;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--parchment); font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 14px 12px 22px; }

  .title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .title h1 { font-size: 14px; letter-spacing: 2.5px; font-weight: 800; margin: 0; color: var(--accent); text-shadow: 0 0 10px rgba(201,79,61,0.5); }
  .title-right { display: flex; align-items: center; gap: 8px; }
  .record { font-size: 10px; color: var(--dim); letter-spacing: 0.5px; white-space: nowrap; }
  .icon-btn { width: 26px; height: 26px; padding: 0; font-size: 13px; display: flex; align-items: center; justify-content: center; }

  .subbar { display: flex; gap: 10px; font-size: 10.5px; color: var(--dim); letter-spacing: 1px; margin-bottom: 8px; flex-wrap: wrap; }
  .subbar .zone { color: var(--exit); }
  .subbar .daynight.night { color: var(--night); }
  .subbar .daynight.day { color: var(--loot); }

  .stats { background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; font-size: 11px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; }
  .stat-row { display: flex; align-items: center; gap: 6px; }
  .stat-row .ic { width: 14px; text-align: center; }
  .bar { flex: 1; height: 8px; background: #1c1a15; border-radius: 4px; overflow: hidden; border: 1px solid var(--panel-edge); }
  .bar-fill { height: 100%; transition: width 0.25s ease; }
  .fill-hp { background: linear-gradient(90deg, #7fbf6d, #d9c95a); }
  .fill-hp.low { background: linear-gradient(90deg, #e2584f, #b93a3a); }
  .fill-hunger { background: linear-gradient(90deg, #8a6d1c, var(--hunger)); }
  .fill-thirst { background: linear-gradient(90deg, #2f6f96, var(--thirst)); }
  .fill-fatigue { background: linear-gradient(90deg, #5c5850, var(--fatigue)); }
  .fill-infection { background: linear-gradient(90deg, #6b7d1e, var(--infection)); }
  .fill-infection.high { background: linear-gradient(90deg, #a23b3b, var(--danger)); }
  .stat-num { font-size: 9.5px; color: var(--dim); white-space: nowrap; width: 34px; text-align: right; }
  .infection-row { margin-top: 6px; }
  .wound-tag { display: inline-block; margin-top: 4px; font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--danger); color: var(--danger); }
  .wound-tag.treated { border-color: var(--infection); color: var(--infection); }

  .skills { background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 6px; padding: 6px 10px; margin-bottom: 10px; font-size: 10px; color: var(--dim); display: flex; flex-wrap: wrap; gap: 8px 14px; }
  .skills b { color: var(--parchment); }

  .stage { position: relative; background: #06070a; border: 1px solid var(--panel-edge); border-radius: 8px; padding: 10px; box-shadow: inset 0 0 40px rgba(201,79,61,0.06); overflow: hidden; }
  .stage.night { box-shadow: inset 0 0 50px rgba(74,95,168,0.14); }
  .stage.shake { animation: shakeStage 0.4s; }
  @keyframes shakeStage { 10%,90% { transform: translateX(-1px); } 20%,80% { transform: translateX(2px); } 30%,50%,70% { transform: translateX(-4px); } 40%,60% { transform: translateX(4px); } }
  .stage::after { content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 3; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.016) 0px, rgba(255,255,255,0.016) 1px, transparent 1px, transparent 3px); }

  #grid { position: relative; z-index: 2; display: grid; line-height: 1; font-size: 16px; white-space: pre; text-align: center; }
  #fx { position: absolute; top: 10px; left: 10px; overflow: visible; pointer-events: none; z-index: 4; }

  .ash { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: rgba(210,205,195,0.55); pointer-events: none; z-index: 1; opacity: 0; animation: ashFall 3.6s linear forwards; }
  @keyframes ashFall { 0% { opacity: 0; transform: translate(0,0);} 10% { opacity:0.5;} 100% { opacity:0; transform: translate(var(--ex), 90px);} }

  .float-text { position: absolute; transform: translate(-50%,0); font-weight: 800; font-size: 13px; white-space: nowrap; animation: floatUp 0.9s ease-out forwards; }
  @keyframes floatUp { 0% { opacity:1; transform: translate(-50%,0);} 100% { opacity:0; transform: translate(-50%,-24px);} }
  .float-text.dmg { color: var(--danger); text-shadow: 0 0 6px rgba(226,88,79,0.6); }
  .float-text.heal { color: #8fe08a; }
  .float-text.bite { color: var(--infection); }
  .float-text.info { color: var(--loot); font-size: 11px; }

  .particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; transform: translate(-50%,-50%); animation: burst 0.6s ease-out forwards; }
  @keyframes burst { 0% { transform: translate(-50%,-50%) translate(0,0); opacity:1;} 100% { transform: translate(-50%,-50%) translate(var(--dx),var(--dy)); opacity:0;} }
  .p-zwalker { background: var(--zwalker); } .p-zrunner { background: var(--zrunner); }
  .p-zbrute { background: var(--zbrute); } .p-zhowler { background: var(--zhowler); }

  .cell { width: 1ch; height: 1.15em; display:flex; align-items:center; justify-content:center; }
  .c-wall { color: var(--rubble); } .c-wall-dim { color: var(--rubble-dim); }
  .c-floor { color: var(--floor-dim); } .c-floor-dim { color: var(--floor-dim2); }
  .c-player { color: var(--player); text-shadow: 0 0 8px rgba(242,193,78,0.7); font-weight: 800; }
  .c-zwalker { color: var(--zwalker); font-weight: 700; } .c-zrunner { color: var(--zrunner); font-weight: 700; }
  .c-zbrute { color: var(--zbrute); font-weight: 700; } .c-zhowler { color: var(--zhowler); font-weight: 700; }
  .c-loot { color: var(--loot); text-shadow: 0 0 6px rgba(217,164,65,0.55); }
  .c-exit { color: var(--exit); font-weight: 800; animation: pulseExit 1.6s ease-in-out infinite; }
  .c-exit-dim { color: var(--exit-dim); font-weight: 800; }
  .c-hidden { color: transparent; }
  @keyframes pulseExit { 0%,100% { text-shadow: 0 0 6px rgba(95,224,199,0.5);} 50% { text-shadow: 0 0 15px rgba(95,224,199,0.95);} }

  .levelup-banner { position: absolute; top: 8px; left: 50%; transform: translate(-50%,-14px); background: rgba(15,12,8,0.94); border: 1px solid var(--loot); color: var(--loot); padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; opacity: 0; pointer-events: none; transition: all 0.35s ease; z-index: 6; white-space: nowrap; }
  .levelup-banner.show { opacity: 1; transform: translate(-50%, 0); }

  .log { margin-top: 10px; background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 6px; padding: 8px 10px; font-size: 11.5px; color: var(--dim); min-height: 62px; }
  .log div { margin: 2px 0; } .log div:last-child { color: var(--parchment); }

  .controls { margin-top: 14px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .dpad { display: grid; grid-template-columns: 42px 42px 42px; grid-template-rows: 42px 42px 42px; gap: 4px; }
  .dpad button.up { grid-row: 1; grid-column: 2; } .dpad button.left { grid-row: 2; grid-column: 1; }
  .dpad button.right { grid-row: 2; grid-column: 3; } .dpad button.down { grid-row: 3; grid-column: 2; }

  button { font-family: inherit; background: #1a1712; color: var(--parchment); border: 1px solid var(--panel-edge); border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.15s ease, transform 0.05s ease; }
  button:active { transform: scale(0.93); background: #241f17; }

  .actions { display: flex; flex-direction: column; gap: 5px; }
  .btn-attack, .btn-rest, .btn-inv, .btn-shoot { width: 116px; height: 33px; font-weight: 700; letter-spacing: 0.3px; font-size: 11.5px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-attack { color: var(--danger); border-color: rgba(226,88,79,0.4); }
  .btn-rest { color: var(--thirst); border-color: rgba(95,168,217,0.4); }
  .btn-inv { color: var(--loot); border-color: rgba(217,164,65,0.4); }
  .btn-shoot { color: var(--zhowler); border-color: rgba(199,147,232,0.4); }

  .hint { text-align: center; color: var(--dim); font-size: 10.5px; margin-top: 10px; letter-spacing: 0.5px; }

  .overlay { position: fixed; inset: 0; background: rgba(6,5,4,0.94); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 10; text-align: center; padding: 20px; }
  .overlay.show { display: flex; }
  .overlay h2 { color: var(--danger); letter-spacing: 2px; font-size: 19px; margin: 0; }
  .overlay p { color: var(--dim); max-width: 320px; font-size: 13px; }
  .overlay button { padding: 10px 22px; font-size: 13px; color: var(--accent); }

  .inv-panel { background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 10px; padding: 16px; width: 100%; max-width: 340px; text-align: left; max-height: 80vh; overflow-y: auto; }
  .inv-panel h3 { margin: 14px 0 8px; font-size: 12px; letter-spacing: 1px; color: var(--loot); }
  .inv-panel h3:first-child { margin-top: 0; }
  .inv-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--panel-edge); font-size: 11.5px; }
  .inv-row:last-child { border-bottom: none; }
  .inv-row .name { color: var(--parchment); }
  .inv-row .qty { color: var(--dim); margin-left: 6px; }
  .inv-row button { font-size: 10.5px; padding: 6px 10px; color: var(--parchment); }
  .inv-row button:disabled { opacity: 0.35; cursor: default; }
  .inv-close { margin-top: 12px; width: 100%; color: var(--dim); }
</style>
  <script data-goatcounter="https://asciigames.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

<body>
<div class="wrap">

  <a href="index.html" style="color:var(--dim); font-size:10.5px; text-decoration:none; letter-spacing:0.5px;">← ASCIICAVE</a>
  <div class="title">
    <h1>APOCALIPSIS ASCII</h1>
    <div class="title-right">
      <span class="record" id="recordLabel">Récord: Zona 1</span>
      <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>
  </div>
  <div class="subbar">
    <span class="zone" id="zoneLabel">ZONA 1</span>
    <span class="daynight" id="dayNightLabel">☀ Día</span>
    <span id="weaponLabel">Arma: Puños</span>
    <span id="chatarraLabel" style="color:var(--loot);">🔩 0</span>
  </div>

  <div class="stats">
    <div class="stat-grid">
      <div class="stat-row"><span class="ic">❤</span><div class="bar"><div class="bar-fill fill-hp" id="hpFill"></div></div><span class="stat-num" id="hpText">24/24</span></div>
      <div class="stat-row"><span class="ic">🍖</span><div class="bar"><div class="bar-fill fill-hunger" id="hungerFill"></div></div><span class="stat-num" id="hungerText">100</span></div>
      <div class="stat-row"><span class="ic">💧</span><div class="bar"><div class="bar-fill fill-thirst" id="thirstFill"></div></div><span class="stat-num" id="thirstText">100</span></div>
      <div class="stat-row"><span class="ic">😮‍💨</span><div class="bar"><div class="bar-fill fill-fatigue" id="fatigueFill"></div></div><span class="stat-num" id="fatigueText">0</span></div>
    </div>
    <div class="stat-row infection-row"><span class="ic">☣</span><div class="bar"><div class="bar-fill fill-infection" id="infectionFill"></div></div><span class="stat-num" id="infectionText">0</span></div>
    <div id="woundTag"></div>
  </div>

  <div class="skills" id="skillsBar"></div>

  <div class="stage" id="stage">
    <div id="grid"></div>
    <div id="fx"></div>
    <div class="levelup-banner" id="levelupBanner"></div>
  </div>

  <div class="log" id="log"></div>

  <div class="controls">
    <div class="dpad">
      <button class="up" onclick="handleMove(0,-1)">▲</button>
      <button class="left" onclick="handleMove(-1,0)">◀</button>
      <button class="right" onclick="handleMove(1,0)">▶</button>
      <button class="down" onclick="handleMove(0,1)">▼</button>
    </div>
    <div class="actions">
      <button class="btn-attack" onclick="handleAttack()">⚔ Atacar</button>
      <button class="btn-shoot" onclick="handleShoot()">🔫 Disparar</button>
      <button class="btn-rest" onclick="handleRest()">💤 Descansar</button>
      <button class="btn-inv" onclick="openInventory()">🎒 Mochila</button>
    </div>
  </div>

  <div class="hint">Flechas/WASD mueven · F ataca · G dispara · R descansa · I mochila</div>
</div>

<div class="overlay show" id="campScreen">
  <div class="inv-panel" style="max-width:380px;">
    <h3>🏕️ CAMPAMENTO</h3>
    <div style="font-size:11px;color:var(--dim);margin-bottom:10px;">Chatarra disponible: <b id="campChatarra" style="color:var(--loot);">0</b></div>
    <div id="campList"></div>
    <button class="inv-close" style="color:var(--exit);margin-top:14px;border-color:rgba(95,224,199,0.4);" onclick="startRun()">🏕️ Empezar incursión</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <h2 id="overlayTitle">TE HAN DEVORADO</h2>
  <p id="overlayText"></p>
  <button onclick="restart()">Volver a intentarlo</button>
</div>

<div class="overlay" id="invOverlay">
  <div class="inv-panel">
    <h3>MOCHILA</h3>
    <div id="invList"></div>
    <h3>CRAFTEO</h3>
    <div id="craftList"></div>
    <button class="inv-close" onclick="closeInventory()">Cerrar</button>
  </div>
</div>

<script>
const VIEWPORT_W = 23, VIEWPORT_H = 15;
const BASE_VIEW_RADIUS = 5.2, NIGHT_VIEW_RADIUS = 3.6;
const DAY_LENGTH = 30; // turns per half-cycle
const MAX_ZOMBIES_PER_ZONE = 26;

const ZOMBIE_TYPES = [
  { char: 'z', name: 'caminante', hp: 6,  atk: 2, detect: 4, bite: 0.08, runner: false, howler: false, cls: 'c-zwalker', p: 'p-zwalker', weight: 45 },
  { char: 'Z', name: 'corredor',  hp: 5,  atk: 3, detect: 5, bite: 0.18, runner: true,  howler: false, cls: 'c-zrunner', p: 'p-zrunner', weight: 25 },
  { char: 'B', name: 'brutote',   hp: 16, atk: 5, detect: 3, bite: 0.25, runner: false, howler: false, cls: 'c-zbrute', p: 'p-zbrute', weight: 18 },
  { char: 'h', name: 'aullador',  hp: 4,  atk: 1, detect: 5, bite: 0.05, runner: false, howler: true,  cls: 'c-zhowler', p: 'p-zhowler', weight: 12 },
];

const SKILL_LABELS = { melee: 'Combate', sneak: 'Sigilo', survival: 'Superviv.', firstaid: 'Prim.Aux.', fitness: 'Aptitud F.' };
const WEAPONS = [
  { name: 'bate',    dmg: 5,  weight: 45, ranged: false },
  { name: 'machete', dmg: 8,  weight: 28, ranged: false },
  { name: 'hacha',   dmg: 12, weight: 15, ranged: false },
  { name: 'pistola', dmg: 6,  weight: 12, ranged: true  },
];

let state = {};
let bestZone = 1;
let audioCtx = null;
let metaChatarra = 0;
let campUpgrades = { almacen: 0, botiquin: 0, cantina: 0, entrenamiento: 0, armeria: 0 };

const CAMP_CONFIG = {
  almacen: { label: 'Almacén Reforzado (+1 comida y agua inicial)', max: 3, baseCost: 12 },
  botiquin: { label: 'Botiquín de Campo (+1 venda inicial)', max: 3, baseCost: 12 },
  cantina: { label: 'Cantina (+1 antiséptico inicial)', max: 2, baseCost: 15 },
  entrenamiento: { label: 'Entrenamiento de Combate (+1 nivel de Combate inicial)', max: 3, baseCost: 40 },
  armeria: { label: 'Armería (mejora tu arma inicial)', max: 3, baseCost: 30, tierCosts: [30, 70, 140] },
};
const ARMERIA_WEAPONS = [
  { name: 'Puños', dmg: 3 },
  { name: 'bate', dmg: 5 },
  { name: 'machete', dmg: 8 },
  { name: 'hacha', dmg: 12 },
];

async function loadCamp() {
  try {
    if (window.storage) {
      const res = await window.storage.get('apoc-ascii-camp', false);
      if (res && res.value) {
        const d = JSON.parse(res.value);
        metaChatarra = d.chatarra || 0;
        campUpgrades = Object.assign(campUpgrades, d.upgrades || {});
      }
    }
  } catch (e) { /* no camp save yet */ }
  renderCamp();
}
async function saveCamp() {
  try { if (window.storage) await window.storage.set('apoc-ascii-camp', JSON.stringify({ chatarra: metaChatarra, upgrades: campUpgrades }), false); }
  catch (e) { /* ignore */ }
}
function campCost(id) {
  const cfg = CAMP_CONFIG[id];
  if (id === 'armeria') return cfg.tierCosts[campUpgrades.armeria] ?? Infinity;
  return cfg.baseCost * (campUpgrades[id] + 1);
}
function buyCampUpgrade(id) {
  const cfg = CAMP_CONFIG[id];
  if (campUpgrades[id] >= cfg.max) return;
  const cost = campCost(id);
  if (metaChatarra < cost) return;
  metaChatarra -= cost;
  campUpgrades[id]++;
  saveCamp();
  renderCamp();
}
function renderCamp() {
  const chatarraEl = document.getElementById('campChatarra');
  if (chatarraEl) chatarraEl.textContent = metaChatarra;
  const listEl = document.getElementById('campList');
  if (!listEl) return;
  listEl.innerHTML = Object.keys(CAMP_CONFIG).map(id => {
    const cfg = CAMP_CONFIG[id];
    const lvl = campUpgrades[id];
    const maxed = lvl >= cfg.max;
    const cost = maxed ? null : campCost(id);
    return `<div class="inv-row"><span class="name">${cfg.label}<span class="qty">Nv.${lvl}/${cfg.max}</span></span>${
      maxed ? '<span style="color:var(--dim);font-size:10px;">MÁX</span>'
            : `<button onclick="buyCampUpgrade('${id}')" ${metaChatarra >= cost ? '' : 'disabled'}>${cost} 🔩</button>`
    }</div>`;
  }).join('');
}
function addChatarra(amount) {
  metaChatarra += amount;
  saveCamp();
  const el = document.getElementById('chatarraLabel');
  if (el) el.textContent = `🔩 ${metaChatarra}`;
}
function applyCampUpgradesToPlayer(p) {
  p.inventory.comida += campUpgrades.almacen;
  p.inventory.agua += campUpgrades.almacen;
  p.inventory.venda += campUpgrades.botiquin;
  p.inventory.antiseptico += campUpgrades.cantina;
  p.skills.melee.level += campUpgrades.entrenamiento;
  const w = ARMERIA_WEAPONS[campUpgrades.armeria];
  p.weaponName = w.name;
  p.weaponDmg = w.dmg;
}
function startRun() {
  document.getElementById('campScreen').classList.remove('show');
  state = freshState();
  applyCampUpgradesToPlayer(state.player);
  newZone();
  loadRecord();
  render();
}

function zoneDimensions(zone) {
  const w = Math.min(52, 26 + (zone - 1) * 4);
  const h = Math.min(34, 18 + (zone - 1) * 3);
  return { w, h };
}

function freshPlayer() {
  return {
    x: 0, y: 0,
    hp: 24, maxHp: 24,
    hunger: 100, thirst: 100, fatigue: 0, infection: 0,
    wound: null,
    weaponName: 'Puños', weaponDmg: 3, weaponRanged: false,
    skills: {
      melee: { level: 1, xp: 0 },
      sneak: { level: 1, xp: 0 },
      survival: { level: 1, xp: 0 },
      firstaid: { level: 1, xp: 0 },
      fitness: { level: 1, xp: 0 },
    },
    inventory: { comida: 2, agua: 2, venda: 2, antiseptico: 0, tela: 0, alcohol: 0, balas: 0 },
  };
}

function freshState() {
  return {
    zone: 1,
    turnCount: 0,
    world: { w: 0, h: 0 },
    player: freshPlayer(),
    grid: [],
    explored: [],
    zombies: [],
    loot: [],
    exit: { x: 0, y: 0 },
    messages: [],
    over: false,
    muted: false,
    invOpen: false,
  };
}

function inBounds(x, y) { return x >= 0 && x < state.world.w && y >= 0 && y < state.world.h; }

// ---------------------------------------------------------------------------
// Procedural connected map generator (guaranteed-connectivity flood fill)
// ---------------------------------------------------------------------------
function generateZone(w, h) {
  let grid = [];
  for (let y = 0; y < h; y++) {
    let row = [];
    for (let x = 0; x < w; x++) {
      const border = (x === 0 || y === 0 || x === w - 1 || y === h - 1);
      row.push(border ? '#' : (Math.random() < 0.42 ? '#' : '.'));
    }
    grid.push(row);
  }

  for (let iter = 0; iter < 4; iter++) {
    let next = grid.map(r => r.slice());
    for (let y = 1; y < h - 1; y++) {
      for (let x = 1; x < w - 1; x++) {
        let wallCount = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            if (grid[y + dy][x + dx] === '#') wallCount++;
          }
        }
        next[y][x] = wallCount >= 5 ? '#' : '.';
      }
    }
    grid = next;
  }

  const cx = Math.floor(w / 2), cy = Math.floor(h / 2);
  let start = null;
  const boundCheck = (x, y) => x >= 0 && x < w && y >= 0 && y < h;
  for (let r = 0; r < Math.max(w, h) && !start; r++) {
    for (let dy = -r; dy <= r && !start; dy++) {
      for (let dx = -r; dx <= r && !start; dx++) {
        const x = cx + dx, y = cy + dy;
        if (boundCheck(x, y) && grid[y][x] === '.') start = { x, y };
      }
    }
  }

  const visited = Array.from({ length: h }, () => new Array(w).fill(false));
  const queue = [start];
  visited[start.y][start.x] = true;
  const dist = Array.from({ length: h }, () => new Array(w).fill(-1));
  dist[start.y][start.x] = 0;
  let farthest = start;

  while (queue.length) {
    const cur = queue.shift();
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = cur.x + dx, ny = cur.y + dy;
      if (boundCheck(nx, ny) && !visited[ny][nx] && grid[ny][nx] === '.') {
        visited[ny][nx] = true;
        dist[ny][nx] = dist[cur.y][cur.x] + 1;
        if (dist[ny][nx] > dist[farthest.y][farthest.x]) farthest = { x: nx, y: ny };
        queue.push({ x: nx, y: ny });
      }
    }
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (grid[y][x] === '.' && !visited[y][x]) grid[y][x] = '#';
    }
  }

  const floorTiles = [];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (visited[y][x]) floorTiles.push({ x, y });
    }
  }

  return { grid, start, exit: farthest, floorTiles };
}

function manhattan(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function weightedPick(list) {
  const total = list.reduce((s, w) => s + w.weight, 0);
  let r = Math.random() * total;
  for (const w of list) { if (r < w.weight) return w; r -= w.weight; }
  return list[0];
}

function rollLoot() {
  const r = Math.random();
  if (r < 0.25) return { type: 'comida' };
  if (r < 0.50) return { type: 'agua' };
  if (r < 0.62) return { type: 'venda' };
  if (r < 0.70) return { type: 'antiseptico' };
  if (r < 0.85) return { type: 'tela' };
  if (r < 0.93) return { type: 'alcohol' };
  if (r < 0.98) return { type: 'arma', weapon: weightedPick(WEAPONS) };
  if (r < 0.995) return { type: 'balas' };
  return { type: 'nada' };
}

function newZone() {
  const { w, h } = zoneDimensions(state.zone);
  state.world = { w, h };
  const { grid, start, exit, floorTiles } = generateZone(w, h);
  state.grid = grid;
  state.exit = exit;
  state.explored = Array.from({ length: h }, () => new Array(w).fill(false));
  state.player.x = start.x;
  state.player.y = start.y;
  state.zombies = [];
  state.loot = [];

  const candidates = floorTiles.filter(t => manhattan(t, start) > 3 && (t.x !== exit.x || t.y !== exit.y));
  shuffle(candidates);

  const area = floorTiles.length;
  const zombieCount = Math.min(MAX_ZOMBIES_PER_ZONE, 2 + state.zone + Math.floor(area / 70));
  const typeCap = Math.min(ZOMBIE_TYPES.length - 1, Math.floor((state.zone - 1) / 2));
  const zombiePool = ZOMBIE_TYPES.slice(0, typeCap + 1);

  for (let i = 0; i < zombieCount && candidates.length; i++) {
    const spot = candidates.pop();
    const t = weightedPick(zombiePool);
    state.zombies.push({
      x: spot.x, y: spot.y, char: t.char, cls: t.cls, pcls: t.p, name: t.name,
      hp: t.hp + Math.floor(state.zone * 0.7), maxHp: t.hp + Math.floor(state.zone * 0.7),
      atk: t.atk, detect: t.detect, bite: t.bite, runner: t.runner, howler: t.howler,
      alerted: false, alive: true,
    });
  }

  const lootCount = Math.min(10, 2 + Math.floor(state.zone / 2) + Math.floor(area / 60));
  for (let i = 0; i < lootCount && candidates.length; i++) {
    const spot = candidates.pop();
    state.loot.push({ x: spot.x, y: spot.y });
  }

  log(`Zona ${state.zone}: entras con cautela en una nueva zona en ruinas (${w}x${h}).`);
}

function log(msg) { state.messages.push(msg); state.messages = state.messages.slice(-4); }
function zombieAt(x, y) { return state.zombies.find(z => z.alive && z.x === x && z.y === y); }

function isNight() { return Math.floor(state.turnCount / DAY_LENGTH) % 2 === 1; }
function currentViewRadius() { return isNight() ? NIGHT_VIEW_RADIUS : BASE_VIEW_RADIUS; }

function getCamera() {
  const { w, h } = state.world;
  const camX = Math.max(0, Math.min(Math.max(0, w - VIEWPORT_W), state.player.x - Math.floor(VIEWPORT_W / 2)));
  const camY = Math.max(0, Math.min(Math.max(0, h - VIEWPORT_H), state.player.y - Math.floor(VIEWPORT_H / 2)));
  return { camX, camY };
}

// ---------------------------------------------------------------------------
// Audio
// ---------------------------------------------------------------------------
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, duration, type, vol, glide) {
  if (state.muted) return;
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (glide) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + glide), audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch (e) { /* audio unavailable */ }
}
function sfx(name) {
  switch (name) {
    case 'attack': beep(220, 0.08, 'square', 0.05, -80); break;
    case 'miss': beep(150, 0.06, 'triangle', 0.03, -20); break;
    case 'hit': beep(120, 0.12, 'sawtooth', 0.06, -60); break;
    case 'bite': beep(90, 0.22, 'sawtooth', 0.07, -40); break;
    case 'heal': beep(500, 0.18, 'sine', 0.05, 220); break;
    case 'item': beep(700, 0.1, 'sine', 0.04, 140); break;
    case 'levelup': [660, 880, 990].forEach((f, i) => setTimeout(() => beep(f, 0.15, 'square', 0.05), i * 90)); break;
    case 'death': beep(140, 0.35, 'triangle', 0.05, -110); break;
    case 'alert': beep(320, 0.15, 'square', 0.06, 60); break;
    case 'shot': beep(200, 0.1, 'square', 0.08, -140); break;
    case 'howl': [500, 380, 500].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'sawtooth', 0.07), i * 130)); break;
  }
}
function toggleMute() {
  state.muted = !state.muted;
  document.getElementById('muteBtn').textContent = state.muted ? '🔇' : '🔊';
}

// ---------------------------------------------------------------------------
// Visual effects (world coords -> viewport-relative pixel placement)
// ---------------------------------------------------------------------------
function spawnFloatText(wx, wy, text, cls) {
  const { camX, camY } = getCamera();
  const vx = wx - camX, vy = wy - camY;
  if (vx < 0 || vx >= VIEWPORT_W || vy < 0 || vy >= VIEWPORT_H) return;
  const fx = document.getElementById('fx');
  const gridEl = document.getElementById('grid');
  const cw = gridEl.offsetWidth / VIEWPORT_W || 10;
  const ch = gridEl.offsetHeight / VIEWPORT_H || 16;
  const el = document.createElement('div');
  el.className = 'float-text ' + cls;
  el.textContent = text;
  el.style.left = (vx * cw + cw / 2) + 'px';
  el.style.top = (vy * ch) + 'px';
  fx.appendChild(el);
  setTimeout(() => el.remove(), 900);
}
function spawnParticles(wx, wy, pcls) {
  const { camX, camY } = getCamera();
  const vx = wx - camX, vy = wy - camY;
  if (vx < 0 || vx >= VIEWPORT_W || vy < 0 || vy >= VIEWPORT_H) return;
  const fx = document.getElementById('fx');
  const gridEl = document.getElementById('grid');
  const cw = gridEl.offsetWidth / VIEWPORT_W || 10;
  const ch = gridEl.offsetHeight / VIEWPORT_H || 16;
  const originX = vx * cw + cw / 2, originY = vy * ch + ch / 2;
  for (let i = 0; i < 7; i++) {
    const p = document.createElement('div');
    p.className = 'particle ' + pcls;
    const angle = Math.random() * Math.PI * 2;
    const dist = 14 + Math.random() * 14;
    p.style.left = originX + 'px'; p.style.top = originY + 'px';
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    fx.appendChild(p);
    setTimeout(() => p.remove(), 650);
  }
}
function shakeScreen() {
  const stageEl = document.getElementById('stage');
  stageEl.classList.remove('shake');
  void stageEl.offsetWidth;
  stageEl.classList.add('shake');
}
function showLevelUpBanner(text) {
  const el = document.getElementById('levelupBanner');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1900);
}
function spawnAsh() {
  const stageEl = document.getElementById('stage');
  if (!stageEl) return;
  const el = document.createElement('div');
  el.className = 'ash';
  el.style.left = (Math.random() * stageEl.clientWidth) + 'px';
  el.style.top = '-4px';
  el.style.setProperty('--ex', (Math.random() * 24 - 12) + 'px');
  stageEl.appendChild(el);
  setTimeout(() => el.remove(), 3700);
}
setInterval(spawnAsh, 700);

// ---------------------------------------------------------------------------
// Persistent record
// ---------------------------------------------------------------------------
async function loadRecord() {
  try {
    if (window.storage) {
      const res = await window.storage.get('apoc-ascii-best', false);
      if (res && res.value) bestZone = JSON.parse(res.value).bestZone || 1;
    }
  } catch (e) { /* no record yet */ }
  updateRecordLabel();
}
async function saveRecordIfBetter() {
  if (state.zone > bestZone) {
    bestZone = state.zone;
    updateRecordLabel();
    try { if (window.storage) await window.storage.set('apoc-ascii-best', JSON.stringify({ bestZone }), false); }
    catch (e) { /* ignore */ }
  }
}
function updateRecordLabel() {
  const el = document.getElementById('recordLabel');
  if (el) el.textContent = `Récord: Zona ${bestZone}`;
}

// ---------------------------------------------------------------------------
// Skills
// ---------------------------------------------------------------------------
function skillXpNeeded(level) { return 8 + level * 6; }
function gainSkillXp(name, amount) {
  const s = state.player.skills[name];
  s.xp += amount;
  while (s.xp >= skillXpNeeded(s.level)) {
    s.xp -= skillXpNeeded(s.level);
    s.level++;
    if (name === 'fitness') state.player.maxHp += 1;
    log(`Tu habilidad de ${SKILL_LABELS[name]} sube a nivel ${s.level}.`);
    showLevelUpBanner(`${SKILL_LABELS[name].toUpperCase()} ↑ NIVEL ${s.level}`);
    sfx('levelup');
  }
}

// ---------------------------------------------------------------------------
// Noise & alerts
// ---------------------------------------------------------------------------
function noiseEvent(x, y, radius) {
  for (const z of state.zombies) {
    if (!z.alive || z.alerted) continue;
    const dist = Math.max(Math.abs(z.x - x), Math.abs(z.y - y));
    if (dist <= radius) {
      const chance = 0.55;
      if (Math.random() < chance) alertZombie(z);
    }
  }
}
function alertZombie(z) {
  if (z.alerted) return;
  z.alerted = true;
  log(`¡Un/a ${z.name} te ha oído!`);
  sfx('alert');
  if (z.howler) {
    log('🔊 ¡El aullador da la alarma! Toda la zona te ha oído.');
    sfx('howl');
    for (const other of state.zombies) {
      if (other.alive) other.alerted = true;
    }
  }
}

// ---------------------------------------------------------------------------
// Core actions
// ---------------------------------------------------------------------------
function handleMove(dx, dy) {
  if (state.over || state.invOpen) return;
  const nx = state.player.x + dx, ny = state.player.y + dy;

  const target = zombieAt(nx, ny);
  if (target) { doPlayerAttack(target); advanceTurn(3); return; }

  if (inBounds(nx, ny) && state.grid[ny][nx] !== '#') {
    state.player.x = nx; state.player.y = ny;

    const item = state.loot.find(it => it.x === nx && it.y === ny);
    if (item) {
      state.loot = state.loot.filter(it => it !== item);
      collectLoot();
    }

    if (nx === state.exit.x && ny === state.exit.y) {
      state.zone++;
      log('Avanzas hacia una zona más peligrosa...');
      addChatarra(5);
      saveRecordIfBetter();
      newZone();
      render();
      return;
    }
  }

  advanceTurn(1);
}

function collectLoot() {
  const roll = rollLoot();
  if (roll.type === 'nada') { log('El contenedor está vacío.'); return; }
  if (roll.type === 'arma') {
    const better = roll.weapon.ranged ? !state.player.weaponRanged || roll.weapon.dmg > state.player.weaponDmg
                                       : roll.weapon.dmg > state.player.weaponDmg;
    if (better) {
      state.player.weaponName = roll.weapon.name;
      state.player.weaponDmg = roll.weapon.dmg;
      state.player.weaponRanged = roll.weapon.ranged;
      log(`Encuentras un/una ${roll.weapon.name}. ¡Mejor que tu arma actual!`);
      spawnFloatText(state.player.x, state.player.y, roll.weapon.name, 'info');
    } else {
      log(`Encuentras un/una ${roll.weapon.name}, pero tu arma actual es mejor.`);
    }
  } else {
    state.player.inventory[roll.type]++;
    const names = { comida: 'comida', agua: 'agua', venda: 'vendas', antiseptico: 'antiséptico', tela: 'tela', alcohol: 'alcohol', balas: 'balas' };
    log(`Encuentras ${names[roll.type]}. (+1)`);
    spawnFloatText(state.player.x, state.player.y, '+1', 'info');
  }
  sfx('item');
}

function handleAttack() {
  if (state.over || state.invOpen) return;
  const p = state.player;
  for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
    const target = zombieAt(p.x + dx, p.y + dy);
    if (target) { doPlayerAttack(target); advanceTurn(3); return; }
  }
  log('No hay ningún zombi cerca para atacar.');
  render();
}

function findRangedTarget() {
  const p = state.player;
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    for (let dist = 1; dist <= 6; dist++) {
      const x = p.x + dx * dist, y = p.y + dy * dist;
      if (!inBounds(x, y) || state.grid[y][x] === '#') break;
      const z = zombieAt(x, y);
      if (z) return z;
    }
  }
  return null;
}

function handleShoot() {
  if (state.over || state.invOpen) return;
  const p = state.player;
  if (!p.weaponRanged) { log(`Tu ${p.weaponName} no dispara a distancia.`); render(); return; }
  if (p.inventory.balas <= 0) { log('No tienes balas.'); render(); return; }

  const target = findRangedTarget();
  if (!target) { log('No hay ningún objetivo en línea de tiro.'); render(); return; }

  p.inventory.balas--;
  const fatiguePenalty = p.fatigue >= 70 ? 0.15 : (p.fatigue >= 40 ? 0.06 : 0);
  const hitChance = Math.min(0.92, 0.78 - fatiguePenalty);
  sfx('shot');

  if (Math.random() < hitChance) {
    const dmg = Math.max(1, p.weaponDmg + Math.floor(Math.random() * 3) - 1);
    target.hp -= dmg;
    spawnFloatText(target.x, target.y, '-' + dmg, 'dmg');
    log(`Disparas a${target.name === 'brutote' ? 'l' : ' la'} ${target.name} (-${dmg}).`);
    gainSkillXp('melee', 2);
    if (target.hp <= 0) {
      target.alive = false;
      spawnParticles(target.x, target.y, target.pcls);
      log(`¡${capitalize(target.name)} cae abatido!`);
      addChatarra(1);
    }
  } else {
    log('Fallas el disparo.');
  }

  noiseEvent(p.x, p.y, 10); // gunshots are very loud
  advanceTurn(2);
}

function handleRest() {
  if (state.over || state.invOpen) return;
  state.player.fatigue = Math.max(0, state.player.fatigue - 14);
  log('Descansas un momento para recuperar el aliento.');
  advanceTurn(0);
}

function doPlayerAttack(defender) {
  const p = state.player;
  const fatiguePenalty = p.fatigue >= 70 ? 0.15 : (p.fatigue >= 40 ? 0.06 : 0);
  const hitChance = Math.min(0.95, 0.75 + p.skills.melee.level * 0.03 - fatiguePenalty);

  if (Math.random() < hitChance) {
    const dmg = Math.max(1, p.weaponDmg + Math.floor(p.skills.melee.level * 0.8) + Math.floor(Math.random() * 3) - 1);
    defender.hp -= dmg;
    spawnFloatText(defender.x, defender.y, '-' + dmg, 'dmg');
    sfx('attack');
    log(`Golpeas a${defender.name === 'brutote' ? 'l' : ' la'} ${defender.name} con tu ${p.weaponName} (-${dmg}).`);
    gainSkillXp('melee', 3);

    if (defender.hp <= 0) {
      defender.alive = false;
      spawnParticles(defender.x, defender.y, defender.pcls);
      log(`¡${capitalize(defender.name)} cae abatido!`);
      addChatarra(1);
    }
  } else {
    spawnFloatText(defender.x, defender.y, 'fallo', 'info');
    sfx('miss');
    log('Fallas el golpe.');
    gainSkillXp('melee', 1);
  }

  noiseEvent(p.x, p.y, 4); // melee combat is noticeably loud too
}

function inflictBite(zombie) {
  const p = state.player;
  const biteChance = Math.max(0.03, zombie.bite - p.skills.melee.level * 0.01);
  let newSeverity = null;
  if (Math.random() < biteChance) newSeverity = 'bite';
  else if (Math.random() < 0.3) newSeverity = 'scratch';

  if (newSeverity) {
    const rank = { scratch: 1, bite: 2 };
    const currentRank = p.wound ? rank[p.wound.severity] : 0;
    if (rank[newSeverity] >= currentRank) p.wound = { severity: newSeverity, treated: false };
    else p.wound.treated = false;

    if (newSeverity === 'bite') {
      log('¡Te ha mordido! Necesitas tratarte la herida cuanto antes.');
      spawnFloatText(p.x, p.y, '¡MORDIDA!', 'bite');
      sfx('bite');
    } else {
      log('Te ha arañado. Deberías vendarte antes de que se infecte.');
    }
  }
}

function zombiesTurn() {
  for (const z of state.zombies) {
    if (!z.alive) continue;
    const dist = Math.max(Math.abs(z.x - state.player.x), Math.abs(z.y - state.player.y));
    const nightBonus = isNight() ? 1 : 0;
    const effectiveDetect = Math.max(1, z.detect + nightBonus - Math.floor(state.player.skills.sneak.level / 3));

    if (!z.alerted) {
      if (dist <= effectiveDetect) {
        const detectChance = 0.35 + (effectiveDetect - dist) * 0.12;
        if (Math.random() < detectChance) {
          alertZombie(z);
        } else {
          gainSkillXp('sneak', 1);
        }
      }
      continue;
    }

    if (dist === 1) {
      const dmg = Math.max(1, z.atk + Math.floor(Math.random() * 3) - 1);
      state.player.hp -= dmg;
      spawnFloatText(state.player.x, state.player.y, '-' + dmg, 'dmg');
      shakeScreen();
      sfx('hit');
      log(`${capitalize(z.name)} te golpea (-${dmg}).`);
      inflictBite(z);
      continue;
    }

    const steps = z.runner && Math.random() < 0.6 ? 2 : 1;
    for (let s = 0; s < steps; s++) {
      const d2 = Math.max(Math.abs(z.x - state.player.x), Math.abs(z.y - state.player.y));
      if (d2 <= 1) break;
      const ddx = Math.sign(state.player.x - z.x);
      const ddy = Math.sign(state.player.y - z.y);
      let nx = z.x, ny = z.y;
      if (Math.random() < 0.5 && ddx !== 0) nx = z.x + ddx; else ny = z.y + ddy;
      if (inBounds(nx, ny) && state.grid[ny][nx] !== '#' && !zombieAt(nx, ny) &&
          !(nx === state.player.x && ny === state.player.y)) {
        z.x = nx; z.y = ny;
      }
    }
  }
  state.zombies = state.zombies.filter(z => z.alive);
}

function gainFatigue(amount) {
  const p = state.player;
  const mult = Math.max(0.6, 1 - p.skills.fitness.level * 0.03);
  p.fatigue = Math.min(100, p.fatigue + amount * mult);
}

function spawnNightHorde() {
  const { w, h } = state.world;
  if (state.zombies.length >= MAX_ZOMBIES_PER_ZONE) return;
  const floorSpots = [];
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      if (state.grid[y][x] === '.' && Math.max(Math.abs(x - state.player.x), Math.abs(y - state.player.y)) > 6) {
        floorSpots.push({ x, y });
      }
    }
  }
  if (!floorSpots.length) return;
  shuffle(floorSpots);
  const extra = Math.min(2, floorSpots.length, MAX_ZOMBIES_PER_ZONE - state.zombies.length);
  for (let i = 0; i < extra; i++) {
    const spot = floorSpots[i];
    const t = weightedPick(ZOMBIE_TYPES.slice(0, Math.min(ZOMBIE_TYPES.length, 2 + state.zone)));
    state.zombies.push({
      x: spot.x, y: spot.y, char: t.char, cls: t.cls, pcls: t.p, name: t.name,
      hp: t.hp + Math.floor(state.zone * 0.7), maxHp: t.hp + Math.floor(state.zone * 0.7),
      atk: t.atk, detect: t.detect, bite: t.bite, runner: t.runner, howler: t.howler,
      alerted: false, alive: true,
    });
  }
  if (extra > 0) log('🌙 Oyes movimiento a lo lejos... ha llegado una horda nocturna.');
}

function tickSurvival() {
  const p = state.player;
  p.hunger = Math.max(0, p.hunger - 0.45);
  p.thirst = Math.max(0, p.thirst - 0.7);
  gainFatigue(1);

  if (p.hunger <= 0) p.hp -= 1;
  if (p.thirst <= 0) p.hp -= 1.5;

  if (p.wound && !p.wound.treated) {
    p.infection = Math.min(100, p.infection + (p.wound.severity === 'bite' ? 6 : 3));
  } else if (p.wound && p.wound.treated) {
    p.infection = Math.max(0, p.infection - 1);
    if (Math.random() < 0.15) { log('Tu herida ha cicatrizado por completo.'); p.wound = null; }
  }

  if (p.infection >= 100) { state.over = true; state.deathCause = 'infection'; sfx('death'); log('La infección te ha consumido...'); }
  if (p.hp <= 0) { state.over = true; state.deathCause = 'hp'; sfx('death'); log('Los muertos te han alcanzado...'); }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function advanceTurn(fatigueCost) {
  if (fatigueCost) gainFatigue(fatigueCost);
  if (state.over) { render(); showOverlay(); return; }

  const wasNight = isNight();
  state.turnCount++;
  const nowNight = isNight();
  if (nowNight && !wasNight) spawnNightHorde();

  zombiesTurn();
  tickSurvival();
  gainSkillXp('fitness', 1);

  if (state.over) { render(); showOverlay(); return; }
  render();
}

// ---------------------------------------------------------------------------
// Inventory & crafting
// ---------------------------------------------------------------------------
function openInventory() {
  if (state.over) return;
  state.invOpen = true;
  renderInventory();
  document.getElementById('invOverlay').classList.add('show');
}
function closeInventory() {
  state.invOpen = false;
  document.getElementById('invOverlay').classList.remove('show');
}

function useItem(type) {
  const p = state.player;
  if (p.inventory[type] <= 0) return;

  if (type === 'comida') {
    p.inventory.comida--;
    const gain = 28 + p.skills.survival.level * 2;
    p.hunger = Math.min(100, p.hunger + gain);
    log(`Comes algo. (+${gain} hambre)`);
    gainSkillXp('survival', 2);
    sfx('item');
  } else if (type === 'agua') {
    p.inventory.agua--;
    const gain = 32 + p.skills.survival.level * 2;
    p.thirst = Math.min(100, p.thirst + gain);
    log(`Bebes agua. (+${gain} sed)`);
    gainSkillXp('survival', 2);
    sfx('item');
  } else if (type === 'venda') {
    if (!p.wound) { log('No tienes heridas que vendar.'); renderInventory(); return; }
    p.inventory.venda--;
    p.wound.treated = true;
    p.hp = Math.min(p.maxHp, p.hp + 3);
    log('Te vendas la herida. Deja de empeorar.');
    gainSkillXp('firstaid', 2);
    sfx('heal');
  } else if (type === 'antiseptico') {
    p.inventory.antiseptico--;
    p.infection = Math.max(0, p.infection - 30);
    if (p.wound) p.wound.treated = true;
    log('Usas antiséptico. La infección retrocede.');
    gainSkillXp('firstaid', 3);
    sfx('heal');
  }
  renderInventory();
  advanceTurn(1);
}

const RECIPES = [
  { id: 'venda', label: '2 Tela → 1 Venda', needs: { tela: 2 }, gives: { venda: 1 } },
  { id: 'antiseptico', label: '1 Tela + 1 Alcohol → 1 Antiséptico', needs: { tela: 1, alcohol: 1 }, gives: { antiseptico: 1 } },
];

function craft(id) {
  const recipe = RECIPES.find(r => r.id === id);
  if (!recipe) return;
  const p = state.player;
  const canCraft = Object.keys(recipe.needs).every(k => p.inventory[k] >= recipe.needs[k]);
  if (!canCraft) return;
  Object.keys(recipe.needs).forEach(k => p.inventory[k] -= recipe.needs[k]);
  Object.keys(recipe.gives).forEach(k => p.inventory[k] += recipe.gives[k]);
  log(`Fabricas: ${recipe.label}.`);
  sfx('item');
  renderInventory();
  render();
}

function renderInventory() {
  const p = state.player;
  const items = [
    { type: 'comida', label: '🍖 Comida', qty: p.inventory.comida },
    { type: 'agua', label: '💧 Agua', qty: p.inventory.agua },
    { type: 'venda', label: '🩹 Vendas', qty: p.inventory.venda },
    { type: 'antiseptico', label: '☣ Antiséptico', qty: p.inventory.antiseptico },
    { type: 'tela', label: '🧵 Tela', qty: p.inventory.tela, noUse: true },
    { type: 'alcohol', label: '🧪 Alcohol', qty: p.inventory.alcohol, noUse: true },
    { type: 'balas', label: '🔫 Balas', qty: p.inventory.balas, noUse: true },
  ];
  const listEl = document.getElementById('invList');
  listEl.innerHTML = items.map(it => `
    <div class="inv-row">
      <span class="name">${it.label}<span class="qty">x${it.qty}</span></span>
      ${it.noUse ? '' : `<button onclick="useItem('${it.type}')" ${it.qty <= 0 ? 'disabled' : ''}>Usar</button>`}
    </div>
  `).join('');

  const craftEl = document.getElementById('craftList');
  craftEl.innerHTML = RECIPES.map(r => {
    const can = Object.keys(r.needs).every(k => p.inventory[k] >= r.needs[k]);
    return `
      <div class="inv-row">
        <span class="name">${r.label}</span>
        <button onclick="craft('${r.id}')" ${can ? '' : 'disabled'}>Crear</button>
      </div>
    `;
  }).join('');
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function showOverlay() {
  const cause = state.deathCause === 'infection' ? 'La infección terminó ganando la partida.' : 'Los muertos te alcanzaron.';
  document.getElementById('overlayTitle').textContent = state.deathCause === 'infection' ? 'TE HAS INFECTADO' : 'TE HAN DEVORADO';
  document.getElementById('overlayText').textContent =
    `${cause} Llegaste a la zona ${state.zone}, con Combate Nv.${state.player.skills.melee.level}.`;
  document.getElementById('overlay').classList.add('show');
}

function restart() {
  document.getElementById('overlay').classList.remove('show');
  const muted = state.muted;
  state = freshState();
  state.muted = muted;
  document.getElementById('campScreen').classList.add('show');
  renderCamp();
}

function render() {
  const p = state.player;
  document.getElementById('zoneLabel').textContent = `ZONA ${state.zone} (${state.world.w}x${state.world.h})`;
  const night = isNight();
  const dnEl = document.getElementById('dayNightLabel');
  dnEl.textContent = night ? '🌙 Noche' : '☀ Día';
  dnEl.className = 'daynight ' + (night ? 'night' : 'day');
  document.getElementById('stage').classList.toggle('night', night);

  let weaponText = `Arma: ${p.weaponName}`;
  if (p.weaponRanged) weaponText += ` (${p.inventory.balas} balas)`;
  document.getElementById('weaponLabel').textContent = weaponText;

  const hpPct = Math.max(0, Math.round((p.hp / p.maxHp) * 100));
  const hpFill = document.getElementById('hpFill');
  hpFill.style.width = hpPct + '%';
  hpFill.className = 'bar-fill fill-hp' + (hpPct <= 30 ? ' low' : '');
  document.getElementById('hpText').textContent = `${Math.max(0, Math.round(p.hp))}/${p.maxHp}`;

  document.getElementById('hungerFill').style.width = p.hunger + '%';
  document.getElementById('hungerText').textContent = Math.round(p.hunger);
  document.getElementById('thirstFill').style.width = p.thirst + '%';
  document.getElementById('thirstText').textContent = Math.round(p.thirst);
  document.getElementById('fatigueFill').style.width = p.fatigue + '%';
  document.getElementById('fatigueText').textContent = Math.round(p.fatigue);

  const infFill = document.getElementById('infectionFill');
  infFill.style.width = p.infection + '%';
  infFill.className = 'bar-fill fill-infection' + (p.infection >= 50 ? ' high' : '');
  document.getElementById('infectionText').textContent = Math.round(p.infection);

  const woundEl = document.getElementById('woundTag');
  if (p.wound) {
    const label = p.wound.severity === 'bite' ? 'Mordida' : 'Arañazo';
    woundEl.innerHTML = `<span class="wound-tag ${p.wound.treated ? 'treated' : ''}">${label}${p.wound.treated ? ' (tratada)' : ' (sin tratar)'}</span>`;
  } else {
    woundEl.innerHTML = '';
  }

  const skillsEl = document.getElementById('skillsBar');
  skillsEl.innerHTML = Object.keys(SKILL_LABELS).map(k => `<span>${SKILL_LABELS[k]} <b>Nv.${p.skills[k].level}</b></span>`).join('');

  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${VIEWPORT_W}, 1ch)`;
  gridEl.innerHTML = '';

  const { camX, camY } = getCamera();
  const px = p.x, py = p.y;
  const viewRadius = currentViewRadius();

  for (let vy = 0; vy < VIEWPORT_H; vy++) {
    for (let vx = 0; vx < VIEWPORT_W; vx++) {
      const wx = camX + vx, wy = camY + vy;
      const span = document.createElement('span');
      span.className = 'cell';

      if (!inBounds(wx, wy)) {
        span.textContent = ' '; span.classList.add('c-hidden'); gridEl.appendChild(span); continue;
      }

      const d = Math.hypot(wx - px, wy - py);
      const visibleNow = d <= viewRadius;
      if (visibleNow) state.explored[wy][wx] = true;
      const explored = state.explored[wy][wx];

      if (!visibleNow && !explored) {
        span.textContent = ' '; span.classList.add('c-hidden'); gridEl.appendChild(span); continue;
      }

      let ch = state.grid[wy][wx] === '#' ? '#' : '.';
      let cls = state.grid[wy][wx] === '#' ? (visibleNow ? 'c-wall' : 'c-wall-dim') : (visibleNow ? 'c-floor' : 'c-floor-dim');

      if (wx === state.exit.x && wy === state.exit.y) { ch = '>'; cls = visibleNow ? 'c-exit' : 'c-exit-dim'; }

      if (visibleNow) {
        const item = state.loot.find(it => it.x === wx && it.y === wy);
        if (item) { ch = '$'; cls = 'c-loot'; }
        const zombie = zombieAt(wx, wy);
        if (zombie) { ch = zombie.char; cls = zombie.cls; }
      }

      if (wx === px && wy === py) { ch = '@'; cls = 'c-player'; }

      span.textContent = ch;
      span.classList.add(cls);
      gridEl.appendChild(span);
    }
  }

  const fxEl = document.getElementById('fx');
  fxEl.style.width = gridEl.offsetWidth + 'px';
  fxEl.style.height = gridEl.offsetHeight + 'px';

  const logEl = document.getElementById('log');
  logEl.innerHTML = state.messages.map(m => `<div>${m}</div>`).join('');
}

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'arrowup' || key === 'w') handleMove(0, -1);
  else if (key === 'arrowdown' || key === 's') handleMove(0, 1);
  else if (key === 'arrowleft' || key === 'a') handleMove(-1, 0);
  else if (key === 'arrowright' || key === 'd') handleMove(1, 0);
  else if (key === 'f' || key === ' ') handleAttack();
  else if (key === 'g') handleShoot();
  else if (key === 'r') handleRest();
  else if (key === 'i') openInventory();
  else if (key === 'escape') closeInventory();
});

state = freshState();
loadCamp();
</script>
