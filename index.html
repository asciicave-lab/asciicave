<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0C1322;--ink-2:#121B2F;--ink-3:#1A2540;
  --paper:#EDE7D8;--muted:#8B94A8;
  --gold:#E3B254;--gold-soft:rgba(227,178,84,.14);
  --wax:#C8553D;--leaf:#6FA98C;
  --line:rgba(237,231,216,.12);--radius:10px;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--paper);font-family:var(--font-body);font-size:16px;line-height:1.6;min-height:100vh}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
   radial-gradient(1px 1px at 12% 18%, rgba(237,231,216,.35) 50%, transparent 51%),
   radial-gradient(1px 1px at 78% 9%, rgba(237,231,216,.25) 50%, transparent 51%),
   radial-gradient(1.5px 1.5px at 55% 30%, rgba(227,178,84,.3) 50%, transparent 51%),
   radial-gradient(1px 1px at 90% 55%, rgba(237,231,216,.2) 50%, transparent 51%),
   radial-gradient(1px 1px at 30% 70%, rgba(237,231,216,.15) 50%, transparent 51%);
}
a{color:var(--gold);text-decoration:none}
button{font-family:var(--font-body);cursor:pointer}

/* ---------- Cabecera ---------- */
header{position:sticky;top:0;z-index:50;background:rgba(12,19,34,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav{max-width:1180px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;gap:16px}
.logo{font-family:var(--font-mono);font-size:1.25rem;font-weight:600;letter-spacing:.5px;color:var(--paper);display:flex;align-items:center;gap:9px;cursor:pointer;flex-shrink:0}
.logo .glyph{color:var(--gold);font-size:1.05rem;border:1px solid rgba(227,178,84,.5);border-radius:6px;padding:2px 7px;background:var(--gold-soft)}
.nav-links{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav-links::-webkit-scrollbar{display:none}
.nav-links button{background:none;border:none;color:var(--muted);padding:8px 12px;border-radius:8px;font-size:.92rem;white-space:nowrap}
.nav-links button:hover{color:var(--paper);background:var(--ink-3)}
.nav-links button.active{color:var(--gold);background:var(--gold-soft)}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative}
.lang-toggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.lang-toggle button{background:none;border:none;color:var(--muted);padding:5px 10px;font-size:.8rem;font-family:var(--font-mono)}
.lang-toggle button.on{background:var(--gold);color:var(--ink);font-weight:600}
.premium-pill{border:1px solid var(--gold);color:var(--gold);background:none;border-radius:20px;padding:5px 14px;font-size:.82rem;transition:.2s;white-space:nowrap}
.premium-pill.on{background:var(--gold);color:var(--ink);font-weight:600}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--ink-3);border:1px solid var(--line);border-radius:20px;padding:5px 14px 5px 6px;color:var(--paper);font-size:.85rem}
.user-chip .avatar{width:24px;height:24px;border-radius:50%;background:var(--gold);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem}
.user-chip .role{font-family:var(--font-mono);font-size:.65rem;color:var(--gold);letter-spacing:1px}
.dropdown{position:absolute;top:52px;right:0;background:var(--ink-2);border:1px solid var(--line);border-radius:10px;min-width:200px;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,.5);display:flex;flex-direction:column;z-index:60}
.dropdown button{background:none;border:none;color:var(--paper);text-align:left;padding:10px 14px;border-radius:7px;font-size:.9rem}
.dropdown button:hover{background:var(--ink-3)}
.dropdown .badge{background:var(--gold);color:var(--ink);border-radius:10px;padding:0 7px;font-size:.72rem;font-weight:700;margin-left:6px}
.login-btn{background:var(--gold);color:var(--ink);border:none;border-radius:20px;padding:6px 16px;font-size:.85rem;font-weight:600;white-space:nowrap}

main{max-width:1180px;margin:0 auto;padding:28px 20px 90px;position:relative;z-index:1}

/* ---------- Hero ---------- */
.hero{padding:54px 0 40px;display:grid;grid-template-columns:1.25fr .75fr;gap:40px;align-items:center;border-bottom:1px solid var(--line);margin-bottom:36px}
.hero h1{font-family:var(--font-display);font-size:clamp(2.4rem,5vw,3.8rem);font-weight:600;line-height:1.08}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p{color:var(--muted);margin:18px 0 26px;max-width:520px;font-size:1.05rem}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.constellation{justify-self:center}

/* ---------- Botones ---------- */
.btn{border:none;border-radius:8px;padding:11px 22px;font-size:.95rem;font-weight:500;transition:.15s}
.btn-gold{background:var(--gold);color:var(--ink);font-weight:600}
.btn-gold:hover{filter:brightness(1.1)}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--paper)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-wax{background:none;border:1px solid var(--wax);color:var(--wax)}
.btn-wax:hover{background:var(--wax);color:var(--paper)}
.btn-leaf{background:none;border:1px solid var(--leaf);color:var(--leaf)}
.btn-leaf:hover{background:var(--leaf);color:var(--ink)}
.btn-sm{padding:7px 14px;font-size:.85rem}
.btn[disabled]{opacity:.4;cursor:not-allowed}

/* ---------- Secciones / tarjetas ---------- */
.sec-title{font-family:var(--font-display);font-size:1.8rem;font-weight:600;margin:34px 0 6px}
.sec-sub{color:var(--muted);font-size:.92rem;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:16px}
.card{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:18px;transition:.15s;cursor:pointer;display:flex;flex-direction:column;gap:8px}
.card:hover{border-color:rgba(227,178,84,.5);transform:translateY(-2px)}
.card .cover-thumb{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.card h3{font-family:var(--font-display);font-size:1.3rem;font-weight:600;line-height:1.2}
.card .author{color:var(--muted);font-size:.84rem}
.card .syn{color:var(--muted);font-size:.86rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:.72rem;font-family:var(--font-mono);border:1px solid var(--line);border-radius:20px;padding:2px 9px;color:var(--muted)}
.tag.g{border-color:rgba(227,178,84,.4);color:var(--gold)}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:.78rem;color:var(--muted);border-top:1px solid var(--line);padding-top:10px;margin-top:4px}
.stars-inline{color:var(--gold);letter-spacing:1px}

/* ---------- Estados vacíos ---------- */
.empty{border:1px dashed var(--line);border-radius:14px;padding:56px 30px;text-align:center;margin:20px 0}
.empty .e-glyph{font-family:var(--font-mono);font-size:1.6rem;color:var(--gold);letter-spacing:3px;display:block;margin-bottom:14px}
.empty h3{font-family:var(--font-display);font-size:1.6rem;font-weight:600;margin-bottom:8px}
.empty p{color:var(--muted);max-width:440px;margin:0 auto 20px;font-size:.92rem}

/* ---------- Publicidad ---------- */
.ad{background:linear-gradient(135deg,#1A2540,#121B2F);border:1px dashed rgba(139,148,168,.4);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:16px;position:relative}
.ad::before{content:attr(data-label);position:absolute;top:-9px;left:14px;background:var(--ink);color:var(--muted);font-size:.66rem;font-family:var(--font-mono);letter-spacing:1.5px;text-transform:uppercase;padding:0 8px}
.ad .ad-ico{font-size:1.6rem}
.ad .ad-body{flex:1}
.ad .ad-body strong{display:block;font-size:.92rem}
.ad .ad-body span{color:var(--muted);font-size:.8rem}
.ad .ad-cta{font-size:.78rem;border:1px solid var(--muted);color:var(--muted);border-radius:6px;padding:5px 12px;background:none;white-space:nowrap}
.ad-note{text-align:center;font-size:.72rem;color:var(--muted);margin-top:6px}
.ad-note a{cursor:pointer}

/* ---------- Ficha de novela ---------- */
.novel-head{display:grid;grid-template-columns:150px 1fr;gap:26px;margin-bottom:26px}
.cover{width:150px;height:210px;border-radius:8px;display:flex;align-items:flex-end;padding:12px;font-family:var(--font-display);font-weight:600;font-size:1.05rem;line-height:1.15;color:var(--paper);text-shadow:0 1px 4px rgba(0,0,0,.5);border:1px solid var(--line);background-size:cover;background-position:center}
.novel-head h1{font-family:var(--font-display);font-size:2.2rem;font-weight:600;line-height:1.1}
.byline{color:var(--muted);margin:6px 0 12px}
.stat-row{display:flex;gap:22px;flex-wrap:wrap;font-family:var(--font-mono);font-size:.82rem;color:var(--muted);margin:14px 0}
.stat-row b{color:var(--paper);font-weight:500}
.novel-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;align-items:center}
.rating-panel{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:20px;display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:center;margin:22px 0}
.big-score{text-align:center}
.big-score .n{font-family:var(--font-display);font-size:3rem;font-weight:600;color:var(--gold);line-height:1}
.big-score .v{font-size:.75rem;color:var(--muted);font-family:var(--font-mono)}
.cat-bars{display:grid;gap:8px}
.cat-bar{display:grid;grid-template-columns:110px 1fr 34px;gap:12px;align-items:center;font-size:.84rem}
.cat-bar .track{height:6px;background:var(--ink-3);border-radius:3px;overflow:hidden}
.cat-bar .fill{height:100%;background:var(--gold);border-radius:3px}
.cat-bar .val{font-family:var(--font-mono);color:var(--muted);font-size:.78rem;text-align:right}
.chap-list{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.chap-item{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border:1px solid transparent;border-bottom:1px solid var(--line);cursor:pointer;border-radius:6px}
.chap-item:hover{background:var(--ink-2);border-color:var(--line)}
.chap-item .num{font-family:var(--font-mono);color:var(--gold);font-size:.8rem;margin-right:12px}
.chap-item .read-mark{font-size:.72rem;color:var(--leaf);font-family:var(--font-mono)}

/* ---------- Lector ---------- */
.reader{max-width:720px;margin:0 auto}
.reader-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;font-size:.85rem;color:var(--muted)}
.reader h1{font-family:var(--font-display);font-size:2rem;font-weight:600;margin-bottom:4px}
.reader .chap-of{font-family:var(--font-mono);font-size:.78rem;color:var(--muted);margin-bottom:26px}
.reader-body{font-size:1.08rem;line-height:1.85}
.reader-body p{margin-bottom:1.3em}
.author-note{background:var(--gold-soft);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 18px;margin:26px 0;font-size:.92rem}
.author-note .an-label{font-family:var(--font-mono);font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:6px}
.reader-nav{display:flex;justify-content:space-between;gap:12px;margin-top:40px;padding-top:22px;border-top:1px solid var(--line)}
.rate-nudge{background:var(--ink-2);border:1px solid rgba(227,178,84,.4);border-radius:var(--radius);padding:18px;text-align:center;margin-top:30px}
.patreon-box{background:linear-gradient(135deg,rgba(200,85,61,.15),transparent);border:1px solid rgba(200,85,61,.4);border-radius:var(--radius);padding:16px 18px;margin-top:26px;display:flex;align-items:center;gap:14px}
.patreon-box .p-ico{font-size:1.5rem}
.patreon-box small{color:var(--muted);display:block}

/* ---------- Comentarios ---------- */
.comments{margin-top:40px;border-top:1px solid var(--line);padding-top:26px}
.comments h3{font-family:var(--font-display);font-size:1.5rem;margin-bottom:14px}
.comment{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.comment .avatar{width:34px;height:34px;border-radius:50%;background:var(--ink-3);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.comment .c-head{font-size:.82rem;color:var(--muted);margin-bottom:3px}
.comment .c-head b{color:var(--paper);font-weight:600}
.comment p{font-size:.92rem}
.comment-form{display:flex;gap:10px;margin-top:16px;align-items:flex-start}
.comment-form textarea{min-height:70px}

/* ---------- Formularios ---------- */
.form{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:22px}
.field label{display:block;font-size:.85rem;font-weight:500;margin-bottom:7px}
.field .hint{font-size:.78rem;color:var(--muted);font-weight:400;margin-left:6px}
input[type=text],input[type=url],input[type=email],input[type=password],textarea,select{width:100%;background:var(--ink-3);border:1px solid var(--line);border-radius:8px;color:var(--paper);padding:11px 14px;font-family:var(--font-body);font-size:.95rem}
textarea{resize:vertical;min-height:110px;line-height:1.7}
textarea.chap-body{min-height:260px;line-height:1.8}
input:focus,textarea:focus{outline:none;border-color:var(--gold)}
.editor-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.editor-toolbar select{width:auto;background:var(--ink-3);border:1px solid var(--line);border-radius:6px;color:var(--paper);padding:6px 10px;font-size:.8rem}
.editor-toolbar .word-count{margin-left:auto;font-family:var(--font-mono);font-size:.74rem;color:var(--muted);white-space:nowrap}
.pill-picker{display:flex;flex-wrap:wrap;gap:8px}
.pill{border:1px solid var(--line);background:none;color:var(--muted);border-radius:20px;padding:6px 14px;font-size:.83rem;transition:.12s}
.pill:hover{border-color:var(--gold);color:var(--paper)}
.pill.sel{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600}
.pill[disabled]{opacity:.3;cursor:not-allowed}
.counter{font-family:var(--font-mono);font-size:.75rem;color:var(--muted)}
.counter.full{color:var(--wax)}
.callout{background:var(--ink-2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 18px;font-size:.88rem;color:var(--muted)}
.callout b{color:var(--paper)}
.callout.warn{border-left-color:var(--wax)}

/* ---------- Moderación / obras ---------- */
.mod-card{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:16px}
.mod-card h3{font-family:var(--font-display);font-size:1.4rem;margin-bottom:4px}
.mod-status{font-family:var(--font-mono);font-size:.72rem;letter-spacing:1px;text-transform:uppercase;border-radius:20px;padding:3px 12px;display:inline-block;margin-bottom:10px}
.st-pendiente{border:1px solid var(--gold);color:var(--gold)}
.st-aprobada{border:1px solid var(--leaf);color:var(--leaf)}
.st-rechazada{border:1px solid var(--wax);color:var(--wax)}
.mod-excerpt{background:var(--ink);border-radius:8px;padding:14px;font-size:.88rem;color:var(--muted);margin:12px 0;max-height:140px;overflow:auto}
.mod-actions{display:flex;gap:10px;flex-wrap:wrap}
.work-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
.work-row h4{font-family:var(--font-display);font-size:1.15rem;font-weight:600}
.work-row .w-meta{font-family:var(--font-mono);font-size:.75rem;color:var(--muted)}
.reject-note{background:rgba(200,85,61,.1);border:1px solid rgba(200,85,61,.4);border-radius:8px;padding:10px 14px;font-size:.84rem;color:var(--wax);margin-top:8px;grid-column:1/-1}

/* ---------- Ranking ---------- */
.rank-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.rank-tabs button{background:none;border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:7px 16px;font-size:.85rem}
.rank-tabs button.on{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600}
.rank-row{display:grid;grid-template-columns:52px 1fr auto;gap:16px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;border-radius:8px}
.rank-row:hover{background:var(--ink-2)}
.rank-pos{font-family:var(--font-display);font-size:1.9rem;font-weight:600;color:var(--muted);text-align:center}
.rank-row:nth-child(-n+3) .rank-pos{color:var(--gold)}
.rank-main h3{font-family:var(--font-display);font-size:1.25rem;font-weight:600}
.rank-main span{color:var(--muted);font-size:.82rem}
.rank-metric{font-family:var(--font-mono);font-size:.9rem;color:var(--gold);text-align:right;white-space:nowrap}
.rank-metric small{display:block;color:var(--muted);font-size:.68rem;letter-spacing:1px;text-transform:uppercase}

/* ---------- Perfil ---------- */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
.panel h3{font-family:var(--font-display);font-size:1.3rem;margin-bottom:10px}
.panel p{color:var(--muted);font-size:.88rem;margin-bottom:14px}
.panel.wide{grid-column:1/-1}

/* ---------- Modales ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(6,10,18,.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:30px;max-width:460px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-family:var(--font-display);font-size:1.6rem;margin-bottom:4px}
.modal .sub{color:var(--muted);font-size:.85rem;margin-bottom:20px}
.rate-cat{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.rate-cat span{font-size:.92rem}
.star-picker{display:flex;gap:4px}
.star-picker button{background:none;border:none;font-size:1.35rem;color:var(--ink-3);transition:.1s;padding:0 2px}
.star-picker button.lit{color:var(--gold)}
.star-picker button:hover{transform:scale(1.15)}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
.avg-preview{text-align:center;font-family:var(--font-mono);color:var(--muted);font-size:.8rem;margin-top:16px}
.avg-preview b{color:var(--gold);font-size:1rem}
.login-tabs{display:flex;gap:8px;margin-bottom:20px}
.login-tabs button{flex:1;background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:9px;font-size:.85rem}
.login-tabs button.on{border-color:var(--gold);color:var(--gold);background:var(--gold-soft)}
.provider-btn{display:flex;align-items:center;gap:12px;width:100%;background:var(--ink-3);border:1px solid var(--line);color:var(--paper);border-radius:9px;padding:12px 16px;font-size:.92rem;margin-bottom:9px;transition:.12s}
.provider-btn:hover{border-color:var(--gold)}
.provider-btn .p-mark{font-family:var(--font-mono);font-weight:700;width:22px;text-align:center}
.login-err{color:var(--wax);font-size:.82rem;margin-top:8px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--ink);font-weight:600;border-radius:10px;padding:12px 22px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:pop .25s;max-width:90vw;text-align:center}
@keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%)}}

footer{border-top:1px solid var(--line);padding:26px 20px;text-align:center;color:var(--muted);font-size:.8rem;position:relative;z-index:1}
footer .f-links{margin-top:6px;font-size:.75rem}

/* ---------- Verificación de email ---------- */
.verify-banner{background:rgba(200,85,61,.12);border:1px solid rgba(200,85,61,.4);border-radius:var(--radius);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px;font-size:.85rem;flex-wrap:wrap}
.verify-banner button{background:none;border:1px solid var(--wax);color:var(--wax);border-radius:6px;padding:6px 12px;font-size:.8rem;white-space:nowrap}

/* ---------- Avatar / subida de imágenes ---------- */
.avatar-fallback{background:#000;color:var(--paper);font-family:var(--font-mono);letter-spacing:.5px;text-align:center;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;border:1px solid var(--line)}
.upload-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.file-btn{display:inline-block;background:var(--ink-3);border:1px solid var(--line);color:var(--paper);border-radius:8px;padding:9px 16px;font-size:.85rem;cursor:pointer}
.file-btn input{display:none}

/* ---------- Insignias ---------- */
.adult-badge{font-family:var(--font-mono);font-size:.68rem;border:1px solid var(--wax);color:var(--wax);border-radius:20px;padding:1px 9px;letter-spacing:1px;font-weight:600}
.rank-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold-soft);border:1px solid rgba(227,178,84,.5);color:var(--gold);border-radius:20px;padding:6px 14px;font-family:var(--font-mono);font-size:.8rem}
.points-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:.85rem;color:var(--gold)}
.coffee-btn{border:1px solid var(--wax);color:var(--wax);background:none;border-radius:20px;padding:5px 12px;font-size:.8rem;white-space:nowrap;display:inline-flex;align-items:center}
.coffee-btn:hover{background:var(--wax);color:var(--paper)}

/* ---------- Widgets de inicio ---------- */
.widget-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin:22px 0 8px}
.widget-card{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.15s}
.widget-card:hover{border-color:rgba(227,178,84,.5)}
.widget-card .w-label{font-family:var(--font-mono);font-size:.66rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:8px}
.widget-card h4{font-family:var(--font-display);font-size:1.15rem;margin-bottom:4px;line-height:1.2}
.widget-card span{color:var(--muted);font-size:.8rem}

/* ---------- Panel de autor ---------- */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:20px 0 30px}
.dash-stat{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:18px;text-align:center}
.dash-stat .n{font-family:var(--font-display);font-size:2rem;font-weight:600;color:var(--gold)}
.dash-stat .l{color:var(--muted);font-size:.74rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px}
.dash-comment{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.dash-comment .d-meta{font-size:.78rem;color:var(--muted);margin-bottom:2px}
.author-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin:20px 0 34px}
.author-card{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:10px;display:flex;flex-direction:column;gap:8px}
.author-card-cover{position:relative;width:100%;aspect-ratio:2/3;border-radius:8px;background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:8px;font-family:var(--font-display);font-weight:600;font-size:.92rem;line-height:1.15;color:var(--paper);text-shadow:0 1px 4px rgba(0,0,0,.6);border:1px solid var(--line)}
.author-card-cover .a-status{position:absolute;top:7px;left:7px;margin:0;font-size:.6rem;padding:2px 8px}
.author-card h4{font-family:var(--font-display);font-size:1rem;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.author-card-meta{font-family:var(--font-mono);font-size:.68rem;color:var(--muted)}
.author-card-actions{display:flex;flex-direction:column;gap:6px;margin-top:auto}
.author-card-actions .btn{width:100%;padding:6px 10px;font-size:.76rem}
.author-card-add{align-items:center;justify-content:center;border:1px dashed var(--line);cursor:pointer;min-height:230px;color:var(--muted);text-align:center;gap:6px}
.author-card-add:hover{border-color:var(--gold);color:var(--gold)}
.author-card-add .add-ico{font-size:2.2rem;font-family:var(--font-display);line-height:1}

/* ---------- Selector de tipo de cuenta / aviso +18 ---------- */
.account-type-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.account-type-picker button{border:1px solid var(--line);background:none;color:var(--muted);border-radius:10px;padding:12px 8px;font-size:.85rem}
.account-type-picker button.sel{border-color:var(--gold);color:var(--gold);background:var(--gold-soft);font-weight:600}
.checkbox-field{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.9rem}
.checkbox-field input{width:auto}

@media(max-width:820px){
  .hero{grid-template-columns:1fr}
  .constellation{display:none}
  .novel-head{grid-template-columns:100px 1fr}
  .cover{width:100px;height:140px;font-size:.8rem}
  .profile-grid{grid-template-columns:1fr}
  .rating-panel{grid-template-columns:1fr}
  .user-chip .u-name{display:none}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

<script>
/* =============== ESTADO =============== */
const state={lang:'es',premium:false,view:'home',params:{},booting:true,detailLoading:false,
  user:null,               // {id,email,username,accountType,role,avatarUrl,patreon,points,showAdult,emailConfirmed,onboarded}
  read:{},follows:new Set(),favs:new Set(),ratedIds:new Set(),adultConfirmed:new Set(),
  registeredUsers:0,menuOpen:false,pendingCount:0,
  modPending:[],modHistory:[],dashComments:[]
};
const t=()=>T[state.lang];
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmt=n=>n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':String(n||0);
const gName=es=>{const g=GENRES.find(x=>x.es===es)||SUBGENRES.find(x=>x.es===es);return g?(state.lang==='es'?g.es:g.en):es;};
const avgOf=n=>{const r=n.r;const a=(Number(r.historia)+Number(r.estilo)+Number(r.gramatica)+Number(r.personajes))/4;return n.votes?a:0;};
const starsTxt=a=>{const f=Math.round(a);return '★'.repeat(f)+'☆'.repeat(5-f);};
const approved=()=>NOVELS.filter(n=>n.status==='aprobada');
const isAdmin=()=>state.user&&state.user.role==='admin';
const myNovels=()=>MY_NOVELS;
const trendScore=n=>avgOf(n)*Math.log(n.followers+2);
const accountTypeLabel=v=>({lector:t().accountTypeReader,autor:t().accountTypeAuthor,ambos:t().accountTypeBoth}[v]||v);

function toast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2800);}
function setLang(l){state.lang=l;render();}
function toggleMenu(){state.menuOpen=!state.menuOpen;render();}
function loadingHtml(){return `<div class="empty"><span class="e-glyph">&gt;_ ▌</span><h3>${t().loading}</h3></div>`;}

let activeChannel=null;
function teardownChannel(){if(activeChannel){sb.removeChannel(activeChannel);activeChannel=null;}}

function gcPath(view,params){
  switch(view){
    case 'home':return '/';
    case 'explore':return params.genre?`/explorar/${encodeURIComponent(params.genre)}`:'/explorar';
    case 'novel':return `/novela/${params.id}`;
    case 'reader':return `/novela/${params.id}/capitulo/${(params.ch||0)+1}`;
    case 'editnovel':return `/novela/${params.id}/editar`;
    case 'editchapter':return `/novela/${params.id}/capitulo/${(params.ch||0)+1}/editar`;
    case 'newchapter':return `/novela/${params.id}/nuevo-capitulo`;
    case 'write':return '/escribir';
    case 'mod':return '/moderacion';
    case 'rank':return `/rankings/${params.mode||'stars'}`;
    case 'library':return '/biblioteca';
    case 'profile':return '/perfil';
    case 'dashboard':return '/panel-autor';
    default:return `/${view}`;
  }
}
function gcTrack(view,params){
  if(window.goatcounter&&window.goatcounter.count){
    window.goatcounter.count({path:gcPath(view,params||{})});
  }
}
function parsePath(pathname){
  const p=pathname.split('/').filter(Boolean).map(s=>{try{return decodeURIComponent(s);}catch(e){return s;}});
  if(!p.length)return{view:'home',params:{}};
  if(p[0]==='explorar')return{view:'explore',params:p[1]?{genre:p[1]}:{}};
  if(p[0]==='novela'&&p[1]){
    const id=+p[1];
    if(!Number.isFinite(id))return{view:'home',params:{}};
    if(p[2]==='capitulo'&&p[3]){
      const ch=Math.max(0,(+p[3]||1)-1);
      if(p[4]==='editar')return{view:'editchapter',params:{id,ch}};
      return{view:'reader',params:{id,ch}};
    }
    if(p[2]==='editar')return{view:'editnovel',params:{id}};
    if(p[2]==='nuevo-capitulo')return{view:'newchapter',params:{id}};
    return{view:'novel',params:{id}};
  }
  if(p[0]==='escribir')return{view:'write',params:{}};
  if(p[0]==='moderacion')return{view:'mod',params:{}};
  if(p[0]==='rankings')return{view:'rank',params:p[1]?{mode:p[1]}:{}};
  if(p[0]==='biblioteca')return{view:'library',params:{}};
  if(p[0]==='perfil')return{view:'profile',params:{}};
  if(p[0]==='panel-autor')return{view:'dashboard',params:{}};
  return{view:'home',params:{}};
}

async function go(view,params={},opts={}){
  state.view=view;state.params=params;state.menuOpen=false;
  teardownChannel();
  window.scrollTo({top:0});
  if(!opts.skipHistory){
    const path=gcPath(view,params);
    if(location.pathname!==path)history.pushState({view,params},'',path);
  }
  if(view==='novel'||view==='reader'||view==='editchapter'){
    state.detailLoading=true;render();
    await ensureChapters(params.id);
    if(view==='novel')await refreshNovelLive(params.id);
    if(view==='reader'){
      const chs=CHAPTERS_CACHE[params.id]||[];
      if(chs[params.ch]&&!chs[params.ch]._comments)await loadComments(params.id,params.ch);
      await registerView(params.id,params.ch);
    }
    state.detailLoading=false;
  }else if(view==='mod'){
    state.detailLoading=true;render();
    await loadModQueue();
    state.detailLoading=false;
  }else if(view==='dashboard'){
    state.detailLoading=true;render();
    await loadDashboardData();
    state.detailLoading=false;
  }else if(view==='write'){
    if(state.user)await loadMyNovels();
  }
  render();
  gcTrack(view,params);
}
window.addEventListener('popstate',e=>{
  const st=e.state||parsePath(location.pathname);
  go(st.view,st.params||{},{skipHistory:true});
});

/* =============== AUTENTICACIÓN =============== */
let loginTab='login'; // 'login' | 'signup'
let signupAccountType='lector';
function openLogin(mode='login'){loginTab=mode;renderLogin();}
function setSignupAccountType(v){signupAccountType=v;renderLogin();}

function renderLogin(){
  $('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
   <div class="modal">
    <h2>${t().loginTitle}</h2><p class="sub">${t().loginSub}</p>
    <div class="login-tabs">
      <button class="${loginTab==='login'?'on':''}" onclick="openLogin('login')">${t().modeLogin}</button>
      <button class="${loginTab==='signup'?'on':''}" onclick="openLogin('signup')">${t().modeSignup}</button>
    </div>
    <button class="provider-btn" onclick="oauthGoogle()"><span class="p-mark" style="color:#E8710A">G</span>${t().contGoogle}</button>
    <div style="text-align:center;color:var(--muted);font-size:.78rem;margin:14px 0;font-family:var(--font-mono)">— ${t().orEmail} —</div>
    ${loginTab==='signup'?`
      <div class="field" style="margin-bottom:12px"><label>${t().yourName}</label>
        <input type="text" id="regName" placeholder="${t().yourNamePh}" maxlength="24"></div>
      <div class="field" style="margin-bottom:16px"><label>${t().accountTypeLbl}</label>
        <div class="account-type-picker">
          <button type="button" class="${signupAccountType==='lector'?'sel':''}" onclick="setSignupAccountType('lector')">${t().accountTypeReader}</button>
          <button type="button" class="${signupAccountType==='autor'?'sel':''}" onclick="setSignupAccountType('autor')">${t().accountTypeAuthor}</button>
          <button type="button" class="${signupAccountType==='ambos'?'sel':''}" onclick="setSignupAccountType('ambos')">${t().accountTypeBoth}</button>
        </div>
      </div>`:''}
    <div class="field" style="margin-bottom:12px"><label>${t().emailLbl}</label><input type="email" id="fbEmail" autocomplete="email"></div>
    <div class="field" style="margin-bottom:14px"><label>${t().passLbl}</label><input type="password" id="fbPass" autocomplete="${loginTab==='signup'?'new-password':'current-password'}"></div>
    <button class="btn btn-gold" style="width:100%" onclick="emailAuth()">${loginTab==='signup'?t().modeSignup:t().modeLogin}</button>
    <div class="login-err" id="loginErr"></div>
   </div></div>`;
}
async function oauthGoogle(){
  const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.href}});
  if(error&&$('loginErr'))$('loginErr').textContent=t().errGeneric;
}
async function emailAuth(){
  const email=($('fbEmail').value||'').trim(),pass=$('fbPass').value||'';
  if(!email||!pass){$('loginErr').textContent=t().needEmailPass;return;}
  if(loginTab==='signup'){
    const name=($('regName').value||'').trim();
    if(!name){$('loginErr').textContent=t().needName;return;}
    const{error}=await sb.auth.signUp({email,password:pass,options:{data:{username:name,account_type:signupAccountType}}});
    if(error){showLoginErr(error);return;}
    closeModal();toast(t().checkEmailToast);
  }else{
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){showLoginErr(error);return;}
    closeModal();
  }
}
function showLoginErr(error){
  const code=error.code||'';
  const map={user_already_exists:t().errEmailUse,weak_password:t().errWeakPass,
    invalid_credentials:t().errBadLogin,email_not_confirmed:t().needVerified};
  const el=$('loginErr');if(el)el.textContent=map[code]||t().errGeneric;
}
async function logout(){await sb.auth.signOut();state.menuOpen=false;toast(t().loggedOut);go('home');}

/* Onboarding: solo aparece si el perfil no tiene aún nombre/tipo elegido
   (típico tras registrarse con Google) */
let onboardName='',onboardType='lector';
function openOnboardModal(){
  if(!state.user||state.user.onboarded)return;
  onboardName=state.user.username||'';onboardType=state.user.accountType||'lector';
  renderOnboardModal();
}
function renderOnboardModal(){
  if(!state.user||state.user.onboarded)return;
  $('modalRoot').innerHTML=`<div class="modal-bg">
    <div class="modal">
      <h2>${t().onboardTitle}</h2><p class="sub">${t().onboardSub}</p>
      <div class="field" style="margin-bottom:14px"><label>${t().yourName}</label>
        <input type="text" value="${esc(onboardName)}" maxlength="24" oninput="onboardName=this.value"></div>
      <div class="field" style="margin-bottom:16px"><label>${t().accountTypeLbl}</label>
        <div class="account-type-picker">
          <button type="button" class="${onboardType==='lector'?'sel':''}" onclick="onboardType='lector';renderOnboardModal()">${t().accountTypeReader}</button>
          <button type="button" class="${onboardType==='autor'?'sel':''}" onclick="onboardType='autor';renderOnboardModal()">${t().accountTypeAuthor}</button>
          <button type="button" class="${onboardType==='ambos'?'sel':''}" onclick="onboardType='ambos';renderOnboardModal()">${t().accountTypeBoth}</button>
        </div>
      </div>
      <button class="btn btn-gold" style="width:100%" onclick="saveOnboard()">${t().onboardSave}</button>
    </div></div>`;
}
async function saveOnboard(){
  if(!onboardName.trim())return;
  const{error}=await sb.from('profiles').update({username:onboardName.trim(),account_type:onboardType,onboarded:true}).eq('id',state.user.id);
  if(error){toast(t().errGeneric);return;}
  state.user.username=onboardName.trim();state.user.accountType=onboardType;state.user.onboarded=true;
  closeModal();render();
}

<script>
/* =============== CAPA DE DATOS (Supabase) =============== */
function mapNovel(row){
  return{
    id:row.id,title:row.title,syn:row.synopsis,
    author:row.profiles?.username||'—',ownerId:row.owner_id,
    authorAvatar:row.profiles?.avatar_url||null,
    patreon:row.patreon_url||row.profiles?.patreon_url||'',
    genres:row.genres||[],subs:row.subgenres||[],
    isAdult:!!row.is_adult,status:row.status,rejectReason:row.reject_reason,
    followers:row.followers_count||0,favs:row.favs_count||0,views:row.views_count||0,votes:row.votes_count||0,
    chaptersCount:row.chapters_count||0,
    r:{historia:+row.rating_historia||0,estilo:+row.rating_estilo||0,gramatica:+row.rating_gramatica||0,personajes:+row.rating_personajes||0},
    cover:row.cover_gradient,coverUrl:row.cover_url,
    createdAt:row.created_at,reviewedAt:row.reviewed_at
  };
}
function mapNovelLive(row){
  return{followers:row.followers_count||0,favs:row.favs_count||0,views:row.views_count||0,votes:row.votes_count||0,
    chaptersCount:row.chapters_count||0,status:row.status,
    r:{historia:+row.rating_historia||0,estilo:+row.rating_estilo||0,gramatica:+row.rating_gramatica||0,personajes:+row.rating_personajes||0}};
}
async function loadHomeNovels(){
  const{data}=await sb.from('novels').select('*, profiles!novels_owner_id_fkey(username,avatar_url,patreon_url)').eq('status','aprobada').order('created_at',{ascending:false});
  NOVELS=(data||[]).map(mapNovel);
}
async function loadStats(){
  const{count}=await sb.from('profiles').select('id',{count:'exact',head:true});
  state.registeredUsers=count||0;
}
async function loadHomeExtras(){
  const sevenDaysAgo=new Date(Date.now()-7*864e5).toISOString();
  const{data:latest}=await sb.from('chapters').select('id,title,idx,novel_id,created_at,novels(title,status)').order('created_at',{ascending:false}).limit(20);
  LATEST_CHAPTERS=(latest||[]).filter(c=>c.novels&&c.novels.status==='aprobada').slice(0,1);

  const{data:growth}=await sb.from('follows').select('novel_id').gte('created_at',sevenDaysAgo);
  GROWING_NOVEL=null;
  if(growth&&growth.length){
    const tally={};growth.forEach(f=>tally[f.novel_id]=(tally[f.novel_id]||0)+1);
    const topId=Object.entries(tally).sort((a,b)=>b[1]-a[1])[0][0];
    GROWING_NOVEL=NOVELS.find(n=>n.id===+topId)||null;
  }

  const{data:comm}=await sb.from('comments').select('chapter_id,chapters(id,title,idx,novel_id,novels(title,status))').gte('created_at',sevenDaysAgo);
  BEST_CHAPTER=null;
  if(comm&&comm.length){
    const tally={};comm.forEach(c=>{if(c.chapters&&c.chapters.novels&&c.chapters.novels.status==='aprobada')tally[c.chapter_id]=(tally[c.chapter_id]||0)+1;});
    const entries=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
    if(entries.length){
      const topChId=entries[0][0];
      const found=comm.find(c=>String(c.chapter_id)===topChId);
      if(found)BEST_CHAPTER={chapterTitle:found.chapters.title,chapterIdx:found.chapters.idx,novelId:found.chapters.novel_id,novelTitle:found.chapters.novels.title};
    }
  }
}
function loadRecommendations(){
  RECOMMENDED=[];
  if(!state.user)return;
  const seedIds=new Set([...state.follows,...state.favs,...state.ratedIds]);
  const seedNovels=NOVELS.filter(n=>seedIds.has(n.id)).concat(myNovels());
  const tally={};
  seedNovels.forEach(n=>[...n.genres,...n.subs].forEach(g=>tally[g]=(tally[g]||0)+1));
  const ranked=Object.entries(tally).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  if(!ranked.length)return;
  RECOMMENDED=NOVELS.filter(n=>!seedIds.has(n.id)&&n.ownerId!==state.user.id&&
      [...n.genres,...n.subs].some(g=>ranked.includes(g)))
    .sort((a,b)=>avgOf(b)-avgOf(a)).slice(0,6);
}
async function ensureChapters(novelId){
  if(CHAPTERS_CACHE[novelId])return CHAPTERS_CACHE[novelId];
  const{data}=await sb.from('chapters').select('*').eq('novel_id',novelId).order('idx');
  CHAPTERS_CACHE[novelId]=data||[];
  return CHAPTERS_CACHE[novelId];
}
function invalidateChapters(novelId){delete CHAPTERS_CACHE[novelId];}
async function loadComments(novelId,chIdx){
  const ch=CHAPTERS_CACHE[novelId][chIdx];if(!ch)return;
  const{data}=await sb.from('comments').select('id,text,created_at,profiles(username,avatar_url)').eq('chapter_id',ch.id).order('created_at');
  ch._comments=data||[];
}
async function refreshNovelLive(id){
  const{data}=await sb.from('novels').select('*, profiles!novels_owner_id_fkey(username,avatar_url,patreon_url)').eq('id',id).maybeSingle();
  if(!data)return;
  const mapped=mapNovel(data);
  const idx=NOVELS.findIndex(n=>n.id===id);
  if(idx>-1)NOVELS[idx]=mapped;else NOVELS.push(mapped);
  activeChannel=sb.channel('novel-'+id)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'novels',filter:'id=eq.'+id},payload=>{
      const i=NOVELS.findIndex(n=>n.id===id);
      if(i>-1)NOVELS[i]={...NOVELS[i],...mapNovelLive(payload.new)};
      render();
    }).subscribe();
}
function rankOf(novelId){
  const list=approved().slice().sort((a,b)=>trendScore(b)-trendScore(a));
  const i=list.findIndex(n=>n.id===novelId);
  return i>-1?i+1:null;
}
async function loadMyNovels(){
  if(!state.user){MY_NOVELS=[];return;}
  const{data}=await sb.from('novels').select('*, profiles!novels_owner_id_fkey(username,avatar_url,patreon_url)').eq('owner_id',state.user.id).order('created_at',{ascending:false});
  MY_NOVELS=(data||[]).map(mapNovel);
}
async function loadInteractionSets(){
  if(!state.user){state.follows=new Set();state.favs=new Set();state.ratedIds=new Set();state.read={};return;}
  const[fr,fv,rt,rp]=await Promise.all([
    sb.from('follows').select('novel_id').eq('user_id',state.user.id),
    sb.from('favorites').select('novel_id').eq('user_id',state.user.id),
    sb.from('ratings').select('novel_id').eq('user_id',state.user.id),
    sb.from('reading_progress').select('novel_id,read_chapters').eq('user_id',state.user.id)
  ]);
  state.follows=new Set((fr.data||[]).map(x=>x.novel_id));
  state.favs=new Set((fv.data||[]).map(x=>x.novel_id));
  state.ratedIds=new Set((rt.data||[]).map(x=>x.novel_id));
  state.read={};(rp.data||[]).forEach(x=>state.read[x.novel_id]=new Set(x.read_chapters||[]));
}
async function refreshPendingCount(){
  if(!isAdmin()){state.pendingCount=0;return;}
  const{count}=await sb.from('novels').select('id',{count:'exact',head:true}).eq('status','pendiente');
  state.pendingCount=count||0;
}
async function loadModQueue(){
  if(!isAdmin())return;
  const[{data:pending},{data:history}]=await Promise.all([
    sb.from('novels').select('*, profiles!novels_owner_id_fkey(username)').eq('status','pendiente').order('created_at'),
    sb.from('novels').select('*, profiles!novels_owner_id_fkey(username)').neq('status','pendiente').not('reviewed_at','is',null).order('reviewed_at',{ascending:false}).limit(30)
  ]);
  state.modPending=(pending||[]).map(mapNovel);
  state.modHistory=(history||[]).map(mapNovel);
  for(const n of state.modPending)await ensureChapters(n.id);
  state.pendingCount=state.modPending.length;
}
async function loadDashboardData(){
  await loadHomeNovels();
  await loadMyNovels();
  const mine=myNovels().filter(n=>n.status==='aprobada').map(n=>n.id);
  let comments=[];
  if(mine.length){
    const chIds=[];
    for(const nid of mine){const chs=await ensureChapters(nid);chs.forEach(c=>chIds.push(c.id));}
    if(chIds.length){
      const{data}=await sb.from('comments').select('id,text,created_at,profiles(username,avatar_url)').in('chapter_id',chIds).order('created_at',{ascending:false}).limit(10);
      comments=data||[];
    }
  }
  state.dashComments=comments;
}
async function uploadImage(bucket,file){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path=`${state.user.id}/${Date.now()}.${ext}`;
  const{error}=await sb.storage.from(bucket).upload(path,file,{upsert:true});
  if(error)return null;
  const{data}=sb.storage.from(bucket).getPublicUrl(path);
  return data.publicUrl;
}
</script>
<script>
/* =============== COMPONENTES =============== */
let adSeed=0;
function adBlock(){
  if(state.premium)return'';
  if(ADSENSE.slot){
    return `<div style="position:relative;min-height:90px">
      <ins class="adsbygoogle" style="display:block"
        data-ad-client="${ADSENSE.client}"
        data-ad-slot="${ADSENSE.slot}"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
    </div>
    <div class="ad-note">${t().adWhy} · <a onclick="go('profile')">${t().adRemove}</a></div>`;
  }
  const a=t().ads[(adSeed++)%t().ads.length];
  return `<div class="ad" data-label="${t().adLabel}">
    <div class="ad-ico">${a[0]}</div>
    <div class="ad-body"><strong>${a[1]}</strong><span>${a[2]}</span></div>
    <button class="ad-cta">${a[3]}</button>
  </div>
  <div class="ad-note">${t().adWhy} · <a onclick="go('profile')">${t().adRemove}</a></div>`;
}
function activateAds(){
  if(!ADSENSE.slot)return;
  document.querySelectorAll('ins.adsbygoogle:not([data-init])').forEach(el=>{
    el.setAttribute('data-init','1');
    try{(window.adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  });
}
function avatarHTML(user,size){
  size=size||24;
  if(user&&user.avatarUrl)return `<img src="${esc(user.avatarUrl)}" alt="" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0">`;
  return `<div class="avatar-fallback" style="width:${size}px;height:${size}px;font-size:${Math.max(6,Math.round(size*0.16))}px">asciicave</div>`;
}
function novelCard(n){
  const a=avgOf(n);
  return `<div class="card" onclick="go('novel',{id:${n.id}})">
    ${n.coverUrl?`<img class="cover-thumb" src="${esc(n.coverUrl)}" alt="" loading="lazy">`:''}
    <div class="tags">${n.isAdult?`<span class="adult-badge">${t().adultBadge}</span>`:''}${n.genres.slice(0,3).map(g=>`<span class="tag g">${esc(gName(g))}</span>`).join('')}</div>
    <h3>${esc(n.title)}</h3>
    <div class="author">${esc(n.author)}</div>
    <div class="syn">${esc(n.syn)}</div>
    <div class="card-meta">
      <span class="stars-inline">${starsTxt(a)} ${a?a.toFixed(1):'—'}</span>
      <span>${fmt(n.followers)} ♥ · ${n.chaptersCount} ${t().chapters}</span>
    </div>
  </div>`;
}
function emptyState(titulo,texto,btnLabel,btnAction){
  return `<div class="empty">
    <span class="e-glyph">&gt;_ ▌</span>
    <h3>${titulo}</h3><p>${texto}</p>
    ${btnLabel?`<button class="btn btn-gold" onclick="${btnAction}">${btnLabel}</button>`:''}
  </div>`;
}
function constellationSVG(){
  return `<svg class="constellation" width="300" height="300" viewBox="0 0 300 300" aria-hidden="true">
   <defs><radialGradient id="glow"><stop offset="0%" stop-color="#E3B254" stop-opacity=".9"/><stop offset="100%" stop-color="#E3B254" stop-opacity="0"/></radialGradient></defs>
   <polygon points="150,40 260,150 150,260 40,150" fill="none" stroke="rgba(227,178,84,.35)" stroke-width="1" stroke-dasharray="3 5"/>
   ${[[150,40,t().catHistoria],[260,150,t().catEstilo],[150,260,t().catGramatica],[40,150,t().catPersonajes]].map(([x,y,l],i)=>`
    <circle cx="${x}" cy="${y}" r="14" fill="url(#glow)"/>
    <text x="${x}" y="${y+5}" text-anchor="middle" font-size="15" fill="#E3B254">★</text>
    <text x="${x}" y="${y+(i===0?-22:i===2?32:5)}" ${i===1?'dx="24" text-anchor="start"':i===3?'dx="-24" text-anchor="end"':'text-anchor="middle"'} font-size="11" fill="#8B94A8" font-family="IBM Plex Mono">${l}</text>`).join('')}
   <circle cx="150" cy="150" r="3" fill="#EDE7D8"/>
  </svg>`;
}
function verifyBanner(){
  return `<div class="verify-banner"><span>${t().verifyBanner}</span><button onclick="resendVerification()">${t().verifyResend}</button></div>`;
}
async function resendVerification(){
  await sb.auth.resend({type:'signup',email:state.user.email});
  toast(t().verifySent);
}
function homeWidgets(){
  const cards=[];
  if(LATEST_CHAPTERS[0]){const c=LATEST_CHAPTERS[0];cards.push(`<div class="widget-card" onclick="go('reader',{id:${c.novel_id},ch:${c.idx}})">
    <span class="w-label">${t().latestChaptersT}</span><h4>${esc(c.title)}</h4><span>${esc(c.novels&&c.novels.title||'')}</span></div>`);}
  if(GROWING_NOVEL){cards.push(`<div class="widget-card" onclick="go('novel',{id:${GROWING_NOVEL.id}})">
    <span class="w-label">${t().growingT}</span><h4>${esc(GROWING_NOVEL.title)}</h4><span>${t().growingSub}</span></div>`);}
  if(BEST_CHAPTER){cards.push(`<div class="widget-card" onclick="go('reader',{id:${BEST_CHAPTER.novelId},ch:${BEST_CHAPTER.chapterIdx}})">
    <span class="w-label">${t().bestChapterT}</span><h4>${esc(BEST_CHAPTER.chapterTitle)}</h4><span>${esc(BEST_CHAPTER.novelTitle)}</span></div>`);}
  return cards.length?`<div class="widget-row">${cards.join('')}</div>`:'';
}
</script>
<script>
/* =============== VISTAS =============== */
function vHome(){
  adSeed=0;
  if(state.booting)return loadingHtml();
  const list=approved();
  const totCh=list.reduce((s,n)=>s+n.chaptersCount,0);
  const top=list.slice().sort((a,b)=>trendScore(b)-trendScore(a));
  loadRecommendations();
  return `
  <section class="hero">
    <div>
      <h1>${t().heroTitle}</h1>
      <p>${t().heroSub}</p>
      <div class="hero-actions">
        <button class="btn btn-gold" onclick="go('explore')">${t().heroCta1}</button>
        <button class="btn btn-ghost" onclick="go('write')">${t().heroCta2}</button>
      </div>
      <div class="stat-row" style="margin-top:26px">
        <span><b>${list.length}</b> ${t().statNovels}</span>
        <span><b>${state.registeredUsers}</b> ${t().statReaders}</span>
        <span><b>${totCh}</b> ${t().statChapters}</span>
      </div>
    </div>
    ${constellationSVG()}
  </section>
  ${!list.length?emptyState(t().emptyHomeT,t().emptyHomeP,t().heroCta2,"go('write')"):`
    ${homeWidgets()}
    <h2 class="sec-title">${t().trending}</h2>
    <p class="sec-sub">${t().trendingSub}</p>
    <div class="grid">${top.slice(0,3).map(novelCard).join('')}</div>
    ${top.length>3?`<div style="margin:26px 0">${adBlock()}</div>
    <h2 class="sec-title">${t().newArrivals}</h2>
    <p class="sec-sub">${t().newSub}</p>
    <div class="grid">${top.slice(3).map(novelCard).join('')}</div>`:''}
    ${RECOMMENDED.length?`<h2 class="sec-title">${t().recommendedT}</h2><p class="sec-sub">${t().recommendedSub}</p><div class="grid">${RECOMMENDED.map(novelCard).join('')}</div>`:''}
  `}`;
}

function vExplore(){
  adSeed=1;
  if(state.booting)return loadingHtml();
  const f=state.params.genre||'';
  const showAdult=state.user&&state.user.showAdult;
  const list=approved().filter(n=>(!f||n.genres.includes(f))&&(showAdult||!n.isAdult));
  let cards='';
  list.forEach((n,i)=>{cards+=novelCard(n);if(i===2)cards+=`<div style="grid-column:1/-1">${adBlock()}</div>`;});
  return `
  <h2 class="sec-title">${t().nav.explore}</h2>
  <p class="sec-sub">${list.length} ${t().statNovels}</p>
  <div class="pill-picker" style="margin-bottom:22px">
    <button class="pill ${!f?'sel':''}" onclick="go('explore')">${state.lang==='es'?'Todos':'All'}</button>
    ${GENRES.map(g=>`<button class="pill ${f===g.es?'sel':''}" onclick="go('explore',{genre:'${g.es}'})">${state.lang==='es'?g.es:g.en}</button>`).join('')}
  </div>
  ${list.length?`<div class="grid">${cards}</div>`:emptyState(t().emptyExploreT,t().emptyExploreP,t().heroCta2,"go('write')")}`;
}

function vNovel(){
  adSeed=2;
  if(state.detailLoading)return loadingHtml();
  const n=NOVELS.find(x=>x.id===state.params.id)||MY_NOVELS.find(x=>x.id===state.params.id);
  if(!n)return vHome();
  if(n.status!=='aprobada'&&!isAdmin()&&(!state.user||n.ownerId!==state.user.id))return vHome();
  if(n.isAdult&&!(state.user&&state.user.showAdult)&&!state.adultConfirmed.has(n.id)){
    return `<div class="empty"><span class="e-glyph">${t().adultBadge}</span>
      <h3>${t().adultGateT}</h3><p>${t().adultGateP}</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="go('home')">${t().adultGateCancel}</button>
        <button class="btn btn-wax" onclick="confirmAdult(${n.id})">${t().adultGateBtn}</button>
      </div></div>`;
  }
  const chs=CHAPTERS_CACHE[n.id]||[];
  const readSet=state.read[n.id]||new Set();
  const canRate=readSet.has(0)&&state.user&&state.user.emailConfirmed&&!state.ratedIds.has(n.id);
  const rated=state.ratedIds.has(n.id);
  const cats=[['historia',t().catHistoria],['estilo',t().catEstilo],['gramatica',t().catGramatica],['personajes',t().catPersonajes]];
  const rank=n.status==='aprobada'?rankOf(n.id):null;
  const isOwner=!!(state.user&&n.ownerId===state.user.id);
  return `
  ${n.status!=='aprobada'&&(isAdmin()||(state.user&&n.ownerId===state.user.id))?`<div class="callout" style="margin-bottom:16px"><b>${t().status[n.status]}</b>${n.rejectReason?' — '+esc(n.rejectReason):''}</div>`:''}
  <div class="novel-head">
    <div class="cover" style="${n.coverUrl?`background-image:url('${esc(n.coverUrl)}')`:`background:${n.cover}`}">${n.coverUrl?'':esc(n.title)}</div>
    <div>
      <div class="tags" style="margin-bottom:8px">${n.isAdult?`<span class="adult-badge">${t().adultBadge}</span>`:''}${n.genres.map(g=>`<span class="tag g">${esc(gName(g))}</span>`).join('')}${n.subs.map(s=>`<span class="tag">${esc(gName(s))}</span>`).join('')}</div>
      <h1>${esc(n.title)}</h1>
      <div class="byline">${esc(n.author)}${n.patreon?` · <a href="${esc(n.patreon)}" target="_blank" rel="noopener">Patreon ↗</a>`:''}</div>
      <p style="color:var(--muted);font-size:.95rem">${esc(n.syn)}</p>
      <div class="stat-row">
        <span><b>${fmt(n.followers)}</b> ${t().followers}</span>
        <span><b>${fmt(n.favs)}</b> ${t().favsW}</span>
        <span><b>${fmt(n.views)}</b> ${t().views}</span>
        <span><b>${n.chaptersCount}</b> ${t().chapters}</span>
      </div>
      <div class="novel-actions">
        <button class="btn btn-gold" onclick="go('reader',{id:${n.id},ch:0})">${t().readCh1}</button>
        <button class="btn btn-ghost" onclick="toggleFollow(${n.id})">${state.follows.has(n.id)?t().following:t().follow}</button>
        <button class="btn btn-ghost" onclick="toggleFav(${n.id})">${state.favs.has(n.id)?t().faved:t().fav}</button>
        <button class="btn ${canRate?'btn-gold':'btn-ghost'}" ${canRate?'':'disabled'} onclick="openRating(${n.id})">${rated?t().yourRating:(readSet.has(0)?t().rate:t().rateLocked)}</button>
        ${rank?`<span class="rank-badge">🏆 ${t().rankPos.replace('{n}',rank)}</span>`:''}
        ${isOwner?`<button class="btn btn-ghost" onclick="go('editnovel',{id:${n.id}})">${t().editNovelBtn}</button>`:''}
        ${isAdmin()?`<button class="btn btn-wax" onclick="deleteNovel(${n.id})">${t().deleteNovel}</button>`:''}
      </div>
    </div>
  </div>
  <div class="rating-panel">
    <div class="big-score"><div class="n">${avgOf(n)?avgOf(n).toFixed(1):'—'}</div><div class="stars-inline">${starsTxt(avgOf(n))}</div><div class="v">${fmt(n.votes)} ${t().votes}</div></div>
    <div class="cat-bars">
      ${cats.map(([k,l])=>`<div class="cat-bar"><span>${l}</span><div class="track"><div class="fill" style="width:${n.r[k]/5*100}%"></div></div><span class="val">${n.r[k]?n.r[k].toFixed(1):'—'}</span></div>`).join('')}
      <div style="font-size:.72rem;color:var(--muted);font-family:var(--font-mono)">${t().ratingSub}</div>
    </div>
  </div>
  ${n.patreon?`<div class="patreon-box"><div class="p-ico">🤝</div><div style="flex:1"><strong>${t().supportPatreon}</strong><small>${t().supportSub}</small></div><a class="btn btn-wax btn-sm" href="${esc(n.patreon)}" target="_blank" rel="noopener">Patreon ↗</a></div>`:''}
  <h2 class="sec-title">${t().tableOfCh}</h2>

<script>
/* =============== EDITOR DE TEXTO (fuente, tamaño, contador) =============== */
const WRITER_FONTS=[['var(--font-body)','Sans'],['var(--font-display)','Serif'],['Georgia, serif','Georgia'],['var(--font-mono)','Mono'],['Arial, sans-serif','Arial']];
const WRITER_SIZES=[['14px','sizeSmall'],['16px','sizeMedium'],['19px','sizeLarge'],['23px','sizeXLarge']];
function getWriterFont(){return localStorage.getItem('acWriterFont')||WRITER_FONTS[0][0];}
function getWriterSize(){return localStorage.getItem('acWriterSize')||WRITER_SIZES[1][0];}
function applyWriterFont(sel){localStorage.setItem('acWriterFont',sel.value);const el=$(sel.dataset.target);if(el)el.style.fontFamily=sel.value;}
function applyWriterSize(sel){localStorage.setItem('acWriterSize',sel.value);const el=$(sel.dataset.target);if(el)el.style.fontSize=sel.value;}
function wordStats(text){
  const words=((text||'').match(/\S+/g)||[]).length;
  return `${fmt(words)} ${t().wordsLbl} · ~${Math.max(1,Math.round(words/200))} ${t().minRead}`;
}
function updateWordCount(el){const wc=$('wc-'+el.id);if(wc)wc.textContent=wordStats(el.value);}
function editorToolbar(textareaId,text){
  const font=getWriterFont(),size=getWriterSize();
  return `<div class="editor-toolbar">
    <select data-target="${textareaId}" onchange="applyWriterFont(this)">${WRITER_FONTS.map(([v,l])=>`<option value="${v}" ${font===v?'selected':''}>${l}</option>`).join('')}</select>
    <select data-target="${textareaId}" onchange="applyWriterSize(this)">${WRITER_SIZES.map(([v,k])=>`<option value="${v}" ${size===v?'selected':''}>${t()[k]}</option>`).join('')}</select>
    <span class="word-count" id="wc-${textareaId}">${wordStats(text)}</span>
  </div>`;
}
function writerStyle(){return `font-family:${getWriterFont()};font-size:${getWriterSize()}`;}

async function submitNovel(){
  if(!state.user){openLogin();return;}

  if(!draft.title||!draft.syn||!draft.chTitle||!draft.chBody||draft.genres.size===0){toast(t().needField);return;}

    genres:[...draft.genres],subgenres:[...draft.subs],

      <div style="font-size:.75rem;font-family:var(--font-mono);color:var(--muted);margin-top:10px">${t().readExcerpt}</div>
      <div class="mod-excerpt">${((CHAPTERS_CACHE[n.id]||[])[0]?.body||'').split(/\n+/).filter(Boolean).map(p=>`<p style="margin-bottom:8px">${esc(p)}</p>`).join('')}</div>
      <div class="mod-actions">
        <button class="btn btn-leaf btn-sm" onclick="approveNovel(${n.id})">${t().approve}</button>
        <button class="btn btn-wax btn-sm" onclick="rejectNovel(${n.id})">${t().reject}</button>
      </div>
    </div>`).join(''):`<div class="callout">${t().emptyMod}</div>`}
  ${history.length?`<h2 class="sec-title" style="font-size:1.4rem">${t().historyMod}</h2>
    ${history.map(n=>`<div class="work-row">
      <div><h4>${esc(n.title)}</h4><div class="w-meta">${esc(n.author)} · ${n.reviewedAt?new Date(n.reviewedAt).toLocaleDateString('es-ES'):''}</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="mod-status st-${n.status}" style="margin:0">${t().status[n.status]}</span>
        <button class="btn btn-wax btn-sm" onclick="deleteNovel(${n.id})">${t().deleteNovel}</button>
      </div>
      ${n.status==='rechazada'&&n.rejectReason?`<div class="reject-note">✗ ${esc(n.rejectReason)}</div>`:''}
    </div>`).join('')}`:''}`;
}
async function approveNovel(id){
  const{error}=await sb.rpc('fn_review_novel',{p_novel_id:id,p_decision:'aprobada'});
  if(error){toast(t().errGeneric);return;}
  toast(t().approved);await loadModQueue();await loadHomeNovels();render();
}
async function rejectNovel(id){
  const reason=prompt(t().rejectReason);
  if(reason===null)return;
  const{error}=await sb.rpc('fn_review_novel',{p_novel_id:id,p_decision:'rechazada',p_reason:reason});
  if(error){toast(t().errGeneric);return;}
  toast(t().rejected);await loadModQueue();render();
}

/* =============== RANKINGS =============== */
function vRank(){
  if(state.booting)return loadingHtml();
  const mode=state.params.mode||'stars';
  const defs={stars:{l:t().rkStars,v:n=>avgOf(n),f:n=>avgOf(n).toFixed(2)+' ★'},
    follow:{l:t().rkFollow,v:n=>n.followers,f:n=>fmt(n.followers)},
    favs:{l:t().rkFavs,v:n=>n.favs,f:n=>fmt(n.favs)},
    views:{l:t().rkViews,v:n=>n.views,f:n=>fmt(n.views)}};
  const d=defs[mode];
  const list=approved().slice().sort((a,b)=>d.v(b)-d.v(a));
  return `
  <h2 class="sec-title">${t().rankTitle}</h2>
  <p class="sec-sub">${t().rankSub}</p>
  <div class="rank-tabs">${Object.entries(defs).map(([k,x])=>`<button class="${mode===k?'on':''}" onclick="go('rank',{mode:'${k}'})">${x.l}</button>`).join('')}</div>
  ${list.length?`<div>${list.map((n,i)=>`
    <div class="rank-row" onclick="go('novel',{id:${n.id}})">
      <div class="rank-pos">${i+1}</div>
      <div class="rank-main"><h3>${esc(n.title)}</h3><span>${esc(n.author)} · ${n.genres.map(gName).join(', ')}</span></div>
      <div class="rank-metric">${d.f(n)}<small>${d.l}</small></div>
    </div>`).join('')}</div>`
  :emptyState(t().emptyRankT,t().emptyRankP,t().heroCta2,"go('write')")}`;
}

/* =============== MI BIBLIOTECA =============== */
function vLibrary(){
  if(state.booting)return loadingHtml();
  if(!state.user)return emptyState(t().emptyLibT,t().emptyLibLogin,t().loginBtn,"openLogin()");
  const followed=approved().filter(n=>state.follows.has(n.id));
  const faved=approved().filter(n=>state.favs.has(n.id));
  if(!followed.length&&!faved.length)return `
    <h2 class="sec-title">${t().libTitle}</h2><p class="sec-sub">${t().libSub}</p>
    ${emptyState(t().emptyLibT,t().emptyLibP,t().heroCta1,"go('explore')")}`;

    return `<div class="work-row" style="cursor:pointer" onclick="go('novel',{id:${n.id}})">

  ${faved.length?`<h3 style="font-family:var(--font-display);font-size:1.3rem;margin-top:26px">★ ${t().libFavs}</h3>${faved.map(row).join('')}`:''}`;

/* =============== PANEL DE AUTOR =============== */
function wordCount(text){return ((text||'').match(/\S+/g)||[]).length;}
function authorNovelCard(n){
  const rank=n.status==='aprobada'?rankOf(n.id):null;
  return `<div class="author-card">
    <div class="author-card-cover" style="${n.coverUrl?`background-image:url('${esc(n.coverUrl)}')`:`background:${n.cover}`}">
      ${n.status!=='aprobada'?`<span class="mod-status st-${n.status} a-status">${t().status[n.status]}</span>`:''}
      ${n.coverUrl?'':esc(n.title)}
    </div>
    <h4 title="${esc(n.title)}">${esc(n.title)}</h4>
    <div class="author-card-meta">${fmt(n.followers)} ${t().followers} · ${n.chaptersCount} ${t().chapters}${rank?` · ${t().rankPos.replace('{n}',rank)}`:''}</div>
    <div class="author-card-actions">
      <button class="btn btn-ghost" onclick="go('novel',{id:${n.id}})">${t().viewPage}</button>
      <button class="btn btn-ghost" onclick="go('editnovel',{id:${n.id}})">${t().editNovelBtn}</button>
      ${n.status==='aprobada'?`<button class="btn btn-gold" onclick="go('newchapter',{id:${n.id}})">${t().addChapterBtn}</button>`:''}
    </div>
  </div>`;
}
function vDashboard(){
  if(!state.user)return emptyState(t().writeWallT,t().writeWallP,t().writeWallBtn,"openLogin()");
  if(state.detailLoading)return loadingHtml();
  const works=myNovels();
  const approvedWorks=works.filter(n=>n.status==='aprobada');
  const totalFollowers=works.reduce((s,n)=>s+n.followers,0);
  const totalChapters=works.reduce((s,n)=>s+n.chaptersCount,0);
  const totalReviews=works.reduce((s,n)=>s+n.votes,0);
  const totalWords=works.reduce((s,n)=>s+(CHAPTERS_CACHE[n.id]||[]).reduce((s2,c)=>s2+wordCount(c.body),0),0);
  const ranks=approvedWorks.map(n=>rankOf(n.id)).filter(r=>r!==null);
  const bestRank=ranks.length?Math.min(...ranks):null;
  return `
  <h2 class="sec-title">${t().dashTitle}</h2><p class="sec-sub">${t().dashSub}</p>
  <div class="dash-stats">
    <div class="dash-stat"><div class="n">${bestRank?'#'+bestRank:'—'}</div><div class="l">${t().dashStatRank}</div></div>
    <div class="dash-stat"><div class="n">${works.length}</div><div class="l">${t().dashStatWorks}</div></div>
    <div class="dash-stat"><div class="n">${totalChapters}</div><div class="l">${t().dashStatChapters}</div></div>
    <div class="dash-stat"><div class="n">${fmt(totalWords)}</div><div class="l">${t().dashStatWords}</div></div>
    <div class="dash-stat"><div class="n">${fmt(totalReviews)}</div><div class="l">${t().dashStatReviews}</div></div>
    <div class="dash-stat"><div class="n">${fmt(totalFollowers)}</div><div class="l">${t().dashStatFollowers}</div></div>
    <div class="dash-stat"><div class="n">${state.user.points}</div><div class="l">${t().dashStatPoints}</div></div>
  </div>
  <div class="author-grid">
    ${works.map(authorNovelCard).join('')}
    <div class="author-card author-card-add" onclick="go('write')"><span class="add-ico">+</span><span>${t().dashAddNovel}</span></div>
  </div>
  <h3 style="font-family:var(--font-display);font-size:1.3rem;margin:30px 0 10px">${t().dashLatestComments}</h3>
  ${(state.dashComments||[]).length?state.dashComments.map(c=>`<div class="dash-comment">
    ${avatarHTML({avatarUrl:c.profiles&&c.profiles.avatar_url},34)}
    <div><div class="d-meta"><b style="color:var(--paper)">${esc(c.profiles&&c.profiles.username||'—')}</b> · ${new Date(c.created_at).toLocaleDateString(state.lang==='es'?'es-ES':'en-US')}</div><p style="font-size:.9rem">${esc(c.text)}</p></div>
  </div>`).join(''):`<p style="color:var(--muted);font-size:.88rem">${t().dashNoComments}</p>`}`;
}

/* =============== PERFIL =============== */
function vProfile(){
  if(!state.user)return emptyState(t().writeWallT,t().writeWallP,t().writeWallBtn,"openLogin()");
  const works=myNovels();
  return `
  <h2 class="sec-title">${t().profTitle}</h2>
  ${!state.user.emailConfirmed?verifyBanner():''}
  <div class="profile-grid" style="margin-top:20px">
    <div class="panel">
      <h3>${t().accountT}</h3>
      <div class="upload-row" style="margin-bottom:14px">
        ${avatarHTML(state.user,72)}
        <div>
          <label class="file-btn">${t().avatarUpload}<input type="file" accept="image/*" onchange="onAvatarChange(event)"></label>
          ${state.user.avatarUrl?`<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="removeAvatar()">${t().avatarRemove}</button>`:''}

      </div>
      <div class="field" style="margin-bottom:12px"><label>${t().yourName}</label>
        <input type="text" id="pUsername" maxlength="24" value="${esc(state.user.username)}"></div>
      ${!isAdmin()?`<div class="field" style="margin-bottom:12px"><label>${t().accountTypeLbl}</label>
        <div class="account-type-picker">
          <button type="button" class="${profileAccountType()==='lector'?'sel':''}" onclick="setProfileAccountType('lector')">${t().accountTypeReader}</button>
          <button type="button" class="${profileAccountType()==='autor'?'sel':''}" onclick="setProfileAccountType('autor')">${t().accountTypeAuthor}</button>
          <button type="button" class="${profileAccountType()==='ambos'?'sel':''}" onclick="setProfileAccountType('ambos')">${t().accountTypeBoth}</button>
        </div></div>`:`<span style="font-family:var(--font-mono);font-size:.75rem;color:var(--gold);display:block;margin-bottom:12px">${t().roleAdmin}</span>`}
      <button class="btn btn-wax btn-sm" onclick="saveProfileBasics()">${t().saveProfile}</button>
      <div class="points-badge" style="margin:12px 0 0">✦ ${state.user.points} ${t().pointsLbl}</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="logout()">${t().logout}</button>
    </div>
    <div class="panel">
      <h3>${t().profPremiumT}</h3><p>${t().premiumSoonP}</p>
      <a class="btn btn-wax" href="${COFFEE_URL}" target="_blank" rel="noopener">${t().premiumSoonBtn}</a>
    </div>
    <div class="panel">
      <h3>${t().profPatreonT}</h3><p>${t().profPatreonP}</p>
      <input type="url" id="pPatreon" placeholder="${t().fPatreonPh}" value="${esc(state.user.patreon||'')}">
      <button class="btn btn-wax btn-sm" style="margin-top:12px" onclick="savePatreon()">${t().savePatreon}</button>
    </div>
    <div class="panel">
      <h3>${t().profAdsT}</h3><p>${t().profAdsP}</p>
      <label class="checkbox-field" style="margin-top:14px"><input type="checkbox" ${state.user.showAdult?'checked':''} onchange="toggleShowAdult(this.checked)">${t().showAdultToggle}</label>
      <h3 style="margin-top:16px">${t().profLangT}</h3>
      <div class="lang-toggle" style="display:inline-flex">
        <button class="${state.lang==='es'?'on':''}" onclick="setLang('es')" style="padding:8px 18px">Español</button>
        <button class="${state.lang==='en'?'on':''}" onclick="setLang('en')" style="padding:8px 18px">English</button>
      </div>
    </div>
    <div class="panel wide">
      <h3>${t().myWorks}</h3><p>${t().myWorksSub}</p>
      ${works.length?works.map(n=>`<div class="work-row">
        <div><h4 style="cursor:pointer" onclick="go('novel',{id:${n.id}})">${esc(n.title)}</h4>
        <div class="w-meta">${n.chaptersCount} ${t().chapters} · ${fmt(n.followers)} ${t().followers} · ${fmt(n.views)} ${t().views} · ${avgOf(n)?avgOf(n).toFixed(1)+' ★':'— ★'}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="mod-status st-${n.status}" style="margin:0">${t().status[n.status]}</span>
          <button class="btn btn-ghost btn-sm" onclick="go('editnovel',{id:${n.id}})">${t().editNovelBtn}</button>
          ${n.status==='rechazada'?`<button class="btn btn-ghost btn-sm" onclick="resubmit(${n.id})">${t().resubmit}</button>`:''}
        </div>
        ${n.status==='rechazada'&&n.rejectReason?`<div class="reject-note">✗ ${esc(n.rejectReason)}</div>`:''}
      </div>`).join(''):`<p style="color:var(--muted)">${t().noWorks}</p>`}
    </div>
  </div>`;
}
let profileAccountTypeTmp=null;
function profileAccountType(){return profileAccountTypeTmp!==null?profileAccountTypeTmp:(state.user&&state.user.accountType);}
function setProfileAccountType(v){profileAccountTypeTmp=v;render();}
async function saveProfileBasics(){
  const name=($('pUsername').value||'').trim();
  if(!name)return;
  const accountType=profileAccountType();
  const{error}=await sb.from('profiles').update({username:name,account_type:accountType}).eq('id',state.user.id);
  if(error){toast(error.code==='23505'?t().usernameTaken:t().errGeneric);return;}
  state.user.username=name;state.user.accountType=accountType;profileAccountTypeTmp=null;
  await loadMyNovels();
  toast(t().profileSaved);render();
}
async function savePatreon(){
  const url=$('pPatreon').value;
  await sb.from('profiles').update({patreon_url:url}).eq('id',state.user.id);
  state.user.patreon=url;
  await sb.from('novels').update({patreon_url:url}).eq('owner_id',state.user.id).eq('status','aprobada');
  await loadMyNovels();
  toast(t().patreonSaved);render();
}
async function resubmit(id){
  await sb.rpc('fn_resubmit_novel',{p_novel_id:id});
  toast(t().resubmitted);await loadMyNovels();render();
}
async function deleteNovel(id){
  if(!isAdmin())return;
  if(!confirm(t().confirmDeleteNovel))return;
  const{error}=await sb.rpc('fn_delete_novel',{p_novel_id:id});
  if(error){toast(t().errGeneric);return;}
  invalidateChapters(id);
  toast(t().novelDeleted);
  await Promise.all([loadHomeNovels(),loadModQueue()]);
  if(state.view==='novel'&&state.params.id===id)go('mod');else render();
}
async function onAvatarChange(e){
  const file=e.target.files[0];if(!file)return;
  const url=await uploadImage('avatars',file);
  if(url){await sb.from('profiles').update({avatar_url:url}).eq('id',state.user.id);state.user.avatarUrl=url;render();}
}
async function removeAvatar(){
  await sb.from('profiles').update({avatar_url:null}).eq('id',state.user.id);
  state.user.avatarUrl=null;render();
}
async function toggleShowAdult(v){
  await sb.from('profiles').update({show_adult:v}).eq('id',state.user.id);
  state.user.showAdult=v;render();
}

/* =============== INTERACCIONES (requieren cuenta) =============== */
async function toggleFollow(id){
  if(!state.user){toast(t().needLoginFollow);openLogin();return;}
  if(state.follows.has(id)){
    await sb.from('follows').delete().eq('user_id',state.user.id).eq('novel_id',id);
    state.follows.delete(id);toast(t().unfollowed);
  }else{
    await sb.from('follows').insert({user_id:state.user.id,novel_id:id});
    state.follows.add(id);toast(t().followed);
  }
  await refreshNovelLive(id);render();
}
async function toggleFav(id){
  if(!state.user){toast(t().needLoginFav);openLogin();return;}
  if(state.favs.has(id)){
    await sb.from('favorites').delete().eq('user_id',state.user.id).eq('novel_id',id);
    state.favs.delete(id);toast(t().unfaving);
  }else{
    await sb.from('favorites').insert({user_id:state.user.id,novel_id:id});
    state.favs.add(id);toast(t().faving);
  }
  await refreshNovelLive(id);render();
}

/* =============== MODAL DE VALORACIÓN =============== */
const rateTmp={};
function openRating(id){
  if(!state.user){toast(t().needLoginRate);openLogin();return;}
  if(!state.user.emailConfirmed){toast(t().needVerified);return;}
  if(state.ratedIds.has(id)){toast(t().alreadyRated);return;}
  Object.assign(rateTmp,{id,historia:0,estilo:0,gramatica:0,personajes:0});
  renderRateModal();
}
function setStar(cat,v){rateTmp[cat]=v;renderRateModal();}
function renderRateModal(){
  const cats=[['historia',t().catHistoria],['estilo',t().catEstilo],['gramatica',t().catGramatica],['personajes',t().catPersonajes]];
  const done=cats.every(([k])=>rateTmp[k]>0);
  const avg=done?(cats.reduce((s,[k])=>s+rateTmp[k],0)/4):null;
  $('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2>${t().modalTitle}</h2><p class="sub">${t().modalSub}</p>
      ${cats.map(([k,l])=>`<div class="rate-cat"><span>${l}</span>
        <div class="star-picker">${[1,2,3,4,5].map(v=>`<button class="${rateTmp[k]>=v?'lit':''}" onclick="setStar('${k}',${v})">★</button>`).join('')}</div>
      </div>`).join('')}
      <div class="avg-preview">${t().avgLabel}: <b>${avg?avg.toFixed(2)+' ★':'—'}</b></div>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">${t().cancel}</button>
        <button class="btn btn-gold btn-sm" ${avg?'':'disabled'} onclick="submitRating()">${t().send}</button>
      </div>
    </div></div>`;
}
function closeModal(){$('modalRoot').innerHTML='';}
async function submitRating(){
  const novelId=rateTmp.id;
  const{error}=await sb.from('ratings').insert({user_id:state.user.id,novel_id:novelId,
    historia:rateTmp.historia,estilo:rateTmp.estilo,gramatica:rateTmp.gramatica,personajes:rateTmp.personajes});
  if(error){closeModal();toast(error.code==='23505'?t().alreadyRated:t().errGeneric);return;}
  state.ratedIds.add(novelId);
  if(state.user)state.user.points=(state.user.points||0)+10;
  closeModal();toast(t().sent);
  await refreshNovelLive(novelId);render();
}
</script>
<script>
/* =============== RENDER GLOBAL =============== */
function render(){
  const views={home:vHome,explore:vExplore,novel:vNovel,reader:vReader,write:vWrite,mod:vMod,rank:vRank,library:vLibrary,profile:vProfile,dashboard:vDashboard,editnovel:vEditNovel,editchapter:vEditChapter,newchapter:vNewChapter};

  $('navLinks').innerHTML=Object.entries(t().nav).map(([k,l])=>
    `<button class="${state.view===k?'active':''}" onclick="go('${k}')">${l}</button>`).join('');

  const badge=isAdmin()&&state.pendingCount?`<span class="badge">${state.pendingCount}</span>`:'';
  $('navRight').innerHTML=`
    <a class="coffee-btn" href="${COFFEE_URL}" target="_blank" rel="noopener">${t().coffeeBtn}</a>
    <button class="premium-pill" onclick="go('profile')">${t().premiumSoon}</button>
    <div class="lang-toggle">
      <button class="${state.lang==='es'?'on':''}" onclick="setLang('es')">ES</button>
      <button class="${state.lang==='en'?'on':''}" onclick="setLang('en')">EN</button>
    </div>
    ${state.user?`
      <button class="user-chip" onclick="toggleMenu()">
        ${avatarHTML(state.user,24)}
        <span class="u-name">${esc(state.user.username)}</span>
        ${isAdmin()?`<span class="role">ADMIN</span>`:''}${badge}
      </button>
      ${state.menuOpen?`<div class="dropdown">
        <button onclick="go('profile')">${t().myProfile}</button>
        <button onclick="go('dashboard')">${t().myDashboard}</button>
        ${isAdmin()?`<button onclick="go('mod')">${t().modArea}${badge}</button>`:''}
        <button onclick="logout()">${t().logout}</button>
      </div>`:''}
    `:`<button class="login-btn" onclick="openLogin()">${t().loginBtn}</button>`}`;

  $('app').innerHTML=(views[state.view]||vHome)();
  $('foot').innerHTML=`${t().footer}<div class="f-links">${t().footLinks}</div>`;
  activateAds();
}

/* =============== ARRANQUE =============== */
let bootedOnce=false;
async function boot(){
  await Promise.all([loadHomeNovels(),loadStats()]);
  await loadHomeExtras();
  const initial=parsePath(location.pathname);
  history.replaceState({view:initial.view,params:initial.params},'',gcPath(initial.view,initial.params));
  await go(initial.view,initial.params,{skipHistory:true});
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(session&&session.user){
      await loadProfile(session.user);
    }else{
      state.user=null;
      await loadInteractionSets();
    }
    if(!bootedOnce){bootedOnce=true;state.booting=false;}
    await go(state.view,state.params,{skipHistory:true});
  });
}
async function loadProfile(authUser){
  let{data}=await sb.from('profiles').select('*').eq('id',authUser.id).maybeSingle();
  if(!data){await new Promise(r=>setTimeout(r,600));({data}=await sb.from('profiles').select('*').eq('id',authUser.id).maybeSingle());}
  state.user={
    id:authUser.id,email:authUser.email,
    emailConfirmed:!!authUser.email_confirmed_at,
    username:(data&&data.username)||authUser.email.split('@')[0],
    accountType:(data&&data.account_type)||'lector',
    role:(data&&data.role)||'user',
    avatarUrl:(data&&data.avatar_url)||null,
    patreon:(data&&data.patreon_url)||'',
    points:(data&&data.points)||0,
    showAdult:(data&&data.show_adult)||false,
    onboarded:data?data.onboarded:true
  };
  await loadInteractionSets();
  await loadMyNovels();
  if(isAdmin())await refreshPendingCount();
  if(!state.user.onboarded)queueMicrotask(openOnboardModal);
}
boot();
</script>
</body>
